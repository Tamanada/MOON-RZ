  8:{ modules:{
    copilot:{title:"AI ผู้ช่วยคริปโตของคุณ",body:`
      <p>AI (Claude, ChatGPT…) ไม่แทนสมองคุณ แต่เป็น <b>ผู้ช่วยนักบิน</b> ที่ประหยัดเวลามหาศาลในการค้นคว้า วิเคราะห์ และเรียนรู้</p>
      <ul><li><b>อธิบาย</b> แนวคิดซับซ้อนในระดับของคุณ</li><li><b>สรุป</b> whitepaper 40 หน้าใน 10 บรรทัด</li><li><b>ระดมสมอง</b> กลยุทธ์หรือโปรเจกต์</li><li><b>เขียนโค้ด</b> สคริปต์ บอท หรือ smart contract ง่าย ๆ</li></ul>
      <div class="callout">💡 แอป MOON-RZ Academy นี้สร้างด้วย AI พอดี AI คือตัวคูณพลังสำหรับครีเอเตอร์เดี่ยว</div>`},
    prompt:{title:"เขียน prompt ให้ดี",body:`
      <p>คุณภาพคำตอบขึ้นกับคุณภาพคำถาม <b>prompt</b> ที่ดีให้บริบทและเป้าหมายชัดเจน</p>
      <h4>สูตร R-C-T</h4>
      <ul><li><b>บทบาท (Role)</b> — "ทำตัวเป็นนักวิเคราะห์คริปโตผู้เชี่ยวชาญ"</li><li><b>บริบท (Context)</b> — ข้อมูล ระดับของคุณ ข้อจำกัด</li><li><b>งาน (Task)</b> — สิ่งที่ต้องการเป๊ะ ๆ และรูปแบบผลลัพธ์</li></ul>
      <div class="callout warn">⚠️ ชัดเจนเข้าไว้: "วิเคราะห์ BTC" คลุมเครือ "ให้แนวรับ แนวต้าน เทรนด์ของ BTC ใน H4 เป็น 5 หัวข้อ" ใช้ได้จริง</div>`},
    analyst:{title:"สร้างนักวิเคราะห์คริปโต AI",body:`
      <p>คุณเปลี่ยน AI ให้เป็น <b>ผู้ช่วยวิเคราะห์</b> ที่ใช้ซ้ำได้ ด้วยคำสั่งคงที่</p>
      <h4>ตัวอย่างคำสั่ง</h4>
      <p>"คุณคือนักวิเคราะห์ของฉัน สำหรับทุกสินทรัพย์ที่ฉันให้ ตอบเสมอด้วย: เทรนด์ ระดับสำคัญ ปริมาณ ระดับความเสี่ยง /10 และแผนหนึ่งประโยค ห้ามให้คำแนะนำการเงิน วิเคราะห์เท่านั้น"</p>
      <div class="callout">🎯 AI จัดโครงสร้างความคิดและบังคับให้คุณทำตามวิธีของ Academy 6 การตัดสินใจสุดท้ายยังคงเป็น คุณ</div>`},
    scanner:{title:"สแกนเนอร์ตลาด AI",body:`
      <p><b>สแกนเนอร์</b> กรองข้อมูลให้เหลือเฉพาะสิ่งสำคัญ และ AI เร่งการกรองนั้น</p>
      <ul><li>สรุปข่าวและความรู้สึกตลาดของวัน</li><li>เปรียบเทียบหลายโปรเจกต์ตามเกณฑ์คงที่ (ทีม tokenomics สภาพคล่อง…)</li><li>พบสัญญาณให้ขุดต่อ — <b>ไม่ใช่</b> ลงมือแบบหลับตา</li></ul>
      <div class="callout warn">⚠️ สัญญาณจาก AI คือ <b>เบาะแส</b> ไม่ใช่คำสั่ง ตรวจข้อมูลด้วยตัวเองเสมอก่อนลงมือ</div>`},
    agents:{title:"AI Agent และระบบอัตโนมัติ",body:`
      <p><b>AI agent</b> คือ AI ที่ต่อการกระทำเป็นลูกโซ่สู่เป้าหมาย (ค้น วิเคราะห์ เขียน บางทีลงมือผ่านเครื่องมือ)</p>
      <ul><li>ทำการเฝ้าระวังประจำวันอัตโนมัติ</li><li>สร้างรายงานสม่ำเสมอ</li><li>ช่วยการสร้างสรรค์ (เนื้อหา โค้ด ดีไซน์)</li></ul>
      <div class="callout warn">⚠️ อันตรายจริง: agent ที่ต่อกับกระเป๋าหรือ exchange อาจสร้างความเสียหายถ้าวางขอบเขตไม่ดี เริ่มแบบอ่านอย่างเดียว / ในเครื่องจำลอง</div>`},
    ailimits:{title:"ขีดจำกัดและความปลอดภัยของ AI",body:`
      <p>AI ทรงพลังแต่ผิดพลาดได้ รู้ขีดจำกัด = ใช้มันอย่างชาญฉลาด</p>
      <ul><li><b>การหลอน (Hallucination)</b> — AI แต่งข้อเท็จจริงอย่างมั่นใจได้ ตรวจตัวเลขและสัญญา</li><li><b>ข้อมูลล้าสมัย</b> — อาจไม่รู้ราคาตอนนี้</li><li><b>ความปลอดภัย</b> — ห้ามให้ seed phrase หรือ private key แก่ AI หรือเว็บใด ๆ เด็ดขาด</li></ul>
      <div class="callout">🧠 กฎ AI Trader: AI <b>ช่วย</b> การตัดสินใจ ไม่ <b>แทน</b> มัน คุมและคิดวิเคราะห์เสมอ</div>`}
  }, quiz:[

    {q:"สัญญาณจากสแกนเนอร์ AI คือ…",a:["คำสั่งให้ลงมือหลับตา","เบาะแสให้ตรวจด้วยตัวเอง","การันตีกำไร","smart contract"],correct:1},
    {q:"ความเสี่ยงของ AI agent ที่ต่อกับกระเป๋า?",a:["ไม่มี","อาจเสียหายถ้าวางขอบเขตไม่ดี","ขุดเร็วขึ้น","ลด gas"],correct:1},
    {q:"การหลอนของ AI คืออะไร?",a:["บั๊กการแสดงผล","เมื่อ AI แต่งข้อเท็จจริงอย่างมั่นใจ","NFT ชนิดหนึ่ง","เครือข่ายล่ม"],correct:1},

  9:{ modules:{
    standards:{title:"มาตรฐานของโทเคน",body:`
      <p>สร้างโทเคนคือทำตาม <b>มาตรฐาน</b> ที่ยอมรับ เพื่อให้เข้ากันได้กับกระเป๋าและ exchange</p>
      <ul><li><b>ERC-20</b> (Ethereum) — มาตรฐานของโทเคนที่ใช้แทนกันได้</li><li><b>BEP-20</b> (BNB Chain) — เทียบเท่า ค่าธรรมเนียมต่ำกว่า</li><li>บน Solana คือโปรแกรม <b>SPL Token</b></li></ul>
      <p>โทเคนกำหนดด้วย: <b>ชื่อ</b>, <b>สัญลักษณ์</b> (เช่น MOON), <b>อุปทานรวม</b> และจำนวน <b>ทศนิยม</b></p>
      <div class="callout">💡 ในทางเทคนิค สร้างโทเคนพื้นฐานง่าย สิ่งที่ยาก — และสำคัญ — คือทุกอย่างรอบ ๆ (utility สภาพคล่อง ความเชื่อใจ)</div>`},
    contract:{title:"สัญญาของโทเคน",body:`
      <p>โทเคนอยู่ใน <b>smart contract</b> ที่กำหนดกฎ: ใคร mint, burn ได้ และมีขีดจำกัดอะไร</p>
      <ul><li><b>Mint</b> — สร้างโทเคนใหม่</li><li><b>Burn</b> — ทำลายบางส่วน (ลดอุปทาน เงินฝืด)</li><li><b>Owner / สิทธิ์</b> — ใครคุมอะไร</li></ul>
      <div class="callout warn">⚠️ สัญญาที่เขียนไม่ดี = ประตูเปิดสู่การแฮกและ rug pull การเปิดตัวจริงต้องมี <b>audit</b> โดยมืออาชีพ</div>`},
    liquidity9:{title:"สภาพคล่องและการเปิดตัว",body:`
      <p>โทเคนไร้ <b>สภาพคล่อง</b> ไม่มีค่า: ไม่มีใครซื้อหรือขายได้</p>
      <h4>สร้างตลาด</h4>
      <p>สร้าง <b>liquidity pool</b> บน DEX (เช่น โทเคนของคุณ + USDC) สัดส่วนที่ฝากกำหนดราคาเริ่มต้น</p>
      <ul><li><b>ล็อกสภาพคล่อง</b> สร้างความมั่นใจ: ทีมถอนหมดไม่ได้</li><li>สื่อสารสัญญาทางการเพื่อเลี่ยงโทเคนปลอม (ดู Academy 2)</li></ul>
      <div class="callout">🔒 สภาพคล่องล็อก + สัญญา audit = สองสัญญาณความจริงจังที่นักลงทุนเก๋าหา</div>`},
    vesting:{title:"Vesting",body:`
      <p><b>Vesting</b> ปลดล็อกโทเคน <b>ทีละน้อย</b> ตามเวลา แทนที่จะปล่อยหมดทีเดียว</p>
      <ul><li>กันทีมและนักลงทุนแรกขายหมดตอนเปิดตัว ("dump")</li><li>จัดผลประโยชน์ให้ตรงกันใน <b>ระยะยาว</b></li><li>มักแสดงในตารางการปล่อยโทเคน</li></ul>
      <div class="callout warn">⚠️ ก่อนลงทุนในโปรเจกต์ ดู vesting: ถ้าจำนวนมหาศาลปลดล็อกเร็ว ๆ ราคาอาจร่วง</div>`},
    governance:{title:"ธรรมาภิบาล",body:`
      <p>โทเคนให้ <b>อำนาจตัดสินใจ</b> ได้: นั่นคือธรรมาภิบาล (เชื่อมกับ DAO, Academy 5)</p>
      <ul><li>ถือโทเคน = โหวตทิศทางโปรเจกต์</li><li>การตัดสินและคลังจัดการอย่างโปร่งใสบนเชน</li><li>ความท้าทาย: เลี่ยงการครอบงำของ <b>วาฬ</b> เหนือทุกโหวต</li></ul>
      <div class="callout">⚖️ การออกแบบธรรมาภิบาลที่ดีกระจายอำนาจและส่งเสริมการมีส่วนร่วมของชุมชน</div>`},
    launch9:{title:"เปิดตัวโทเคนอย่างรับผิดชอบ",body:`
      <p>สรุปการเปิดตัวที่ <b>จริงจัง</b> ตรงข้ามกับสแกม:</p>
      <ul><li><b>1.</b> Utility ชัดเจน — โทเคนใช้ทำอะไรจริง</li><li><b>2.</b> สัญญา audit สิทธิ์สมเหตุสมผล</li><li><b>3.</b> Tokenomics โปร่งใส (อุปทาน การกระจาย vesting)</li><li><b>4.</b> ให้สภาพคล่องและล็อกไว้</li><li><b>5.</b> ชุมชนรับรู้ เผยแพร่สัญญาทางการ</li></ul>
      <div class="callout">🪙 คาถา Token Engineer: "โทเคนมีค่าเพียงเท่าที่ทำอะไรได้กับมัน" สร้างการใช้งานก่อนราคา นั่นคือตรรกะของโทเคน MOON-RZ พอดี</div>`}
  }, quiz:[

    {q:"การ « burn » ทำอะไร?",a:["สร้างโทเคน","ทำลายโทเคนและลดอุปทาน","ล็อกสภาพคล่อง","mint NFT"],correct:1},

    {q:"vesting มีไว้ทำอะไร?",a:["ปลดล็อกโทเคนทีละน้อยและเลี่ยง dump","สร้าง NFT","audit โค้ด","จ่ายค่าธรรมเนียม"],correct:0},
    {q:"โทเคนกำกับดูแลให้คุณ…",a:["โหวตทิศทางโปรเจกต์","ลดค่าธรรมเนียม Binance","ขุด Bitcoin","เก็บ seed phrase"],correct:0},
    {q:"อะไรให้มูลค่ายั่งยืนแก่โทเคน?",a:["โลโก้","utility จริง","จำนวนทศนิยม","สี"],correct:1}
  ]},
  10:{ modules:{
    m_wallet:{title:"จุดตรวจ 1 — กระเป๋าและความปลอดภัย",body:`
      <p>ยินดีต้อนรับสู่อะคาเดมีสุดท้าย ที่นี่คุณไม่ได้ค้นพบอีกต่อไป แต่ <b>เชื่อมทุกอย่าง</b> และพิสูจน์ความเชี่ยวชาญ</p>
      <h4>สิ่งที่คุณเชี่ยวชาญแล้ว</h4>
      <ul><li>สร้างและรักษาความปลอดภัยกระเป๋า ปกป้อง seed phrase</li><li>รู้จัก phishing, rug pull, drainer (Academy 2)</li><li>รีเฟล็กซ์: "ช้าลง ตรวจสอบ แล้วค่อยเซ็น"</li></ul>
      <div class="callout">🌙 ปรมาจารย์ Web3 ตัวจริงปกป้องเงิน <b>โดยนิสัย</b> โดยไม่ต้องคิด ความปลอดภัยคือรากฐาน</div>`},
    m_defi:{title:"จุดตรวจ 2 — DeFi และผลตอบแทน",body:`
      <p>ตอนนี้คุณรู้วิธีให้สินทรัพย์ทำงาน <b>โดยเข้าใจความเสี่ยง</b></p>
      <ul><li>Swap บน DEX ให้สภาพคล่อง อ่าน APY</li><li>Staking, lending และอันตรายของการชำระบังคับ</li><li>Impermanent loss และความเสี่ยง smart contract</li></ul>
      <div class="callout">🧠 ความเชี่ยวชาญ = ไม่ไล่ผลตอบแทนที่อธิบายที่มาไม่ได้</div>`},
    m_nft:{title:"จุดตรวจ 3 — NFT และการสร้าง",body:`
      <p>คุณเห็น NFT ตามที่มันเป็น: <b>ใบรับรองความเป็นเจ้าของ</b> และพาหะของ utility</p>
      <ul><li>เข้าใจคอลเลกชัน มาตรฐาน ความหายาก</li><li>ประเมิน utility จริงก่อนซื้อ</li><li>รู้วิธีสร้าง ลงขาย และตั้งค่าลิขสิทธิ์</li></ul>
      <div class="callout">🎯 ตรา MOON-RZ ของคุณเองก็เป็น utility NFT: พิสูจน์สิ่งที่คุณได้เรียนรู้</div>`},
    m_trade:{title:"จุดตรวจ 4 — การเทรดและความเสี่ยง",body:`
      <p>คุณอ่านตลาดและลงมือด้วย <b>แผน</b> ไม่ใช่อารมณ์</p>
      <ul><li>เทรนด์ แนวรับ/แนวต้าน ปริมาณ สภาพคล่อง</li><li>กฎ 1%, position sizing, R:R ≥ 1:2</li><li>บันทึกการเทรดและวินัยต่อ FOMO</li></ul>
      <div class="callout">🏋️ พิสูจน์ด้วยการลงมือ: ใช้กลยุทธ์เต็มในเครื่องจำลอง ตั้งแต่แผนเข้าถึง stop-loss</div>`},
    m_build:{title:"จุดตรวจ 5 — สร้างและทำโทเคน",body:`
      <p>คุณก้าวจากผู้ใช้ทั่วไปสู่ <b>ผู้สร้าง</b> ระบบนิเวศได้</p>
      <ul><li>วิสัยทัศน์ แบรนด์ ชุมชนก่อน</li><li>Tokenomics สมเหตุสมผล: อุปทาน การกระจาย vesting utility</li><li>เปิดตัวโทเคนอย่างรับผิดชอบ พร้อมธรรมาภิบาลและสภาพคล่องล็อก</li></ul>
      <div class="callout">🏗️ "ชุมชนก่อน ไฮป์ทีหลัง" ตอนนี้คุณรู้จัก — และสร้าง — โปรเจกต์ที่จริงจังได้</div>`},
    m_master:{title:"จุดตรวจสุดท้าย — MOON-RZ Master",body:`
      <p>โค้งสุดท้าย คุณผ่านครบ 10 อะคาเดมี: บล็อกเชน ความปลอดภัย DeFi NFT การเป็นผู้ประกอบการ การเทรด AI การทำโทเคน</p>
      <h4>โปรไฟล์ของ MOON-RZ Master</h4>
      <ul><li>🛡️ พึ่งตนเองและปลอดภัยใน Web3</li><li>💹 วิเคราะห์ตลาดและจัดการความเสี่ยงได้</li><li>🏗️ เข้าใจ ประเมิน และสร้างโปรเจกต์ได้</li><li>🧠 คิดวิเคราะห์: ไม่มีคำสัญญากำไรง่าย ๆ หลอกคุณได้</li></ul>
      <div class="callout">🏆 ผ่านข้อสอบสุดท้ายเพื่อรับ <b>MOON-RZ MASTER NFT</b> และถึงอันดับสูงสุด: <b>MOON-RZ Legend</b> ความเชี่ยวชาญที่แท้จริงคือการเรียนรู้ต่อไป 🚀</div>`}
  }, quiz:[
    {q:"รีเฟล็กซ์ความปลอดภัยสูงสุดของปรมาจารย์ Web3?",a:["เซ็นเร็ว ๆ","ช้าลง ตรวจสอบ แล้วค่อยเซ็น ไม่ให้ seed ใคร","เก็บเงินบน exchange","ปิดแอนตี้ไวรัส"],correct:1},
    {q:"ก่อนไล่ผลตอบแทน DeFi สูง ต้อง…",a:["ลงทุนหมดเร็ว ๆ","อธิบายได้ว่าผลตอบแทนมาจากไหนและความเสี่ยง","เพิกเฉยค่าธรรมเนียม","เชื่อ APY ที่แสดง"],correct:1},
    {q:"กฎใดปกป้องทุนของคุณในการเทรด?",a:["ทุ่มทั้งหมดในเหรียญเดียว","เสี่ยงสูงสุด 1-2% ต่อเทรดพร้อม stop-loss","เทรดไม่มีแผน","เพิ่มเป็นสองเท่าหลังขาดทุน"],correct:1},
    {q:"อะไรให้มูลค่ายั่งยืนแก่ token/NFT?",a:["ไฮป์อย่างเดียว","utility จริงและชุมชน","จำนวนทศนิยม","สีโลโก้"],correct:1},
    {q:"บทบาทที่ถูกของ AI สำหรับปรมาจารย์คริปโต?",a:["ตัดสินใจและเทรดแทนเขา","ช่วยการตัดสินใจ ที่ยังเป็นของมนุษย์","เก็บ private key","การันตีกำไร"],correct:1},
    {q:"แท้จริงแล้ว ความเชี่ยวชาญ Web3 คือ…",a:["มีพอร์ตใหญ่ที่สุด","พึ่งตนเอง จัดการความเสี่ยง และเรียนรู้ต่อไป","ตามอินฟลูเอนเซอร์ทุกคน","ซื้อทุกโทเคนใหม่"],correct:1}
  ]}

 pt:{
  1:{ modules:{
    bc:{title:"O que é uma blockchain?",body:`
      <p>Uma <b>blockchain</b> é um grande registro compartilhado por milhares de computadores no mundo. Ninguém é dono e qualquer um pode verificar.</p>
      <h4>A ideia-chave</h4>
      <p>As transações são agrupadas em <b>blocos</b>. Cada bloco se liga ao anterior por uma impressão criptográfica (um <code>hash</code>). Daí o nome: uma <i>cadeia de blocos</i>.</p>
      <ul><li><b>Descentralizada</b> — sem banco nem servidor central.</li><li><b>Imutável</b> — uma vez escrito, o passado não muda.</li><li><b>Transparente</b> — qualquer um verifica tudo.</li></ul>
      <div class="callout">💡 Analogia: um Google Doc público que milhares de pessoas copiam ao mesmo tempo. Se alguém trapaceia na cópia, os outros a rejeitam automaticamente.</div>`},
    btc:{title:"Bitcoin — o ouro digital",body:`
      <p><b>Bitcoin (BTC)</b> é a primeira blockchain, criada em 2009 por Satoshi Nakamoto. Objetivo: dinheiro digital sem banco, impossível de falsificar.</p>
      <h4>Por que ouro digital?</h4>
      <ul><li>Oferta <b>limitada a 21 milhões</b> de BTC. Nunca mais.</li><li>Protegido por <b>Prova de Trabalho</b> (mineração).</li><li>Usado sobretudo como <b>reserva de valor</b>.</li></ul>
      <div class="callout">A menor parte do Bitcoin é um <code>satoshi</code>: 1 BTC = 100.000.000 satoshis.</div>`},
    eth:{title:"Ethereum — o computador mundial",body:`
      <p><b>Ethereum (ETH)</b> não serve só para enviar dinheiro: é uma plataforma que executa <b>smart contracts</b>.</p>
      <p>Nela se constroem aplicativos descentralizados (<code>dApps</code>): DeFi, NFT, DAO, jogos Web3.</p>
      <ul><li>Moeda nativa: <b>Ether (ETH)</b>.</li><li>As taxas se chamam <b>gas</b>.</li><li>Desde 2022 usa <b>Prova de Participação</b>, bem mais ecológica.</li></ul>`},
    bnb:{title:"BNB Chain — rápida e barata",body:`
      <p><b>BNB Chain</b> é compatível com Ethereum, com <b>taxas muito baixas</b> e transações rápidas.</p>
      <ul><li>Moeda nativa: <b>BNB</b>.</li><li>Compatível com <b>EVM</b>: as mesmas carteiras e ferramentas do Ethereum.</li><li>Muito usada por iniciantes.</li></ul>
      <div class="callout warn">⚠️ Taxas baixas também significam muitos golpes e tokens falsos. (Academia 2)</div>`},
    sc:{title:"Smart Contracts",body:`
      <p>Um <b>smart contract</b> é um programa na blockchain que roda sozinho quando suas condições são atendidas. Sem intermediário.</p>
      <h4>Exemplo</h4><p>« <i>Se eu receber 1 ETH, envio este NFT ao comprador.</i> » O código é lei: <code>code is law</code>.</p>
      <div class="callout">Automático e à prova de adulteração, mas se o código tem um bug não há suporte. Por isso as <b>auditorias</b>.</div>`},
    wallet:{title:"As carteiras (Wallets)",body:`
      <p>Uma <b>carteira</b> não "guarda" suas criptos (elas estão na blockchain). Ela guarda suas <b>chaves</b>.</p>
      <ul><li><b>Endereço público</b> — como um IBAN, para receber.</li><li><b>Chave privada</b> — a senha suprema, nunca compartilhada.</li><li><b>Seed phrase</b> (12/24 palavras) — o backup da carteira.</li></ul>
      <div class="callout warn">🔒 "Not your keys, not your coins." Anote sua seed phrase no papel, nunca em foto ou na nuvem.</div>`}
  }, quiz:[
    {q:"O que torna uma blockchain « imutável »?",a:["Um banco central a protege","Cada bloco se liga ao anterior por um hash","Uma senha de admin","Está num único servidor"],correct:1},
    {q:"Qual é a oferta máxima do Bitcoin?",a:["100 milhões","Ilimitada","21 milhões","1 bilhão"],correct:2},
    {q:"Além de enviar dinheiro, para que serve o Ethereum?",a:["Minerar Bitcoin","Executar smart contracts e dApps","Armazenar arquivos","Substituir bancos centrais"],correct:1},
    {q:"O que você NUNCA deve compartilhar?",a:["Seu endereço público","Seu apelido","Sua seed phrase / chave privada","O nome da sua blockchain"],correct:2},
    {q:"As taxas no Ethereum se chamam…",a:["Gas","Satoshi","Staking","Hash"],correct:0},
    {q:"« Not your keys, not your coins » significa…",a:["Guardar cripto numa exchange","Quem tem as chaves controla os fundos","As chaves são grátis","Não dá para perder cripto"],correct:1}
  ]},
  2:{ modules:{
    scam:{title:"Golpes cripto: panorama",body:`
      <p>A cripto não tem intermediário: <b>nenhum banco reverte</b> uma transação. Isso é liberdade… mas também o playground dos golpistas. Sua melhor proteção é <b>você</b>.</p>
      <h4>As grandes famílias</h4>
      <ul><li><b>Phishing</b> — sites/mensagens falsos que roubam seu acesso.</li><li><b>Rug pull</b> — a equipe de um projeto some com os fundos.</li><li><b>Wallet drainer</b> — uma assinatura armadilha que esvazia sua carteira.</li><li><b>Airdrops/tokens falsos</b> — isca para você assinar.</li></ul>
      <div class="callout warn">🚩 Regra nº1: se é bom demais para ser verdade (×10 garantido, "dobre seu ETH"), é golpe. Sempre.</div>`},
    phish:{title:"Phishing",body:`
      <p><b>Phishing</b> imita um site/serviço que você conhece para roubar sua seed phrase ou fazer você assinar.</p>
      <h4>Como detectar</h4>
      <ul><li>Verifique a <b>URL caractere por caractere</b>: <code>binance.com</code> ≠ <code>binqnce.com</code>.</li><li>Cuidado com <b>anúncios do Google</b> no topo dos resultados — muitas vezes falsos.</li><li><b>Nenhum</b> suporte legítimo pede sua seed phrase.</li><li>Salve os sites reais nos favoritos e entre sempre por eles.</li></ul>
      <div class="callout warn">⚠️ Um site que pede suas 12/24 palavras = golpe 100%. Sem exceções.</div>`},
    rug:{title:"Rug Pulls",body:`
      <p>Um <b>rug pull</b>: uma equipe cria um token, atrai compradores e depois <b>remove toda a liquidez</b> e desaparece. O preço despenca a zero.</p>
      <h4>Sinais de alerta</h4>
      <ul><li>Equipe <b>anônima</b> sem histórico.</li><li><b>Liquidez não travada</b>.</li><li>Poucas carteiras detêm <b>a maioria</b> dos tokens.</li><li>Muito hype, promessas de ganho, nenhum produto real.</li></ul>
      <div class="callout">🔎 Ferramentas: um block explorer (Etherscan/BscScan) + scanners de contrato para ver a distribuição de holders.</div>`},
    drain:{title:"Wallet Drainers e aprovações",body:`
      <p>Você não precisa dar sua chave privada para ser esvaziado: basta assinar uma <b>aprovação (approval)</b> armadilha.</p>
      <h4>A armadilha clássica</h4>
      <p>Um "mint" ou "claim" falso faz você assinar um <code>approve</code> que deixa o atacante gastar seus tokens. Depois ele esvazia tudo.</p>
      <ul><li>Leia <b>o que você assina</b>: uma mensagem "set approval for all" é perigosa.</li><li>Revogue aprovações inúteis (ex. <code>revoke.cash</code>).</li><li>Use uma <b>carteira burner</b> para mints arriscados.</li></ul>
      <div class="callout warn">🖊️ Uma assinatura pode custar tanto quanto uma seed phrase vazada. Vá com calma antes de clicar "Confirm".</div>`},
    fake:{title:"Airdrops e tokens falsos",body:`
      <p>Você recebe "de graça" um token estranho na carteira. É uma <b>isca</b>.</p>
      <ul><li><b>Nunca</b> interaja com um token desconhecido recebido sem motivo.</li><li>"Airdrops" que pedem para <b>conectar a carteira e assinar</b> num site duvidoso = drainer.</li><li>Verifique o endereço oficial do token no site/Twitter <b>reais</b> do projeto.</li></ul>
      <div class="callout">🎁 Um airdrop real nunca pede para enviar fundos "para desbloquear" sua recompensa.</div>`},
    audit:{title:"Sua checklist de segurança",body:`
      <p>Antes de tocar num projeto, passe esta <b>checklist de auditoria rápida</b>:</p>
      <ul><li>✅ URL verificada + nos favoritos</li><li>✅ Equipe identificável / reputação</li><li>✅ Contrato auditado, liquidez travada</li><li>✅ Distribuição de holders saudável</li><li>✅ Entendo o que assino</li><li>✅ Carteira burner para ações arriscadas</li><li>✅ Seed phrase offline, nunca digitada online</li></ul>
      <div class="callout">🛡️ Mantra do Crypto Guardian: <b>"Vá com calma, verifique, depois assine."</b> A pressa é amiga do ladrão.</div>`}
  }, quiz:[
    {q:"Um site pede suas 12 palavras seed. O que você faz?",a:["Digito, é o suporte","Saio: nenhum serviço legítimo pede isso","Dou só as 6 primeiras","Pergunto a um amigo"],correct:1},
    {q:"O que é um rug pull?",a:["Uma atualização de rede","A equipe remove a liquidez e some","Um tipo de staking","Uma carteira física"],correct:1},
    {q:"Como um drainer esvazia uma carteira sem sua chave privada?",a:["Adivinhando sua senha","Por uma assinatura/aprovação armadilha","Minerando suas moedas","Por e-mail"],correct:1},
    {q:"Qual é um forte sinal de rug pull?",a:["Liquidez travada","Equipe anônima + liquidez não travada","Contrato auditado","Muitos holders distribuídos"],correct:1},
    {q:"Você recebe um token desconhecido de graça. Boa reação?",a:["Vender rápido","Não interagir com ele","Clicar para ver o site","Devolver"],correct:1},
    {q:"O reflexo certo antes de assinar uma transação?",a:["Assinar rápido antes do preço subir","Ler o que assino e verificar a URL","Desativar o antivírus","Compartilhar minha tela"],correct:1}
  ]},
  3:{ modules:{
    dex:{title:"DEX vs CEX",body:`
      <p>Há duas formas de trocar cripto:</p>
      <h4>CEX — exchange centralizada</h4>
      <p>Como Binance, Coinbase. Uma empresa guarda seus fundos. Prático, mas <b>"not your keys, not your coins"</b>: você depende dela.</p>
      <h4>DEX — exchange descentralizada</h4>
      <p>Como Uniswap, PancakeSwap. Você troca <b>direto da sua carteira</b>, sem intermediário. Um smart contract gerencia o swap.</p>
      <ul><li>CEX = simples, rápido, mas centralizado e com KYC.</li><li>DEX = autônomo, aberto 24/7, mas você é o único responsável.</li></ul>
      <div class="callout">💡 A DeFi (finanças descentralizadas) é todo o universo de serviços financeiros que rodam em smart contracts, sem banco.</div>`},
    lp:{title:"Pools de liquidez e AMM",body:`
      <p>Numa DEX não há livro de ofertas clássico: os <b>pools de liquidez</b> tornam as trocas possíveis.</p>
      <h4>Como funciona</h4>
      <p>Usuários (os <b>LPs, provedores de liquidez</b>) depositam dois ativos em valor igual, ex. ETH + USDC. Um algoritmo chamado <b>AMM</b> define o preço pela fórmula <code>x · y = k</code>.</p>
      <ul><li>Você fornece liquidez → ganha <b>taxas de trading</b>.</li><li>Em troca recebe um <b>LP token</b> que representa sua parte do pool.</li></ul>
      <div class="callout">Quanto mais liquidez num pool, menos o preço se move por trade (baixo <i>slippage</i>).</div>`},
    yield:{title:"Yield Farming",body:`
      <p><b>Yield farming</b> é pôr suas criptos para trabalhar e gerar rendimento, muitas vezes empilhando vários protocolos.</p>
      <ul><li>Você fornece liquidez → recebe LP tokens.</li><li>Coloca esses LP tokens em stake → recebe tokens de recompensa.</li><li>O rendimento é medido em <b>APR / APY</b> (taxa anual).</li></ul>
      <div class="callout warn">⚠️ APYs de 1000% existem… mas quase sempre são insustentáveis. Rendimento alto = risco alto. Pergunte sempre "de onde vem esse rendimento?".</div>`},
    stake:{title:"Staking",body:`
      <p>O <b>staking</b> é travar seus tokens para ajudar a proteger uma rede em <b>Prova de Participação</b>, e receber recompensas.</p>
      <ul><li>Você trava tokens (ex. ETH, SOL) → ganha rendimento regular.</li><li>Mais estável e simples que o yield farming.</li><li>Cuidado com os <b>períodos de desbloqueio</b>: seus fundos podem ficar travados alguns dias.</li></ul>
      <div class="callout">Staking ≈ "dinheiro que rende juros", mantendo o controle das suas chaves.</div>`},
    lend:{title:"Empréstimos (Lending & Borrowing)",body:`
      <p>Protocolos como Aave permitem <b>emprestar</b> suas criptos (e ganhar juros) ou <b>tomar emprestado</b> (com garantia).</p>
      <h4>O conceito-chave: sobrecolateralização</h4>
      <p>Para pegar 100 $ você deve depositar mais de 100 $ de garantia (ex. 150 $). Se sua garantia cai demais, você é <b>liquidado</b> automaticamente.</p>
      <ul><li>Credor → renda passiva nas suas criptos.</li><li>Tomador → liquidez sem vender seus ativos.</li></ul>
      <div class="callout warn">⚠️ A liquidação é o perigo nº1 de tomar emprestado. Mantenha sempre uma margem de segurança confortável.</div>`},
    derisk:{title:"Os riscos da DeFi",body:`
      <p>A DeFi é poderosa mas tem riscos próprios. Conhecê-los é metade do trabalho.</p>
      <ul><li><b>Perda impermanente</b> — ao fornecer liquidez, se os preços divergem você pode terminar com menos valor do que só segurando.</li><li><b>Risco de smart contract</b> — um bug ou hack pode esvaziar um protocolo.</li><li><b>Rug pulls / protocolos falsos</b> — ver Academia 2.</li><li><b>Risco de liquidação</b> — no empréstimo.</li></ul>
      <div class="callout">🧠 Regra do DeFi Builder: nunca coloque num protocolo mais do que pode perder, e prefira protocolos consolidados e auditados.</div>`}
  }, quiz:[
    {q:"Diferença-chave entre CEX e DEX?",a:["A DEX é mais cara","Na DEX você opera da sua carteira, sem intermediário","A CEX não tem taxas","Não há diferença"],correct:1},

  4:{ modules:{
    nftbasic:{title:"NFT: o básico",body:`
      <p>Um <b>NFT</b> (token não fungível) é um token <b>único</b> e à prova de falsificação registrado numa blockchain. "Não fungível" = não intercambiável, diferente de R$1 que vale qualquer outro R$1.</p>
      <ul><li>Prova a <b>propriedade</b> e a <b>autenticidade</b> de um ativo digital (ou físico).</li><li>Cada NFT tem um identificador único e um histórico público.</li></ul>
      <div class="callout warn">⚠️ Mito comum: "um NFT é só uma imagem". Não — é um <b>certificado de propriedade</b> na blockchain. A imagem é só um dos usos.</div>`},
    collec:{title:"Coleções e padrões",body:`
      <p>A maioria dos NFTs é agrupada em <b>coleções</b> (ex. 10.000 peças com um tema comum).</p>
      <h4>Os padrões técnicos</h4>
      <ul><li><b>ERC-721</b> — cada token é único (1 obra = 1 token).</li><li><b>ERC-1155</b> — permite o semi-fungível (ex. 100 cópias do mesmo item de jogo).</li></ul>
      <p>A <b>raridade</b> (traços raros) influencia muito o valor percebido numa coleção.</p>
      <div class="callout">Os metadados (imagem, atributos) costumam ficar no IPFS para seguir descentralizados e permanentes.</div>`},
    utility:{title:"NFTs de utilidade",body:`
      <p>Um <b>NFT de utilidade</b> dá acesso a algo: esse é seu valor real, além da imagem.</p>
      <ul><li><b>Acesso / membership</b> — entrada a uma comunidade, evento, conteúdo premium (como os NFTs da MOON-RZ Academy 😉).</li><li><b>Vantagens</b> — descontos, airdrops, direitos de voto.</li><li><b>Certificações</b> — um diploma ou selo verificável.</li></ul>
      <div class="callout">💡 A pergunta antes de comprar: "para que serve de verdade este NFT?". Se é só para especular, o risco é alto.</div>`},
    gaming:{title:"NFTs de jogos",body:`
      <p>Em jogos Web3, itens (personagens, armas, terrenos) podem ser NFTs que você <b>possui de verdade</b> e pode revender.</p>
      <ul><li><b>Play-to-earn</b> — ganhar tokens/NFTs jogando.</li><li><b>Interoperabilidade</b> — a ideia (ainda jovem) de usar um mesmo item em vários jogos.</li></ul>
      <div class="callout warn">⚠️ Muitos jogos P2E quebraram porque a economia dependia da chegada constante de novos jogadores. Avalie sempre a <b>sustentabilidade econômica</b> do jogo.</div>`},
    rwa:{title:"Ativos do mundo real (RWA)",body:`
      <p>Os <b>RWA</b> tokenizam ativos do mundo real: imóveis, arte, títulos, ouro… representados por um token na blockchain.</p>
      <ul><li>Permitem a <b>propriedade fracionada</b> (ter 1% de um apartamento).</li><li>Mais liquidez para ativos normalmente difíceis de vender.</li><li>Setor em forte crescimento, muito ligado à <b>regulação</b>.</li></ul>
      <div class="callout">Um outro projeto seu (STAYLO) trata justamente de tokenizar ativos reais — exatamente o que este módulo cobre.</div>`},
    mint:{title:"Criar e listar um NFT",body:`
      <p>Passos da ideia ao NFT à venda:</p>
      <ul><li><b>1. Criar</b> o visual / conteúdo e seus metadados.</li><li><b>2. Mint</b> — registrar o NFT na blockchain (via marketplace ou contrato).</li><li><b>3. Listar</b> — pôr à venda (preço fixo ou leilão) num marketplace (OpenSea, Magic Eden…).</li><li><b>4. Royalties</b> — configurar um % que você recebe a cada revenda futura.</li></ul>
      <div class="callout">🎨 Dica do NFT Architect: o valor de uma coleção é 80% <b>comunidade e utilidade</b>, 20% arte. Construa os dois.</div>`}

    {q:"No fundo, um NFT é…",a:["Só uma imagem JPEG","Um certificado de propriedade na blockchain","Uma moeda como o Bitcoin","Uma senha"],correct:1},

  5:{ modules:{
    brand:{title:"Branding Web3",body:`
      <p>No Web3, sua <b>marca</b> é o que faz confiarem em você num oceano de projetos. Antes da técnica, vem a <b>história</b>.</p>
      <ul><li><b>Missão clara</b> — que problema você resolve e para quem.</li><li><b>Identidade visual</b> — logo, cores, tom (como o universo lunar da MOON-RZ).</li><li><b>Consistência</b> — a mesma mensagem em todo lugar (site, X, Discord).</li></ul>
      <div class="callout">💡 As pessoas não compram um token, aderem a uma <b>visão</b>. Conte uma história à qual queiram pertencer.</div>`},
    community:{title:"Construir comunidade",body:`
      <p>Na cripto, <b>a comunidade é o produto</b>. Um projeto sem comunidade está morto, mesmo com ótima tecnologia.</p>
      <ul><li><b>Discord / Telegram</b> — o quartel-general diário.</li><li><b>X (Twitter)</b> — a vitrine e a captação.</li><li><b>Engajamento real</b> — responda, ouça, recompense os membros ativos.</li></ul>
      <div class="callout warn">⚠️ Cuidado com vanity metrics: 50.000 seguidores comprados valem menos que 500 fãs reais e engajados. Busque qualidade, não barulho.</div>`},
    marketing:{title:"Marketing cripto",body:`
      <p>O marketing Web3 mistura os clássicos com alavancas próprias do ecossistema.</p>
      <ul><li><b>Conteúdo educativo</b> — entregar valor antes de vender.</li><li><b>Parcerias e KOLs</b> — influenciadores cripto (verifique, há muitos falsos).</li><li><b>Airdrops e missões</b> — recompensar a ação para iniciar a comunidade (o modelo Learn→Earn).</li></ul>
      <div class="callout">O melhor marketing cripto ainda é um produto que funciona + usuários que falam dele sozinhos.</div>`},
    dao:{title:"As DAOs",body:`
      <p>Uma <b>DAO</b> (Organização Autônoma Descentralizada) é uma organização governada pela comunidade via blockchain, em vez de um chefe.</p>
      <ul><li><b>Tokens de governança</b> — ter o token = direito de voto.</li><li><b>Propostas e votos</b> — a comunidade decide a evolução e o tesouro.</li><li><b>Transparência</b> — decisões e fundos visíveis on-chain.</li></ul>
      <div class="callout">⚖️ Desafio-chave: evitar que poucos grandes detentores ("baleias") controlem todos os votos. O design de governança importa tanto quanto a tecnologia.</div>`},
    tokenomics:{title:"Tokenomics",body:`
      <p>A <b>tokenomics</b> é a economia do seu token: o que determina se ele mantém valor com o tempo.</p>
      <ul><li><b>Oferta</b> — total, circulante, inflação/deflação.</li><li><b>Distribuição</b> — equipe, comunidade, investidores, e o <b>vesting</b> (desbloqueio gradual).</li><li><b>Utilidade</b> — por que segurar o token? (gas, governança, acesso, recompensas…).</li><li><b>Oferta vs demanda</b> — um token útil e escasso ganha valor.</li></ul>
      <div class="callout">🧮 O token MOON-RZ segue essa lógica: ganho pela ação (Learn→Earn) e gasto para desbloquear conteúdo, NFTs e competições.</div>`},
    launch:{title:"Lançar seu projeto",body:`
      <p>Juntar as peças para ir da ideia ao lançamento:</p>
      <ul><li><b>1. Visão e whitepaper</b> — o quê, por quê, como.</li><li><b>2. Comunidade</b> — construa-a ANTES do lançamento.</li><li><b>3. Tokenomics</b> — saudável e transparente.</li><li><b>4. Produto / MVP</b> — mostre que funciona (como este app!).</li><li><b>5. Lançamento e liquidez</b> — depois itere com a comunidade.</li></ul>
      <div class="callout">🏗️ Mantra do Web3 Founder: "Comunidade primeiro, hype depois." Um lançamento de sucesso se prepara com meses de antecedência.</div>`}

    {q:"Por que desconfiar de 50.000 seguidores de uma vez?",a:["É sempre bom sinal","Pode ser vanity metric (engajamento falso)","Baixa o preço do token","Aumenta o gas"],correct:1},

  6:{ modules:{
    candles:{title:"Ler um gráfico: os candles",body:`
      <p>O gráfico de <b>candles japoneses</b> é a língua universal do trader. Cada candle resume a batalha compradores/vendedores num período.</p>
      <h4>Um candle = 4 preços</h4>
      <ul><li><b>Abertura</b> e <b>fechamento</b> (o corpo do candle).</li><li><b>Máxima</b> e <b>mínima</b> (as sombras).</li><li>Corpo <b>verde</b> = fecha acima da abertura (alta). <b>Vermelho</b> = baixa.</li></ul>
      <p>O <b>período (timeframe)</b> muda tudo: um candle de 1 minuto ≠ um candle de 1 dia.</p>
      <div class="callout">💡 Abra seu <b>Simulador</b> em paralelo: você vê preços reais se mexerem. Trading se aprende com o olho no mercado, não nos livros.</div>`},
    sr:{title:"Suportes e resistências",body:`
      <p>São os níveis de preço mais importantes a identificar.</p>
      <h4>Suporte</h4>
      <p>Um <b>piso</b> onde os compradores retomam e fazem o preço quicar. O preço "tem dificuldade de cair" abaixo dele.</p>
      <h4>Resistência</h4>
      <p>Um <b>teto</b> onde os vendedores retomam. O preço "tem dificuldade de subir" acima.</p>
      <ul><li>Quanto mais um nível é testado, mais significativo é.</li><li>Um suporte rompido vira muitas vezes resistência (e vice-versa).</li></ul>
      <div class="callout warn">⚠️ Esses níveis são <b>zonas</b>, não linhas perfeitas ao pixel. Não exagere na precisão.</div>`},
    trend:{title:"As tendências",body:`
      <p>"<b>The trend is your friend</b>": a primeira pergunta do trader é sempre "para onde vai o mercado?".</p>
      <ul><li><b>Tendência de alta</b> — topos e fundos cada vez mais altos.</li><li><b>Tendência de baixa</b> — topos e fundos cada vez mais baixos.</li><li><b>Range</b> — o preço oscila de lado, sem direção.</li></ul>
      <div class="callout">📐 Uma <b>linha de tendência</b> liga os fundos (na alta) ou os topos (na baixa). O rompimento dela pode sinalizar mudança de direção.</div>`},
    volume:{title:"O volume",body:`
      <p>O <b>volume</b> = a quantidade negociada num período. É o <b>combustível</b> por trás de um movimento de preço.</p>
      <ul><li>Uma alta com <b>volume forte</b> = movimento crível, sustentado.</li><li>Uma alta com <b>volume fraco</b> = suspeita, o movimento pode perder força.</li><li>Um pico de volume costuma acompanhar reversões ou rompimentos.</li></ul>
      <div class="callout">🔎 Regra simples: o volume <b>confirma</b> o preço. Um rompimento de resistência sem volume é suspeito.</div>`},
    liquidity:{title:"A liquidez",body:`
      <p>A <b>liquidez</b> é a facilidade de comprar ou vender sem mover o preço. Muitas ordens dos dois lados = mercado líquido.</p>
      <ul><li>Ativo <b>líquido</b> (BTC, ETH) → <b>slippage</b> baixo, execução perto do preço mostrado.</li><li>Ativo <b>ilíquido</b> (token pequeno) → uma ordem grande move o preço, terreno de manipulação.</li></ul>
      <div class="callout warn">⚠️ Muitas armadilhas (pump &amp; dump) só são possíveis em ativos ilíquidos. Prefira mercados profundos ao começar.</div>`},
    analyse:{title:"Pôr em prática",body:`
      <p>Junte tudo para sua primeira <b>análise de mercado</b> estruturada:</p>
      <ul><li><b>1. Tendência</b> — alta, baixa ou range?</li><li><b>2. Níveis</b> — onde estão os suportes e resistências-chave?</li><li><b>3. Volume</b> — confirma o movimento atual?</li><li><b>4. Liquidez</b> — o ativo é profundo o bastante?</li><li><b>5. Plano</b> — onde entro, onde corto se estiver errado (isso é a Academia 7).</li></ul>
      <div class="callout">🏋️ Exercício do Market Analyst: abra o <b>Simulador</b>, escolha BTC ou ETH e faça estes 5 passos em voz alta antes de clicar "Comprar". Repita com ETH, BNB, SOL, XRP.</div>`}

    {q:"O que é um suporte?",a:["Um teto de preço","Um piso onde os compradores fazem o preço quicar","Um tipo de token","Um candle vermelho"],correct:1},

  ]},
  7:{ modules:{
    mtf:{title:"Análise multi-timeframe",body:`
      <p>Um bom trader olha <b>vários timeframes</b> antes de agir. Só um é olhar pelo buraco da fechadura.</p>
      <h4>O método top-down</h4>
      <ul><li><b>TF maior</b> (dia/semana) → a tendência de fundo, o cenário.</li><li><b>TF média</b> (4h/1h) → as zonas de interesse.</li><li><b>TF menor</b> (15m/5m) → o ponto de entrada preciso.</li></ul>
      <p>Regra de ouro: <b>opere no sentido da tendência maior</b>, e afine a entrada na menor.</p>
      <div class="callout warn">⚠️ Erro clássico de iniciante: pegar um sinal de 5 minutos contra a tendência diária. É nadar contra a corrente.</div>`},
    risk:{title:"Gestão de risco",body:`
      <p>A verdade que ninguém conta aos iniciantes: <b>trading é primeiro gerir o risco, não prever o preço.</b> Você sobrevive antes de ganhar.</p>
      <h4>A regra dos 1%</h4>
      <p>Nunca arrisque <b>mais de 1 a 2%</b> do seu capital num único trade. Com 1% de risco, seriam precisos 100 trades perdedores seguidos para quebrar — quase impossível.</p>
      <ul><li>Uma perda de 50% exige depois um ganho de <b>100%</b> só para voltar ao zero. Proteger o capital é matemática.</li><li>O <b>stop-loss</b> não é opcional: é seu cinto de segurança.</li></ul>
      <div class="callout">🧮 Pratique no Simulador: decida ANTES de comprar quanto aceita perder, e mantenha.</div>`},
    sizing:{title:"Tamanho de posição",body:`
      <p>O <b>position sizing</b> responde "quanto eu compro?". Decorre do seu risco, não do seu entusiasmo.</p>
      <h4>A fórmula</h4>
      <p><code>Tamanho = (Capital × % risco) ÷ distância ao stop-loss</code></p>
      <p>Exemplo: capital 10.000 $, risco 1% (100 $), stop em -5% → você pode alocar <b>2.000 $</b> nesse trade (pois 5% de 2000 = 100).</p>
      <div class="callout warn">⚠️ Não é "gosto dessa moeda então ponho tudo". O tamanho é um <b>cálculo</b>, definido por onde você corta se errar.</div>`},
    rr:{title:"Stop-loss, Take-profit e R:R",body:`
      <p>Todo trade deve ter um plano de saída <b>antes</b> de entrar.</p>
      <ul><li><b>Stop-loss (SL)</b> — o preço onde você admite o erro e corta.</li><li><b>Take-profit (TP)</b> — o preço onde realiza ganhos.</li><li><b>Razão Risco/Retorno (R:R)</b> — quanto você mira vs quanto arrisca.</li></ul>
      <p>Um R:R de <b>1:3</b> significa arriscar 100 $ para mirar 300 $. Com essa razão você pode errar mais do que acerta e ainda ser <b>lucrativo</b>.</p>
      <div class="callout">📐 Mire ao menos 1:2. Abaixo disso, a menor sequência de perdas afunda você.</div>`},
    journal:{title:"Diário e psicologia",body:`
      <p>Seu pior inimigo no trading não é o mercado: é <b>você</b> (medo, ganância, vingança).</p>
      <h4>O diário de trading</h4>
      <p>Anote cada trade: entrada, saída, motivo, emoção sentida, resultado. É assim que você descobre erros recorrentes e melhora de verdade.</p>
      <ul><li><b>FOMO</b> — comprar por medo de ficar de fora = entrar tarde.</li><li><b>Revenge trading</b> — querer "recuperar" após uma perda = desastre.</li><li><b>Disciplina > motivação</b> — um plano seguido a frio vence o instinto.</li></ul>
      <div class="callout">🧠 Mantra do Professional Trader: "Plan the trade, trade the plan." Decida a frio, execute sem emoção.</div>`},
    strategy:{title:"Construir sua estratégia",body:`
      <p>Uma estratégia é um conjunto de <b>regras escritas</b> que você segue sem improvisar. Três grandes estilos:</p>
      <ul><li><b>Scalping</b> — muitos trades bem curtos (minutos). Intenso, exigente.</li><li><b>Swing</b> — manter uma posição alguns dias/semanas numa tendência.</li><li><b>Investimento (DCA)</b> — comprar regularmente no longo prazo, sem timing.</li></ul>
      <h4>Sua estratégia deve definir</h4>
      <p>Qual mercado · qual TF · condição de entrada · stop-loss · take-profit · tamanho de posição · regra de gestão emocional.</p>
      <div class="callout">🏋️ Exercício do Professional Trader: escreva UMA estratégia (estilo swing), e teste-a em 10 trades no Simulador respeitando cada regra. Anote tudo no diário.</div>`}
  }, quiz:[
    {q:"Na análise multi-timeframe, você opera…",a:["Contra a tendência maior","No sentido da tendência maior, entrada afinada na TF menor","Só em 1 minuto","Ao acaso"],correct:1},
    {q:"A regra dos 1% diz para…",a:["Ganhar 1% garantido por dia","Nunca arriscar mais de 1-2% do capital por trade","Investir 1% em Bitcoin","Pagar 1% de taxas"],correct:1},
    {q:"O position sizing depende sobretudo de…",a:["Seu entusiasmo pela moeda","Seu risco aceito e a distância ao seu stop-loss","O número de seguidores do projeto","A cor do candle"],correct:1},
    {q:"Uma razão Risco/Retorno de 1:3 significa…",a:["Arriscar 300 para ganhar 100","Arriscar 100 para mirar 300","Três trades por dia","30% de taxas"],correct:1},
    {q:"O que é revenge trading?",a:["Uma estratégia vencedora","Querer recuperar uma perda, muitas vezes desastroso","Um tipo de ordem","Operar à noite"],correct:1},
    {q:"Para que serve um diário de trading?",a:["Para nada","Descobrir erros recorrentes e melhorar","Pagar menos imposto","Minerar moedas"],correct:1}
  ]},
  8:{ modules:{
    copilot:{title:"A IA, seu copiloto cripto",body:`
      <p>A IA (Claude, ChatGPT…) não substitui seu cérebro: é um <b>copiloto</b> que economiza muito tempo em pesquisa, análise e aprendizado.</p>
      <ul><li><b>Explicar</b> um conceito complexo no seu nível.</li><li><b>Resumir</b> um whitepaper de 40 páginas em 10 linhas.</li><li><b>Brainstormar</b> uma estratégia ou um projeto.</li><li><b>Programar</b> um script, um bot, um smart contract simples.</li></ul>
      <div class="callout">💡 Este app da MOON-RZ Academy foi construído com IA. A IA é um multiplicador de força para um criador solo.</div>`},
    prompt:{title:"Fazer bons prompts",body:`
      <p>A qualidade da resposta depende da qualidade da pergunta. Um bom <b>prompt</b> dá contexto e um objetivo claro.</p>
      <h4>A receita R-C-T</h4>
      <ul><li><b>Papel (Role)</b> — "Aja como um analista cripto expert."</li><li><b>Contexto</b> — os dados, seu nível, a restrição.</li><li><b>Tarefa</b> — o que você quer exatamente, e o formato de saída.</li></ul>
      <div class="callout warn">⚠️ Seja preciso: "analise BTC" é vago. "Me dê suporte, resistência e tendência do BTC em H4, em 5 tópicos" é acionável.</div>`},
    analyst:{title:"Criar um analista cripto com IA",body:`
      <p>Você pode transformar uma IA em um <b>assistente de análise</b> reutilizável, com instruções fixas.</p>
      <h4>Exemplo de instrução</h4>
      <p>"Você é meu analista. Para cada ativo que eu der, responda sempre com: tendência, níveis-chave, volume, nível de risco /10 e um plano em uma frase. Nunca conselho financeiro, só análise."</p>
      <div class="callout">🎯 A IA estrutura seu raciocínio e força você a seguir o método da Academia 6. A decisão final continua sendo VOCÊ.</div>`},
    scanner:{title:"Scanner de mercado com IA",body:`
      <p>Um <b>scanner</b> filtra a informação para o que importa, e a IA acelera esse filtro.</p>
      <ul><li>Resumir as notícias e o sentimento do mercado do dia.</li><li>Comparar vários projetos por critérios fixos (equipe, tokenomics, liquidez…).</li><li>Detectar sinais para investigar — <b>nunca</b> para executar às cegas.</li></ul>
      <div class="callout warn">⚠️ Um sinal de IA é uma <b>pista</b>, não uma ordem. Sempre verifique os dados você mesmo antes de agir.</div>`},
    agents:{title:"Agentes de IA e automação",body:`
      <p>Um <b>agente de IA</b> é uma IA que encadeia ações rumo a um objetivo (buscar, analisar, redigir, às vezes executar via ferramentas).</p>
      <ul><li>Automatizar um monitoramento diário.</li><li>Gerar relatórios periódicos.</li><li>Assistir a criação (conteúdo, código, design).</li></ul>
      <div class="callout warn">⚠️ Perigo real: um agente ligado a uma carteira ou exchange pode causar estragos se mal delimitado. Comece em modo leitura / no simulador.</div>`},
    ailimits:{title:"Limites e segurança da IA",body:`
      <p>A IA é poderosa mas falível. Conhecer os limites = usá-la com inteligência.</p>
      <ul><li><b>Alucinações</b> — a IA pode inventar fatos com confiança. Verifique números e contratos.</li><li><b>Dados desatualizados</b> — pode não conhecer os preços do momento.</li><li><b>Segurança</b> — NUNCA dê sua seed phrase ou chaves privadas a uma IA ou a qualquer site.</li></ul>
      <div class="callout">🧠 Regra do AI Trader: a IA <b>assiste</b> sua decisão, não a <b>substitui</b>. Mantenha sempre o controle e o senso crítico.</div>`}
  }, quiz:[
    {q:"Qual o bom papel da IA na cripto?",a:["Decidir por você","Um copiloto que acelera pesquisa e análise","Guardar suas chaves privadas","Garantir lucros"],correct:1},
    {q:"Um bom prompt contém idealmente…",a:["Uma só palavra vaga","Papel, contexto e uma tarefa clara com formato","Só emojis","Sua seed phrase"],correct:1},

  9:{ modules:{
    standards:{title:"Os padrões de token",body:`
      <p>Criar um token é seguir um <b>padrão</b> reconhecido para ser compatível com carteiras e exchanges.</p>
      <ul><li><b>ERC-20</b> (Ethereum) — o padrão dos tokens fungíveis.</li><li><b>BEP-20</b> (BNB Chain) — o equivalente, taxas mais baixas.</li><li>Na Solana é o programa <b>SPL Token</b>.</li></ul>
      <p>Um token é definido por: um <b>nome</b>, um <b>símbolo</b> (ex. MOON), uma <b>oferta total</b> e um número de <b>decimais</b>.</p>
      <div class="callout">💡 Tecnicamente, criar um token básico é simples. O difícil — e o que importa — é tudo ao redor (utilidade, liquidez, confiança).</div>`},
    contract:{title:"O contrato do token",body:`
      <p>O token vive num <b>smart contract</b> que define suas regras: quem pode mintar, queimar, e com que limites.</p>
      <ul><li><b>Mint</b> — criar novos tokens.</li><li><b>Burn</b> — destruir alguns (reduz a oferta, deflacionário).</li><li><b>Owner / permissões</b> — quem controla o quê.</li></ul>
      <div class="callout warn">⚠️ Um contrato mal escrito = porta aberta a hacks e rug pulls. Para um lançamento real, uma <b>auditoria</b> profissional é indispensável.</div>`},
    liquidity9:{title:"Liquidez e lançamento",body:`
      <p>Um token sem <b>liquidez</b> não vale nada: ninguém consegue comprar nem vender.</p>
      <h4>Criar um mercado</h4>
      <p>Cria-se um <b>pool de liquidez</b> numa DEX (ex. seu token + USDC). A proporção depositada define o preço inicial.</p>
      <ul><li><b>Travar a liquidez</b> tranquiliza: a equipe não pode retirar tudo.</li><li>Comunique o contrato oficial para evitar tokens falsos (ver Academia 2).</li></ul>
      <div class="callout">🔒 Liquidez travada + contrato auditado = dois sinais de seriedade que um investidor esperto procura.</div>`},
    vesting:{title:"O vesting",body:`
      <p>O <b>vesting</b> desbloqueia os tokens <b>gradualmente</b> no tempo, em vez de liberar tudo de uma vez.</p>
      <ul><li>Impede a equipe e os primeiros investidores de vender tudo no lançamento (um "dump").</li><li>Alinha os interesses no <b>longo prazo</b>.</li><li>Costuma aparecer num calendário de emissão.</li></ul>
      <div class="callout warn">⚠️ Antes de investir num projeto, olhe o vesting: se grandes quantidades desbloqueiam logo, o preço pode cair.</div>`},
    governance:{title:"A governança",body:`
      <p>Um token pode dar <b>poder de decisão</b>: isso é governança (ligada às DAOs, Academia 5).</p>
      <ul><li>Ter o token = votar na evolução do projeto.</li><li>Decisões e tesouro geridos de forma transparente, on-chain.</li><li>O desafio: evitar o domínio das <b>baleias</b> sobre todos os votos.</li></ul>
      <div class="callout">⚖️ Um bom design de governança distribui o poder e incentiva a participação da comunidade.</div>`},
    launch9:{title:"Lançar um token responsável",body:`
      <p>Resumo de um lançamento <b>sério</b>, o oposto de um golpe:</p>
      <ul><li><b>1.</b> Utilidade clara — para que serve de verdade o token.</li><li><b>2.</b> Contrato auditado, permissões saudáveis.</li><li><b>3.</b> Tokenomics transparente (oferta, distribuição, vesting).</li><li><b>4.</b> Liquidez fornecida e travada.</li><li><b>5.</b> Comunidade informada, contrato oficial publicado.</li></ul>
      <div class="callout">🪙 Mantra do Token Engineer: "Um token só tem valor pelo que se pode fazer com ele." Construa o uso antes do preço. É exatamente a lógica do token MOON-RZ.</div>`}
  }, quiz:[
    {q:"Qual o padrão dos tokens fungíveis no Ethereum?",a:["ERC-721","ERC-20","SPL","BTC-1"],correct:1},
    {q:"O que a operação « burn » faz?",a:["Cria tokens","Destrói tokens e reduz a oferta","Trava a liquidez","Minta um NFT"],correct:1},
    {q:"Por que travar a liquidez?",a:["Para pagar menos gas","Para tranquilizar: a equipe não pode retirar tudo","Para aumentar os decimais","Para minerar"],correct:1},
    {q:"Para que serve o vesting?",a:["Desbloquear tokens gradualmente e evitar dumps","Criar um NFT","Auditar o código","Pagar taxas"],correct:0},

    m_wallet:{title:"Checkpoint 1 — Carteira e segurança",body:`
      <p>Bem-vindo à última academia. Aqui você não descobre mais: você <b>conecta tudo</b> e prova seu domínio.</p>

    m_nft:{title:"Checkpoint 3 — NFT e criação",body:`
      <p>Você vê o NFT pelo que ele é: um <b>certificado de propriedade</b> e um portador de utilidade.</p>

    m_trade:{title:"Checkpoint 4 — Trading e risco",body:`

      <div class="callout">🏋️ Prova pela ação: aplique uma estratégia completa no <b>Simulador</b>, do plano de entrada ao stop-loss.</div>`},
    m_build:{title:"Checkpoint 5 — Construir e tokenizar",body:`

      <div class="callout">🏆 Passe no exame final para conquistar o <b>MOON-RZ MASTER NFT</b> e alcançar o rank supremo: <b>MOON-RZ Legend</b>. O verdadeiro domínio é continuar aprendendo. 🚀</div>`}

 de:{
  1:{ modules:{
    bc:{title:"Was ist eine Blockchain?",body:`
      <p>Eine <b>Blockchain</b> ist ein riesiges Register, das von Tausenden Computern weltweit geteilt wird. Niemand besitzt es, und jeder kann es überprüfen.</p>
      <h4>Die Kernidee</h4>
      <p>Transaktionen werden in <b>Blöcken</b> gebündelt. Jeder Block ist mit dem vorherigen durch einen kryptografischen Fingerabdruck (einen <code>Hash</code>) verbunden. Daher der Name: eine <i>Kette von Blöcken</i>.</p>
      <ul><li><b>Dezentral</b> — keine Bank, kein zentraler Server.</li><li><b>Unveränderlich</b> — einmal geschrieben, lässt sich die Vergangenheit nicht ändern.</li><li><b>Transparent</b> — jeder kann alles prüfen.</li></ul>
      <div class="callout">💡 Analogie: ein öffentliches Google Doc, das Tausende gleichzeitig kopieren. Schummelt jemand in seiner Kopie, lehnen die anderen sie automatisch ab.</div>`},
    btc:{title:"Bitcoin — das digitale Gold",body:`
      <p><b>Bitcoin (BTC)</b> ist die erste Blockchain, 2009 von Satoshi Nakamoto erschaffen. Ziel: digitales Geld ohne Bank, unmöglich zu fälschen.</p>
      <h4>Warum „digitales Gold"?</h4>
      <ul><li>Angebot <b>auf 21 Millionen</b> BTC begrenzt. Nie mehr.</li><li>Gesichert durch <b>Proof of Work</b> (Mining).</li><li>Vor allem als <b>Wertspeicher</b> genutzt.</li></ul>
      <div class="callout">Der kleinste Teil von Bitcoin ist ein <code>Satoshi</code>: 1 BTC = 100.000.000 Satoshis.</div>`},
    eth:{title:"Ethereum — der Weltcomputer",body:`
      <p><b>Ethereum (ETH)</b> dient nicht nur zum Geldsenden: es ist eine Plattform, die <b>Smart Contracts</b> ausführt.</p>
      <p>Darauf baut man dezentrale Apps (<code>dApps</code>): DeFi, NFTs, DAOs, Web3-Spiele.</p>
      <ul><li>Native Münze: <b>Ether (ETH)</b>.</li><li>Die Gebühren heißen <b>Gas</b>.</li><li>Seit 2022 nutzt es <b>Proof of Stake</b>, viel umweltfreundlicher.</li></ul>`},
    bnb:{title:"BNB Chain — schnell und günstig",body:`
      <p><b>BNB Chain</b> ist Ethereum-kompatibel, mit <b>sehr niedrigen Gebühren</b> und schnellen Transaktionen.</p>
      <ul><li>Native Münze: <b>BNB</b>.</li><li><b>EVM</b>-kompatibel: dieselben Wallets und Tools wie Ethereum.</li><li>Sehr beliebt bei Einsteigern.</li></ul>
      <div class="callout warn">⚠️ Niedrige Gebühren bedeuten auch viele Betrügereien und Fake-Tokens. (Academy 2)</div>`},
    sc:{title:"Smart Contracts",body:`
      <p>Ein <b>Smart Contract</b> ist ein Programm auf der Blockchain, das von selbst läuft, sobald seine Bedingungen erfüllt sind. Kein Mittelsmann.</p>
      <h4>Beispiel</h4><p>« <i>Wenn ich 1 ETH erhalte, sende ich dieses NFT an den Käufer.</i> » Der Code ist Gesetz: <code>code is law</code>.</p>
      <div class="callout">Automatisch und fälschungssicher, aber bei einem Bug im Code gibt es keinen Kundendienst. Daher die <b>Audits</b>.</div>`},
    wallet:{title:"Die Wallets",body:`
      <p>Eine <b>Wallet</b> „enthält" nicht deine Kryptos (die liegen auf der Blockchain). Sie enthält deine <b>Schlüssel</b>.</p>
      <ul><li><b>Öffentliche Adresse</b> — wie eine IBAN, zum Empfangen.</li><li><b>Privater Schlüssel</b> — das ultimative Passwort, niemals geteilt.</li><li><b>Seed Phrase</b> (12/24 Wörter) — das Backup der Wallet.</li></ul>
      <div class="callout warn">🔒 „Not your keys, not your coins." Schreibe deine Seed Phrase auf Papier, nie als Foto oder in die Cloud.</div>`}
  }, quiz:[
    {q:"Was macht eine Blockchain « unveränderlich »?",a:["Eine Zentralbank schützt sie","Jeder Block ist mit dem vorherigen per Hash verbunden","Ein Admin-Passwort","Sie liegt auf einem einzigen Server"],correct:1},
    {q:"Wie hoch ist das maximale Angebot von Bitcoin?",a:["100 Millionen","Unbegrenzt","21 Millionen","1 Milliarde"],correct:2},
    {q:"Wofür dient Ethereum über das Geldsenden hinaus?",a:["Bitcoin minen","Smart Contracts und dApps ausführen","Dateien speichern","Zentralbanken ersetzen"],correct:1},
    {q:"Was darfst du NIEMALS teilen?",a:["Deine öffentliche Adresse","Deinen Nicknamen","Deine Seed Phrase / privaten Schlüssel","Den Namen deiner Blockchain"],correct:2},
    {q:"Die Gebühren auf Ethereum heißen…",a:["Gas","Satoshi","Staking","Hash"],correct:0},
    {q:"« Not your keys, not your coins » bedeutet…",a:["Krypto auf einer Börse halten","Wer die Schlüssel hat, kontrolliert die Gelder","Schlüssel sind kostenlos","Man kann Krypto nicht verlieren"],correct:1}
  ]},
  2:{ modules:{
    scam:{title:"Krypto-Betrug: Überblick",body:`
      <p>Krypto hat keinen Mittelsmann: <b>keine Bank macht</b> eine Transaktion rückgängig. Das ist Freiheit… aber auch der Spielplatz der Betrüger. Dein bester Schutz bist <b>du</b>.</p>
      <h4>Die großen Familien</h4>
      <ul><li><b>Phishing</b> — Fake-Seiten/Nachrichten, die deinen Zugang stehlen.</li><li><b>Rug Pull</b> — das Team eines Projekts verschwindet mit den Geldern.</li><li><b>Wallet Drainer</b> — eine manipulierte Signatur, die deine Wallet leert.</li><li><b>Fake-Airdrops / Fake-Tokens</b> — Köder, damit du unterschreibst.</li></ul>
      <div class="callout warn">🚩 Regel Nr. 1: Klingt es zu gut, um wahr zu sein (×10 garantiert, „verdopple dein ETH"), ist es Betrug. Immer.</div>`},
    phish:{title:"Phishing",body:`
      <p><b>Phishing</b> imitiert eine dir bekannte Seite/Dienst, um deine Seed Phrase zu stehlen oder dich zum Unterschreiben zu bringen.</p>
      <h4>So erkennst du es</h4>
      <ul><li>Prüfe die <b>URL Zeichen für Zeichen</b>: <code>binance.com</code> ≠ <code>binqnce.com</code>.</li><li>Vorsicht bei <b>Google-Anzeigen</b> oben in den Ergebnissen — oft gefälscht.</li><li><b>Kein</b> seriöser Support fragt nach deiner Seed Phrase.</li><li>Speichere die echten Seiten als Lesezeichen und gehe immer darüber.</li></ul>
      <div class="callout warn">⚠️ Eine Seite, die nach deinen 12/24 Wörtern fragt = 100% Betrug. Keine Ausnahmen.</div>`},
    rug:{title:"Rug Pulls",body:`
      <p>Ein <b>Rug Pull</b>: ein Team erstellt einen Token, lockt Käufer an und <b>entzieht dann die gesamte Liquidität</b> und verschwindet. Der Preis stürzt auf null.</p>
      <h4>Warnzeichen</h4>
      <ul><li><b>Anonymes</b> Team ohne Track Record.</li><li><b>Liquidität nicht gesperrt</b>.</li><li>Wenige Wallets halten <b>den Großteil</b> der Tokens.</li><li>Riesiger Hype, Gewinnversprechen, kein echtes Produkt.</li></ul>
      <div class="callout">🔎 Tools: ein Block Explorer (Etherscan/BscScan) + Contract-Scanner, um die Holder-Verteilung zu sehen.</div>`},
    drain:{title:"Wallet Drainer und Approvals",body:`
      <p>Du musst nicht deinen privaten Schlüssel hergeben, um geleert zu werden: eine manipulierte <b>Freigabe (Approval)</b> zu unterschreiben reicht.</p>
      <h4>Die klassische Falle</h4>
      <p>Ein Fake-„Mint" oder „Claim" lässt dich ein <code>approve</code> unterschreiben, das dem Angreifer erlaubt, deine Tokens auszugeben. Später leert er alles.</p>
      <ul><li>Lies, <b>was du unterschreibst</b>: eine „set approval for all"-Nachricht ist gefährlich.</li><li>Widerrufe ungenutzte Freigaben (z. B. <code>revoke.cash</code>).</li><li>Nutze eine <b>Burner-Wallet</b> für riskante Mints.</li></ul>
      <div class="callout warn">🖊️ Eine Signatur kann so teuer sein wie eine geleakte Seed Phrase. Geh langsam, bevor du „Confirm" klickst.</div>`},
    fake:{title:"Fake-Airdrops und Fake-Tokens",body:`
      <p>Du erhältst „gratis" einen seltsamen Token in deiner Wallet. Das ist ein <b>Köder</b>.</p>
      <ul><li><b>Niemals</b> mit einem unbekannten, grundlos erhaltenen Token interagieren.</li><li>„Airdrops", die verlangen, die <b>Wallet zu verbinden und zu unterschreiben</b> auf einer dubiosen Seite = Drainer.</li><li>Prüfe die offizielle Token-Adresse auf der <b>echten</b> Seite/Twitter des Projekts.</li></ul>
      <div class="callout">🎁 Ein echter Airdrop verlangt nie, Gelder zu senden, „um deine Belohnung freizuschalten".</div>`},
    audit:{title:"Deine Sicherheits-Checkliste",body:`
      <p>Bevor du ein Projekt anfasst, geh diese <b>schnelle Audit-Checkliste</b> durch:</p>
      <ul><li>✅ URL geprüft + als Lesezeichen</li><li>✅ Team identifizierbar / Reputation</li><li>✅ Contract auditiert, Liquidität gesperrt</li><li>✅ Gesunde Holder-Verteilung</li><li>✅ Ich verstehe, was ich unterschreibe</li><li>✅ Burner-Wallet für riskante Aktionen</li><li>✅ Seed Phrase offline, nie online eingegeben</li></ul>
      <div class="callout">🛡️ Mantra des Crypto Guardian: <b>„Langsam machen, prüfen, dann unterschreiben."</b> Eile ist der Freund des Diebs.</div>`}
  }, quiz:[
    {q:"Eine Seite fragt nach deinen 12 Seed-Wörtern. Was tust du?",a:["Eingeben, das ist der Support","Verlassen: kein seriöser Dienst fragt danach","Nur die ersten 6 geben","Einen Freund fragen"],correct:1},
    {q:"Was ist ein Rug Pull?",a:["Ein Netzwerk-Update","Das Team entzieht die Liquidität und verschwindet","Eine Art Staking","Eine Hardware-Wallet"],correct:1},
    {q:"Wie leert ein Drainer eine Wallet ohne deinen privaten Schlüssel?",a:["Indem er dein Passwort errät","Über eine manipulierte Signatur/Freigabe","Indem er deine Coins mint","Per E-Mail"],correct:1},
    {q:"Was ist ein starkes Rug-Pull-Signal?",a:["Gesperrte Liquidität","Anonymes Team + nicht gesperrte Liquidität","Auditierter Contract","Viele verteilte Holder"],correct:1},
    {q:"Du bekommst gratis einen unbekannten Token. Gute Reaktion?",a:["Schnell verkaufen","Nicht damit interagieren","Klicken, um die Seite zu sehen","Zurücksenden"],correct:1},
    {q:"Der richtige Reflex vor dem Unterschreiben einer Transaktion?",a:["Schnell unterschreiben, bevor der Preis steigt","Lesen, was ich unterschreibe, und die URL prüfen","Antivirus deaktivieren","Meinen Bildschirm teilen"],correct:1}
  ]},
  3:{ modules:{
    dex:{title:"DEX vs CEX",body:`
      <p>Es gibt zwei Wege, Krypto zu tauschen:</p>
      <h4>CEX — zentralisierte Börse</h4>
      <p>Wie Binance, Coinbase. Eine Firma verwahrt deine Gelder. Praktisch, aber <b>„not your keys, not your coins"</b>: du hängst von ihr ab.</p>
      <h4>DEX — dezentrale Börse</h4>
      <p>Wie Uniswap, PancakeSwap. Du tauschst <b>direkt aus deiner Wallet</b>, ohne Mittelsmann. Ein Smart Contract regelt den Swap.</p>
      <ul><li>CEX = einfach, schnell, aber zentralisiert und mit KYC.</li><li>DEX = selbstverwaltet, 24/7 offen, aber du bist allein verantwortlich.</li></ul>
      <div class="callout">💡 DeFi (dezentrale Finanzen) ist das ganze Universum von Finanzdiensten auf Smart Contracts, ohne Bank.</div>`},
    lp:{title:"Liquidity Pools und AMM",body:`
      <p>Auf einer DEX gibt es kein klassisches Orderbuch: <b>Liquidity Pools</b> machen die Swaps möglich.</p>
      <h4>So funktioniert's</h4>
      <p>Nutzer (die <b>LPs, Liquiditätsgeber</b>) hinterlegen zwei Assets zu gleichem Wert, z. B. ETH + USDC. Ein Algorithmus namens <b>AMM</b> bestimmt den Preis über die Formel <code>x · y = k</code>.</p>
      <ul><li>Du stellst Liquidität bereit → du verdienst <b>Trading-Gebühren</b>.</li><li>Im Gegenzug erhältst du einen <b>LP-Token</b>, der deinen Anteil am Pool darstellt.</li></ul>
      <div class="callout">Je mehr Liquidität in einem Pool, desto weniger bewegt sich der Preis pro Trade (geringes <i>Slippage</i>).</div>`},
    yield:{title:"Yield Farming",body:`
      <p><b>Yield Farming</b> heißt, seine Kryptos arbeiten zu lassen, um Rendite zu erzeugen, oft durch Stapeln mehrerer Protokolle.</p>
      <ul><li>Du stellst Liquidität bereit → du bekommst LP-Tokens.</li><li>Du stakest diese LP-Tokens → du erhältst Belohnungs-Tokens.</li><li>Die Rendite misst man in <b>APR / APY</b> (Jahresrate).</li></ul>
      <div class="callout warn">⚠️ APYs von 1000% gibt es… sind aber fast immer nicht nachhaltig. Hohe Rendite = hohes Risiko. Frag dich immer „woher kommt diese Rendite?".</div>`},
    stake:{title:"Staking",body:`
      <p><b>Staking</b> heißt, seine Tokens zu sperren, um ein <b>Proof-of-Stake</b>-Netzwerk zu sichern, und dafür Belohnungen zu erhalten.</p>
      <ul><li>Du sperrst Tokens (z. B. ETH, SOL) → du verdienst regelmäßige Rendite.</li><li>Stabiler und einfacher als Yield Farming.</li><li>Achte auf die <b>Unbonding-Zeiten</b>: deine Gelder können einige Tage gesperrt sein.</li></ul>
      <div class="callout">Staking ≈ „Geld, das Zinsen bringt", während du die Kontrolle über deine Schlüssel behältst.</div>`},
    lend:{title:"Lending & Borrowing",body:`
      <p>Protokolle wie Aave erlauben, deine Kryptos zu <b>verleihen</b> (und Zinsen zu verdienen) oder zu <b>leihen</b> (gegen Sicherheiten).</p>
      <h4>Das Kernkonzept: Überbesicherung</h4>
      <p>Um 100 $ zu leihen, musst du mehr als 100 $ Sicherheiten hinterlegen (z. B. 150 $). Fällt deine Sicherheit zu stark, wirst du automatisch <b>liquidiert</b>.</p>
      <ul><li>Verleiher → passives Einkommen auf deine Kryptos.</li><li>Leiher → Liquidität, ohne deine Assets zu verkaufen.</li></ul>
      <div class="callout warn">⚠️ Die Liquidation ist die Gefahr Nr. 1 beim Leihen. Halte stets einen komfortablen Sicherheitspuffer.</div>`},
    derisk:{title:"Die Risiken der DeFi",body:`
      <p>DeFi ist mächtig, hat aber eigene Risiken. Sie zu kennen ist die halbe Miete.</p>
      <ul><li><b>Impermanent Loss</b> — beim Bereitstellen von Liquidität kannst du, wenn die Preise auseinandergehen, mit weniger Wert enden als bloßes Halten.</li><li><b>Smart-Contract-Risiko</b> — ein Bug oder Hack kann ein Protokoll leeren.</li><li><b>Rug Pulls / Fake-Protokolle</b> — siehe Academy 2.</li><li><b>Liquidationsrisiko</b> — beim Leihen.</li></ul>
      <div class="callout">🧠 Regel des DeFi Builder: stecke nie mehr in ein Protokoll, als du verlieren kannst, und bevorzuge etablierte, auditierte Protokolle.</div>`}
  }, quiz:[

  4:{ modules:{
    nftbasic:{title:"NFT: die Grundlagen",body:`
      <p>Ein <b>NFT</b> (Non-Fungible Token) ist ein <b>einzigartiger</b>, fälschungssicherer Token auf einer Blockchain. „Nicht fungibel" = nicht austauschbar, anders als 1 €, das jedem anderen 1 € gleicht.</p>
      <ul><li>Beweist <b>Eigentum</b> und <b>Echtheit</b> eines digitalen (oder physischen) Vermögenswerts.</li><li>Jedes NFT hat eine eindeutige ID und eine öffentliche Historie.</li></ul>
      <div class="callout warn">⚠️ Häufiger Irrtum: „ein NFT ist nur ein Bild". Nein — es ist ein <b>Eigentumsnachweis</b> auf der Blockchain. Das Bild ist nur eine mögliche Nutzung.</div>`},
    collec:{title:"Collections und Standards",body:`
      <p>Die meisten NFTs sind in <b>Collections</b> gruppiert (z. B. 10.000 Stücke mit gemeinsamem Thema).</p>
      <h4>Die technischen Standards</h4>
      <ul><li><b>ERC-721</b> — jeder Token ist einzigartig (1 Werk = 1 Token).</li><li><b>ERC-1155</b> — erlaubt Semi-Fungibles (z. B. 100 Kopien desselben Spielitems).</li></ul>
      <p>Die <b>Seltenheit</b> (seltene Merkmale) beeinflusst den wahrgenommenen Wert in einer Collection stark.</p>
      <div class="callout">Die Metadaten (Bild, Attribute) liegen oft auf IPFS, um dezentral und dauerhaft zu bleiben.</div>`},
    utility:{title:"Utility-NFTs",body:`
      <p>Ein <b>Utility-NFT</b> gewährt Zugang zu etwas: das ist sein echter Wert, über das Bild hinaus.</p>
      <ul><li><b>Zugang / Mitgliedschaft</b> — Eintritt in eine Community, ein Event, Premium-Inhalte (wie die NFTs der MOON-RZ Academy 😉).</li><li><b>Vorteile</b> — Rabatte, Airdrops, Stimmrechte.</li><li><b>Zertifizierungen</b> — ein verifizierbares Diplom oder Abzeichen.</li></ul>
      <div class="callout">💡 Die Frage vor dem Kauf: „Was bringt dieses NFT konkret?". Dient es nur der Spekulation, ist das Risiko hoch.</div>`},
    gaming:{title:"Gaming-NFTs",body:`
      <p>In Web3-Spielen können Items (Charaktere, Waffen, Land) NFTs sein, die du <b>wirklich besitzt</b> und weiterverkaufen kannst.</p>
      <ul><li><b>Play-to-Earn</b> — Tokens/NFTs durchs Spielen verdienen.</li><li><b>Interoperabilität</b> — die (noch junge) Idee, ein Item in mehreren Spielen zu nutzen.</li></ul>
      <div class="callout warn">⚠️ Viele P2E-Spiele kollabierten, weil ihre Wirtschaft vom ständigen Zustrom neuer Spieler abhing. Bewerte stets die <b>wirtschaftliche Nachhaltigkeit</b> des Spiels.</div>`},
    rwa:{title:"Real World Assets (RWA)",body:`
      <p><b>RWAs</b> tokenisieren reale Vermögenswerte: Immobilien, Kunst, Anleihen, Gold… dargestellt durch einen Token auf der Blockchain.</p>
      <ul><li>Ermöglichen <b>Bruchteilseigentum</b> (1% einer Wohnung besitzen).</li><li>Mehr Liquidität für sonst schwer verkäufliche Assets.</li><li>Stark wachsender Sektor, eng an die <b>Regulierung</b> gebunden.</li></ul>
      <div class="callout">Ein anderes Projekt von dir (STAYLO) geht genau um die Tokenisierung realer Assets — genau das Thema dieses Moduls.</div>`},
    mint:{title:"Ein NFT erstellen und listen",body:`
      <p>Schritte von der Idee zum NFT zum Verkauf:</p>
      <ul><li><b>1. Erstellen</b> des Visuals / Inhalts und seiner Metadaten.</li><li><b>2. Mint</b> — das NFT auf der Blockchain registrieren (über Marktplatz oder Contract).</li><li><b>3. Listen</b> — zum Verkauf anbieten (Festpreis oder Auktion) auf einem Marktplatz (OpenSea, Magic Eden…).</li><li><b>4. Royalties</b> — einen % festlegen, den du bei jedem künftigen Weiterverkauf erhältst.</li></ul>
      <div class="callout">🎨 Tipp des NFT Architect: der Wert einer Collection ist zu 80% <b>Community und Utility</b>, zu 20% Kunst. Baue beides.</div>`}

  5:{ modules:{
    brand:{title:"Web3-Branding",body:`
      <p>Im Web3 ist deine <b>Marke</b> das, was Vertrauen schafft in einem Ozean von Projekten. Vor der Technik kommt die <b>Geschichte</b>.</p>
      <ul><li><b>Klare Mission</b> — welches Problem du löst, für wen.</li><li><b>Visuelle Identität</b> — Logo, Farben, Ton (wie das Mond-Universum von MOON-RZ).</li><li><b>Konsistenz</b> — dieselbe Botschaft überall (Website, X, Discord).</li></ul>
      <div class="callout">💡 Menschen kaufen keinen Token, sie schließen sich einer <b>Vision</b> an. Erzähl eine Geschichte, zu der sie gehören wollen.</div>`},
    community:{title:"Community aufbauen",body:`
      <p>In Krypto ist <b>die Community das Produkt</b>. Ein Projekt ohne Community ist tot, selbst mit toller Technik.</p>
      <ul><li><b>Discord / Telegram</b> — das tägliche Hauptquartier.</li><li><b>X (Twitter)</b> — das Schaufenster und die Akquise.</li><li><b>Echtes Engagement</b> — antworten, zuhören, aktive Mitglieder belohnen.</li></ul>
      <div class="callout warn">⚠️ Vorsicht vor Vanity Metrics: 50.000 gekaufte Follower sind weniger wert als 500 echte, engagierte Fans. Ziel auf Qualität, nicht Lärm.</div>`},
    marketing:{title:"Krypto-Marketing",body:`
      <p>Web3-Marketing mischt die Klassiker mit ökosystem-eigenen Hebeln.</p>
      <ul><li><b>Bildungsinhalte</b> — Wert liefern, bevor man verkauft.</li><li><b>Partnerschaften & KOLs</b> — Krypto-Influencer (prüfen, viele Fakes).</li><li><b>Airdrops & Quests</b> — Aktion belohnen, um die Community zu starten (das Learn→Earn-Modell).</li></ul>
      <div class="callout">Das beste Krypto-Marketing bleibt ein funktionierendes Produkt + Nutzer, die von selbst darüber reden.</div>`},
    dao:{title:"Die DAOs",body:`
      <p>Eine <b>DAO</b> (Dezentrale Autonome Organisation) ist eine Organisation, die von ihrer Community über die Blockchain regiert wird, statt von einem Chef.</p>
      <ul><li><b>Governance-Tokens</b> — den Token halten = Stimmrecht.</li><li><b>Vorschläge & Abstimmungen</b> — die Community entscheidet über Entwicklung und Treasury.</li><li><b>Transparenz</b> — Entscheidungen und Gelder on-chain sichtbar.</li></ul>
      <div class="callout">⚖️ Kernherausforderung: verhindern, dass wenige Großhalter („Wale") alle Abstimmungen kontrollieren. Das Governance-Design zählt so viel wie die Technik.</div>`},
    tokenomics:{title:"Tokenomics",body:`
      <p><b>Tokenomics</b> ist die Wirtschaft deines Tokens: was bestimmt, ob er über die Zeit Wert hält.</p>
      <ul><li><b>Angebot</b> — gesamt, im Umlauf, Inflation/Deflation.</li><li><b>Verteilung</b> — Team, Community, Investoren, und das <b>Vesting</b> (schrittweise Freigabe).</li><li><b>Utility</b> — warum den Token halten? (Gas, Governance, Zugang, Belohnungen…).</li><li><b>Angebot vs Nachfrage</b> — ein nützlicher, knapper Token gewinnt an Wert.</li></ul>
      <div class="callout">🧮 Der MOON-RZ-Token folgt dieser Logik: durch Aktion verdient (Learn→Earn) und ausgegeben, um Inhalte, NFTs und Wettbewerbe freizuschalten.</div>`},
    launch:{title:"Dein Projekt starten",body:`
      <p>Die Teile zusammensetzen, um von der Idee zum Launch zu kommen:</p>
      <ul><li><b>1. Vision & Whitepaper</b> — was, warum, wie.</li><li><b>2. Community</b> — baue sie VOR dem Launch.</li><li><b>3. Tokenomics</b> — gesund und transparent.</li><li><b>4. Produkt / MVP</b> — zeige, dass es funktioniert (wie diese App!).</li><li><b>5. Launch & Liquidität</b> — dann mit der Community iterieren.</li></ul>
      <div class="callout">🏗️ Mantra des Web3 Founder: „Community first, Hype second." Ein erfolgreicher Launch wird Monate im Voraus vorbereitet.</div>`}

  6:{ modules:{
    candles:{title:"Ein Chart lesen: die Kerzen",body:`
      <p>Der <b>japanische Kerzenchart</b> ist die Universalsprache des Traders. Jede Kerze fasst den Kampf Käufer/Verkäufer in einem Zeitraum zusammen.</p>
      <h4>Eine Kerze = 4 Preise</h4>
      <ul><li><b>Eröffnung</b> und <b>Schluss</b> (der Kerzenkörper).</li><li><b>Hoch</b> und <b>Tief</b> (die Dochte).</li><li><b>Grüner</b> Körper = Schluss über Eröffnung (Anstieg). <b>Rot</b> = Rückgang.</li></ul>
      <p>Der <b>Zeitrahmen (Timeframe)</b> ändert alles: eine 1-Minuten-Kerze ≠ eine 1-Tages-Kerze.</p>
      <div class="callout">💡 Öffne deinen <b>Simulator</b> parallel: du siehst echte Preise sich bewegen. Trading lernt man mit dem Auge am Markt, nicht in Büchern.</div>`},
    sr:{title:"Unterstützung und Widerstand",body:`
      <p>Das sind die wichtigsten Preisniveaus zu erkennen.</p>
      <h4>Unterstützung</h4>
      <p>Ein <b>Boden</b>, wo Käufer übernehmen und den Preis abprallen lassen. Der Preis „tut sich schwer", darunter zu fallen.</p>
      <h4>Widerstand</h4>
      <p>Eine <b>Decke</b>, wo Verkäufer übernehmen. Der Preis „tut sich schwer", darüber zu steigen.</p>
      <ul><li>Je öfter ein Niveau getestet wird, desto bedeutsamer ist es.</li><li>Eine durchbrochene Unterstützung wird oft zum Widerstand (und umgekehrt).</li></ul>
      <div class="callout warn">⚠️ Diese Niveaus sind <b>Zonen</b>, keine pixelgenauen Linien. Übertreib es nicht mit der Präzision.</div>`},
    trend:{title:"Die Trends",body:`
      <p>„<b>The trend is your friend</b>": die erste Frage des Traders ist immer „wohin geht der Markt?".</p>
      <ul><li><b>Aufwärtstrend</b> — höhere Hochs und höhere Tiefs.</li><li><b>Abwärtstrend</b> — tiefere Hochs und tiefere Tiefs.</li><li><b>Range</b> — der Preis schwankt seitwärts, ohne Richtung.</li></ul>
      <div class="callout">📐 Eine <b>Trendlinie</b> verbindet die Tiefs (im Aufwärtstrend) oder die Hochs (im Abwärtstrend). Ihr Bruch kann einen Richtungswechsel signalisieren.</div>`},
    volume:{title:"Das Volumen",body:`
      <p>Das <b>Volumen</b> = die in einem Zeitraum gehandelte Menge. Es ist der <b>Treibstoff</b> hinter einer Preisbewegung.</p>
      <ul><li>Ein Anstieg mit <b>hohem Volumen</b> = glaubwürdige, getragene Bewegung.</li><li>Ein Anstieg mit <b>geringem Volumen</b> = verdächtig, die Bewegung kann verpuffen.</li><li>Ein Volumenspitze begleitet oft Umkehrungen oder Ausbrüche.</li></ul>
      <div class="callout">🔎 Einfache Regel: das Volumen <b>bestätigt</b> den Preis. Ein Widerstandsbruch ohne Volumen ist verdächtig.</div>`},
    liquidity:{title:"Die Liquidität",body:`
      <p>Die <b>Liquidität</b> ist die Leichtigkeit, zu kaufen oder zu verkaufen, ohne den Preis zu bewegen. Viele Orders auf beiden Seiten = liquider Markt.</p>
      <ul><li><b>Liquides</b> Asset (BTC, ETH) → geringes <b>Slippage</b>, Ausführung nahe am gezeigten Preis.</li><li><b>Illiquides</b> Asset (kleiner Token) → eine große Order bewegt den Preis, Boden für Manipulation.</li></ul>
      <div class="callout warn">⚠️ Viele Fallen (Pump &amp; Dump) sind nur bei illiquiden Assets möglich. Bevorzuge tiefe Märkte am Anfang.</div>`},
    analyse:{title:"In die Praxis umsetzen",body:`
      <p>Bring alles zusammen für deine erste strukturierte <b>Marktanalyse</b>:</p>
      <ul><li><b>1. Trend</b> — aufwärts, abwärts oder Range?</li><li><b>2. Niveaus</b> — wo sind die wichtigen Unterstützungen und Widerstände?</li><li><b>3. Volumen</b> — bestätigt es die aktuelle Bewegung?</li><li><b>4. Liquidität</b> — ist das Asset tief genug?</li><li><b>5. Plan</b> — wo steige ich ein, wo schneide ich, wenn ich falsch liege (das ist Academy 7).</li></ul>
      <div class="callout">🏋️ Übung des Market Analyst: öffne den <b>Simulator</b>, wähle BTC oder ETH und mach diese 5 Schritte laut, bevor du „Kaufen" klickst. Wiederhole mit ETH, BNB, SOL, XRP.</div>`}

    {q:"Was ist eine Unterstützung?",a:["Eine Preisdecke","Ein Boden, wo Käufer den Preis abprallen lassen","Eine Art Token","Eine rote Kerze"],correct:1},
