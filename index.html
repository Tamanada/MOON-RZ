 pt:["De volta? A lua só espera você. 🌙","Cada dia de aprendizado te leva mais alto.","Os pros de hoje foram os novatos de ontem.","Uma lição por dia e você fica imbatível.","Seu eu do futuro já agradece.","O mercado recompensa quem aprende.","Pronto para decolar? 🚀","A constância vence o talento. Volte, de novo.","Você constrói algo grande, tijolo por tijolo.","Hoje, um passo a mais rumo a MOON-RZ Legend.","O saber é o único ativo que nunca quebra.","Seja curioso, seja seguro, seja lendário.","Cada quiz vencido é mais um músculo.","Não se para um foguete em pleno voo. 🚀","A cripto recompensa paciência e aprendizado.","Você voltou. Já é 90% do caminho.","Pouco a pouco, o aluno vira mestre.","Aprenda como se fosse viver disso.","Sua disciplina hoje = sua liberdade amanhã.","O melhor investimento? Você mesmo.","Guarde suas chaves, sua cabeça e o rumo.","Um explorador nunca para no meio.","Você aprende, pratica, ganha. Bora.","Os MOON-RZ se conquistam. Sua vez.","A dúvida some com o conhecimento.","Mais uma sessão, mais um nível.","Você não está atrasado. Está na hora certa.","Mire na lua. Mesmo errando, cairá entre as estrelas.","A cripto nunca dorme. Você um pouco, né. 😄","Cada erro no simulador evita uma perda real.","Bem-vindo, futuro construtor do Web3.","O saber compartilhado sempre volta mais forte.","Vá no seu ritmo, mas vá.","Sua lição espera, não a deixe esperando.","O mais difícil era começar. E você começou.","Seja o mais esperto da sala. Aprenda.","Sua sequência é motivo de orgulho. Continue. 🔥","Você é pago em habilidades, não em promessas.","Volte amanhã. Seu cérebro adora.","Um passo por dia e a montanha é vencida.","Você transforma seu tempo em superpoder.","O Web3 precisa de gente que entende. Como você.","Aqui não tem hype. Só saber de verdade.","Cada selo conta sua história. Escreva a próxima.","O conhecimento é sua armadura anti-golpe.","Decole. Ninguém vira lenda no chão. 🚀","Seu futuro cripto se constrói agora.","Volte, recomece, recomece melhor.","Você está mais perto do topo que ontem.","A lua está longe? Não para alguém como você. 🌙"],
 de:["Schon zurück? Der Mond wartet auf dich. 🌙","Jeder Lerntag bringt dich höher.","Die Profis von heute waren gestern Anfänger.","Eine Lektion am Tag macht dich unschlagbar.","Dein zukünftiges Ich dankt dir schon.","Der Markt belohnt die, die lernen.","Bereit zum Abheben? 🚀","Beständigkeit schlägt Talent. Komm wieder.","Du baust Großes, Stein für Stein.","Heute ein Schritt näher an MOON-RZ Legend.","Wissen ist das einzige Asset, das nie crasht.","Bleib neugierig, bleib sicher, bleib legendär.","Jedes bestandene Quiz ist ein Muskel mehr.","Man stoppt keine Rakete im Flug. 🚀","Krypto belohnt Geduld und Lernen.","Du bist zurück. Das sind schon 90% des Wegs.","Stück für Stück wird der Schüler zum Meister.","Lern, als würdest du davon leben.","Deine Disziplin heute = deine Freiheit morgen.","Die beste Investition? Du selbst.","Halt deine Keys, deinen Kopf, deinen Kurs.","Ein Entdecker stoppt nie auf halbem Weg.","Du lernst, übst, verdienst. Los geht's.","MOON-RZ verdient man sich. Du bist dran.","Zweifel verschwinden mit Wissen.","Noch eine Session, noch ein Level.","Du bist nicht spät dran. Genau richtig.","Ziel auf den Mond. Selbst daneben landest du bei den Sternen.","Krypto schläft nie. Du ein bisschen, schon. 😄","Jeder Fehler im Simulator spart dir echten Verlust.","Willkommen, künftiger Web3-Erbauer.","Geteiltes Wissen kommt stärker zurück.","Geh in deinem Tempo, aber geh.","Deine Lektion wartet — lass sie nicht warten.","Das Schwerste war der Anfang. Und du hast ihn gemacht.","Sei der Klügste im Raum. Lern.","Deine Serie ist ein Stolz. Halt sie. 🔥","Du wirst in Können bezahlt, nicht in Versprechen.","Komm morgen wieder. Dein Hirn liebt das.","Ein Schritt am Tag, und der Berg ist bestiegen.","Du machst aus deiner Zeit eine Superkraft.","Web3 braucht Leute, die es verstehen. Wie dich.","Kein Hype hier. Nur echtes Wissen.","Jedes Abzeichen erzählt deine Geschichte. Schreib weiter.","Wissen ist deine Anti-Scam-Rüstung.","Heb ab. Niemand wird am Boden zur Legende. 🚀","Deine Krypto-Zukunft entsteht jetzt.","Komm wieder, fang neu an, mach es besser.","Du bist dem Gipfel näher als gestern.","Der Mond ist weit? Nicht für jemanden wie dich. 🌙"],
 ru:["Уже вернулся? Луна ждёт тебя. 🌙","Каждый день учёбы поднимает тебя выше.","Сегодняшние профи были вчерашними новичками.","Урок в день — и ты непобедим.","Будущий ты уже благодарит.","Рынок награждает тех, кто учится.","Готов к взлёту? 🚀","Постоянство бьёт талант. Возвращайся снова.","Ты строишь большое, кирпич за кирпичом.","Сегодня на шаг ближе к MOON-RZ Legend.","Знание — единственный актив, что не падает.","Будь любопытным, будь в безопасности, будь легендой.","Каждый пройденный квиз — ещё одна мышца.","Ракету в полёте не остановить. 🚀","Крипта награждает терпение и учёбу.","Ты вернулся. Это уже 90% пути.","Шаг за шагом ученик становится мастером.","Учись так, будто будешь этим жить.","Дисциплина сегодня = свобода завтра.","Лучшая инвестиция? Ты сам.","Храни ключи, голову и курс.","Исследователь не останавливается на полпути.","Учишься, практикуешься, зарабатываешь. Вперёд.","MOON-RZ нужно заслужить. Твой ход.","Сомнение стирается знанием.","Ещё сессия, ещё уровень.","Ты не опоздал. Ты как раз вовремя.","Целься в луну. Промахнёшься — окажешься среди звёзд.","Крипта не спит. Ты немного — да. 😄","Каждая ошибка в симуляторе спасает от реальной потери.","Добро пожаловать, будущий строитель Web3.","Общее знание всегда возвращается сильнее.","Иди в своём темпе, но иди.","Урок ждёт — не заставляй его ждать.","Сложнее всего было начать. И ты начал.","Будь самым умным в комнате. Учись.","Твоя серия — повод для гордости. Держи. 🔥","Тебе платят навыками, а не обещаниями.","Возвращайся завтра. Твой мозг это любит.","Шаг в день — и гора покорена.","Ты превращаешь время в суперсилу.","Web3 нужны те, кто понимает. Как ты.","Здесь нет хайпа. Только настоящее знание.","Каждый значок — твоя история. Пиши дальше.","Знание — твоя броня против скама.","Взлетай. Легендой не стать, стоя на земле. 🚀","Твоё крипто-будущее строится сейчас.","Возвращайся, начни снова, начни лучше.","Ты ближе к вершине, чем вчера.","Луна далеко? Не для такого, как ты. 🌙"],
 tr:["Geri mi döndün? Ay seni bekliyor. 🌙","Her öğrenme günü seni yükseltir.","Bugünün profları dünün acemileriydi.","Günde bir ders, seni yenilmez yapar.","Gelecekteki sen şimdiden teşekkür ediyor.","Piyasa öğreneni ödüllendirir.","Kalkışa hazır mısın? 🚀","İstikrar yeteneği yener. Yine gel.","Büyük bir şey inşa ediyorsun, tuğla tuğla.","Bugün MOON-RZ Legend'a bir adım daha.","Bilgi, asla çökmeyen tek varlıktır.","Meraklı kal, güvende kal, efsane kal.","Geçilen her quiz bir kas daha.","Uçan roket durdurulmaz. 🚀","Kripto sabrı ve öğrenmeyi ödüllendirir.","Geri döndün. Bu yolun %90'ı zaten.","Azar azar öğrenci usta olur.","Bununla yaşayacakmış gibi öğren.","Bugünkü disiplinin = yarınki özgürlüğün.","En iyi yatırım mı? Kendin.","Anahtarlarını, aklını ve rotanı koru.","Kâşif yarı yolda durmaz.","Öğrenirsin, pratik yaparsın, kazanırsın. Hadi.","MOON-RZ kazanılır. Sıra sende.","Şüphe bilgiyle silinir.","Bir oturum daha, bir seviye daha.","Geç kalmadın. Tam zamanındasın.","Aya nişan al. Iskalasan da yıldızlara düşersin.","Kripto hiç uyumaz. Sen biraz, neyse. 😄","Simülatördeki her hata gerçek kaybı önler.","Hoş geldin, geleceğin Web3 inşacısı.","Paylaşılan bilgi hep daha güçlü döner.","Kendi hızında git, ama git.","Dersin bekliyor — bekletme.","En zoru başlamaktı. Ve başardın.","Odanın en zekisi ol. Öğren.","Serin gurur kaynağı. Sürdür. 🔥","Sana vaatle değil, beceriyle ödenir.","Yarın yine gel. Beynin buna bayılır.","Günde bir adım, dağ tırmanılır.","Zamanını süper güce çeviriyorsun.","Web3'ün anlayan insanlara ihtiyacı var. Senin gibi.","Burada hype yok. Sadece gerçek bilgi.","Her rozet hikayeni anlatır. Devamını yaz.","Bilgi senin dolandırıcılık zırhın.","Kalk. Kimse yerde efsane olmaz. 🚀","Kripto geleceğin şimdi inşa ediliyor.","Geri dön, baştan başla, daha iyi başla.","Zirveye dünden daha yakınsın.","Ay uzak mı? Senin gibi biri için değil. 🌙"],
 ar:["عُدت؟ القمر بانتظارك. 🌙","كل يوم تعلّم يرفعك أعلى.","محترفو اليوم كانوا مبتدئي الأمس.","درس في اليوم يجعلك لا يُقهَر.","ذاتك المستقبلية تشكرك بالفعل.","السوق يكافئ من يتعلّم.","جاهز للانطلاق؟ 🚀","الانتظام يهزم الموهبة. عُد، مجددًا.","أنت تبني شيئًا كبيرًا، طوبة بطوبة.","اليوم خطوة أقرب إلى MOON-RZ Legend.","المعرفة هي الأصل الوحيد الذي لا ينهار.","ابقَ فضوليًا، ابقَ آمنًا، ابقَ أسطوريًا.","كل اختبار تجتازه عضلة إضافية.","لا يُوقَف صاروخ في طيرانه. 🚀","الكريبتو يكافئ الصبر والتعلّم.","لقد عُدت. هذا 90% من الطريق.","شيئًا فشيئًا يصبح التلميذ معلّمًا.","تعلّم وكأنك ستعيش منه.","انضباطك اليوم = حريتك غدًا.","أفضل استثمار؟ نفسك.","احفظ مفاتيحك وعقلك ومسارك.","المستكشف لا يتوقف في منتصف الطريق.","تتعلّم، تتدرّب، تربح. هيا.","الـ MOON-RZ تُكتَسب. دورك.","الشك يزول بالمعرفة.","جلسة أخرى، مستوى آخر.","لست متأخرًا. أنت في الوقت تمامًا.","صوّب نحو القمر. وإن أخطأت ستهبط بين النجوم.","الكريبتو لا ينام. وأنت قليلًا، حسنًا. 😄","كل خطأ في المحاكي يجنّبك خسارة حقيقية.","مرحبًا، يا باني الويب3 المستقبلي.","المعرفة المشتركة تعود دائمًا أقوى.","سِر بإيقاعك، لكن سِر.","درسك بانتظارك — لا تجعله ينتظر.","الأصعب كان البداية. وقد بدأت.","كن الأذكى في الغرفة. تعلّم.","سلسلتك مصدر فخر. واصِل. 🔥","يُدفَع لك بالمهارات لا بالوعود.","عُد غدًا. عقلك يحب ذلك.","خطوة في اليوم، ويُتسلَّق الجبل.","تحوّل وقتك إلى قوة خارقة.","الويب3 يحتاج من يفهمه. مثلك.","لا ضجيج هنا. معرفة حقيقية فقط.","كل وسام يروي قصتك. اكتب التالية.","المعرفة درعك ضد الاحتيال.","انطلق. لا أحد يصبح أسطورة على الأرض. 🚀","مستقبلك في الكريبتو يُبنى الآن.","عُد، ابدأ من جديد، ابدأ أفضل.","أنت أقرب إلى القمة من الأمس.","القمر بعيد؟ ليس لشخص مثلك. 🌙"],
 zh:["又回来了？月亮正等着你。🌙","每一天学习都让你更高。","今天的高手是昨天的新手。","每天一课，让你所向无敌。","未来的你已经在感谢你。","市场奖励学习的人。","准备起飞了吗？🚀","坚持胜过天赋。再回来。","你在一砖一瓦地建造伟大。","今天，离 MOON-RZ Legend 更近一步。","知识是唯一不会崩盘的资产。","保持好奇，保持安全，保持传奇。","每过一个测验，多一块肌肉。","飞行中的火箭停不下来。🚀","加密奖励耐心与学习。","你回来了，已经走了 90%。","一点一点，学生变大师。","像要靠它生活一样去学。","今天的自律 = 明天的自由。","最好的投资？你自己。","守住钥匙、头脑和方向。","探索者从不半途而废。","你学习、你练习、你赚取。出发。","MOON-RZ 要靠争取。看你的。","怀疑会被知识抹去。","再来一节，再升一级。","你不晚。你正合时宜。","瞄准月亮。即使错过也落在星辰间。","加密不眠。你嘛，稍微睡一点。😄","模拟器里的每个错误都帮你避免真实损失。","欢迎，未来的 Web3 建造者。","分享的知识总会更强地回来。","按你的节奏走，但要走。","你的课程在等你，别让它等。","最难的是开始。而你做到了。","做房间里最聪明的人。去学。","你的连胜值得骄傲。继续。🔥","你拿到的是技能，不是承诺。","明天再来。你的大脑爱这个。","每天一步，高山可攀。","你把时间变成超能力。","Web3 需要懂行的人。比如你。","这里没有炒作，只有真知识。","每枚徽章都在讲你的故事。写下一章。","知识是你的反诈骗盔甲。","起飞。没人在地面上成为传奇。🚀","你的加密未来正在此刻建立。","回来，重新开始，做得更好。","你比昨天更接近顶峰。","月亮很远？对你这样的人不远。🌙"],
 ja:["もう戻ってきた？月が待ってるよ。🌙","学ぶ日ごとに高く上がる。","今日のプロは昨日の初心者。","1日1レッスンで無敵に。","未来の自分がもう感謝してる。","市場は学ぶ者に報いる。","飛び立つ準備はいい？🚀","継続は才能に勝る。また来て。","レンガを積むように大きなものを築いてる。","今日、MOON-RZ Legendへ一歩前進。","知識は決して暴落しない唯一の資産。","好奇心を、安全を、伝説を保て。","クリアした問題ごとに筋肉が一つ増える。","飛行中のロケットは止められない。🚀","クリプトは忍耐と学びに報いる。","戻ってきた。もう道のりの90%。","少しずつ、生徒は達人になる。","それで生きていくつもりで学べ。","今日の規律＝明日の自由。","最高の投資は？自分自身。","鍵を、頭を、進路を守れ。","探検家は途中で止まらない。","学び、試し、稼ぐ。行こう。","MOON-RZは勝ち取るもの。君の番。","疑いは知識で消える。","もう1セッション、もう1レベル。","遅れてない。ちょうどいい時。","月を狙え。外しても星の間に届く。","クリプトは眠らない。君は少しは寝てね。😄","シミュレーターのミスは本物の損を防ぐ。","ようこそ、未来のWeb3ビルダー。","分かち合った知識はより強く返ってくる。","自分のペースで、でも進め。","レッスンが待ってる。待たせないで。","一番難しいのは始めること。君はやった。","部屋で一番賢くなれ。学べ。","連続記録は誇り。続けよう。🔥","報われるのはスキルで、約束ではない。","明日また来て。脳が喜ぶ。","1日1歩で山は登れる。","時間を超能力に変えている。","Web3は分かる人を必要としてる。君のような。","ここにハイプはない。本物の知識だけ。","バッジ一つ一つが君の物語。続きを書こう。","知識は詐欺対策の鎧。","飛び立て。地上で伝説にはなれない。🚀","君のクリプトの未来は今作られている。","戻って、やり直して、もっと上手く。","昨日より頂上に近い。","月は遠い？君のような人には遠くない。🌙"],
 ko:["벌써 돌아왔어? 달이 기다려. 🌙","배우는 하루하루가 너를 더 높이 올려.","오늘의 프로는 어제의 초보였어.","하루 한 강의면 무적이 돼.","미래의 너가 이미 고마워해.","시장은 배우는 자에게 보상해.","이륙 준비됐어? 🚀","꾸준함이 재능을 이겨. 또 와.","벽돌 하나하나, 큰 걸 짓고 있어.","오늘, MOON-RZ Legend에 한 걸음 더.","지식은 절대 폭락하지 않는 유일한 자산.","호기심을, 안전을, 전설을 지켜.","통과한 퀴즈마다 근육 하나 더.","비행 중인 로켓은 못 멈춰. 🚀","크립토는 인내와 배움에 보상해.","돌아왔어. 이미 90%야.","조금씩, 학생이 마스터가 돼.","그걸로 먹고살 것처럼 배워.","오늘의 규율 = 내일의 자유.","최고의 투자? 너 자신.","키를, 머리를, 방향을 지켜.","탐험가는 절반에서 멈추지 않아.","배우고, 연습하고, 번다. 가자.","MOON-RZ는 쟁취하는 거야. 네 차례.","의심은 지식으로 지워져.","한 세션 더, 한 레벨 더.","늦지 않았어. 딱 맞는 때야.","달을 겨눠. 빗나가도 별들 사이에 떨어져.","크립토는 안 자. 넌 좀 자고. 😄","시뮬레이터의 실수 하나하나가 진짜 손실을 막아.","환영해, 미래의 Web3 빌더.","나눈 지식은 항상 더 강하게 돌아와.","네 속도로, 하지만 나아가.","강의가 기다려 — 기다리게 하지 마.","가장 어려운 건 시작이었어. 넌 해냈고.","방에서 가장 똑똑한 사람이 돼. 배워.","네 연속 기록은 자랑이야. 이어가. 🔥","약속이 아니라 실력으로 보상받아.","내일 또 와. 네 뇌가 좋아해.","하루 한 걸음, 산은 오른다.","시간을 초능력으로 바꾸고 있어.","Web3는 아는 사람이 필요해. 너 같은.","여긴 과장 없어. 진짜 지식뿐.","배지 하나하나가 네 이야기. 다음을 써.","지식은 사기 방지 갑옷.","이륙해. 땅에선 누구도 전설이 못 돼. 🚀","네 크립토 미래는 지금 만들어져.","돌아와, 다시 시작해, 더 잘.","어제보다 정상에 더 가까워.","달이 멀어? 너 같은 사람에겐 안 멀어. 🌙"],
 hi:["वापस आ गए? चाँद तुम्हारा इंतज़ार कर रहा है। 🌙","सीखने का हर दिन तुम्हें ऊँचा ले जाता है।","आज के माहिर कल के नौसिखिए थे।","रोज़ एक पाठ, और तुम अजेय।","तुम्हारा भविष्य तुम्हें अभी से धन्यवाद देता है।","बाज़ार सीखने वालों को इनाम देता है।","उड़ान भरने को तैयार? 🚀","निरंतरता प्रतिभा को हराती है। फिर आओ।","तुम ईंट-दर-ईंट कुछ बड़ा बना रहे हो।","आज, MOON-RZ Legend की ओर एक कदम और।","ज्ञान ही एकमात्र संपत्ति है जो कभी नहीं गिरती।","जिज्ञासु रहो, सुरक्षित रहो, महान रहो।","हर पास किया क्विज़ एक और मांसपेशी।","उड़ते रॉकेट को रोका नहीं जाता। 🚀","क्रिप्टो धैर्य और सीखने को इनाम देता है।","तुम लौट आए। यही 90% रास्ता है।","धीरे-धीरे शिष्य गुरु बनता है।","ऐसे सीखो जैसे इसी से जीना हो।","आज का अनुशासन = कल की आज़ादी।","सबसे अच्छा निवेश? तुम ख़ुद।","अपनी चाबियाँ, अपना दिमाग, अपनी दिशा संभालो।","खोजी कभी आधे रास्ते नहीं रुकता।","सीखो, अभ्यास करो, कमाओ। चलो।","MOON-RZ कमाने पड़ते हैं। तुम्हारी बारी।","संदेह ज्ञान से मिट जाता है।","एक और सत्र, एक और स्तर।","तुम देर से नहीं हो। बिलकुल सही समय पर।","चाँद का निशाना लगाओ। चूको भी तो तारों में गिरोगे।","क्रिप्टो कभी नहीं सोता। तुम थोड़ा, फिर भी। 😄","सिम्युलेटर की हर ग़लती असली नुक़सान बचाती है।","स्वागत है, भविष्य के Web3 निर्माता।","साझा ज्ञान हमेशा और मज़बूत लौटता है।","अपनी गति से चलो, पर चलो।","तुम्हारा पाठ इंतज़ार कर रहा है, उसे मत रुलाओ।","सबसे मुश्किल था शुरू करना। और तुमने किया।","कमरे में सबसे समझदार बनो। सीखो।","तुम्हारी स्ट्रिक गर्व की बात है। जारी रखो। 🔥","तुम्हें हुनर में भुगतान मिलता है, वादों में नहीं।","कल फिर आओ। तुम्हारा दिमाग इसे पसंद करता है।","रोज़ एक कदम, और पहाड़ चढ़ जाता है।","तुम अपने समय को महाशक्ति में बदलते हो।","Web3 को समझने वाले चाहिए। तुम्हारे जैसे।","यहाँ हाइप नहीं। बस असली ज्ञान।","हर बैज तुम्हारी कहानी कहता है। अगली लिखो।","ज्ञान तुम्हारा स्कैम-रोधी कवच है।","उड़ो। ज़मीन पर कोई दिग्गज नहीं बनता। 🚀","तुम्हारा क्रिप्टो भविष्य अभी बन रहा है।","लौटो, फिर शुरू करो, और बेहतर।","तुम कल से शिखर के क़रीब हो।","चाँद दूर है? तुम जैसे के लिए नहीं। 🌙"],
 id:["Sudah kembali? Bulan menantimu. 🌙","Setiap hari belajar membawamu lebih tinggi.","Pro hari ini adalah pemula kemarin.","Satu pelajaran sehari membuatmu tak terkalahkan.","Dirimu di masa depan sudah berterima kasih.","Pasar memberi imbalan pada yang belajar.","Siap lepas landas? 🚀","Konsistensi mengalahkan bakat. Kembali lagi.","Kamu membangun sesuatu yang besar, bata demi bata.","Hari ini, selangkah lebih dekat ke MOON-RZ Legend.","Ilmu adalah satu-satunya aset yang tak pernah crash.","Tetap penasaran, tetap aman, tetap legendaris.","Setiap kuis lolos adalah satu otot lagi.","Roket yang terbang tak bisa dihentikan. 🚀","Kripto memberi imbalan pada kesabaran dan belajar.","Kamu kembali. Itu sudah 90% perjalanan.","Sedikit demi sedikit, murid jadi master.","Belajarlah seakan kamu akan hidup darinya.","Disiplinmu hari ini = kebebasanmu besok.","Investasi terbaik? Dirimu sendiri.","Jaga kuncimu, kepalamu, arahmu.","Penjelajah tak pernah berhenti di tengah.","Kamu belajar, berlatih, menghasilkan. Ayo.","MOON-RZ harus diraih. Giliranmu.","Keraguan terhapus oleh ilmu.","Satu sesi lagi, satu level lagi.","Kamu tidak telat. Tepat waktu.","Bidik bulan. Meski meleset, kamu mendarat di bintang.","Kripto tak pernah tidur. Kamu sedikit, sih. 😄","Setiap kesalahan di simulator mencegah rugi sungguhan.","Selamat datang, calon pembangun Web3.","Ilmu yang dibagi selalu kembali lebih kuat.","Jalan di ritmemu, tapi jalan.","Pelajaranmu menanti — jangan biarkan menunggu.","Yang tersulit adalah memulai. Dan kamu sudah.","Jadilah yang terpintar di ruangan. Belajar.","Streak-mu patut dibanggakan. Lanjutkan. 🔥","Kamu dibayar dengan keterampilan, bukan janji.","Kembali besok. Otakmu menyukainya.","Selangkah sehari, gunung pun didaki.","Kamu mengubah waktumu jadi kekuatan super.","Web3 butuh orang yang paham. Sepertimu.","Tak ada hype di sini. Hanya ilmu nyata.","Setiap lencana menceritakan kisahmu. Tulis lanjutannya.","Ilmu adalah baju zirah anti-penipuanmu.","Lepas landas. Tak ada yang jadi legenda di darat. 🚀","Masa depan kriptomu dibangun sekarang.","Kembali, mulai lagi, lebih baik.","Kamu lebih dekat ke puncak daripada kemarin.","Bulan jauh? Tidak untuk orang sepertimu. 🌙"],
 vi:["Quay lại rồi? Mặt trăng đang đợi bạn. 🌙","Mỗi ngày học đưa bạn lên cao hơn.","Cao thủ hôm nay là tân binh hôm qua.","Một bài học mỗi ngày, bạn thành bất bại.","Bạn của tương lai đã cảm ơn rồi.","Thị trường thưởng cho người chịu học.","Sẵn sàng cất cánh? 🚀","Kiên trì thắng tài năng. Quay lại nữa.","Bạn đang xây điều lớn lao, từng viên gạch.","Hôm nay, gần MOON-RZ Legend thêm một bước.","Kiến thức là tài sản duy nhất không bao giờ sập.","Hãy tò mò, hãy an toàn, hãy huyền thoại.","Mỗi bài quiz vượt qua là thêm một cơ bắp.","Không ai chặn được tên lửa đang bay. 🚀","Crypto thưởng cho kiên nhẫn và học hỏi.","Bạn đã quay lại. Đó là 90% chặng đường.","Dần dần, học trò thành bậc thầy.","Học như thể bạn sẽ sống bằng nó.","Kỷ luật hôm nay = tự do ngày mai.","Khoản đầu tư tốt nhất? Chính bạn.","Giữ chìa khóa, giữ cái đầu, giữ hướng đi.","Người khám phá không dừng giữa đường.","Bạn học, luyện tập, kiếm thưởng. Đi thôi.","MOON-RZ phải giành lấy. Đến lượt bạn.","Nghi ngờ tan biến bởi kiến thức.","Thêm một phiên, thêm một cấp.","Bạn không trễ. Bạn đúng giờ.","Nhắm tới mặt trăng. Trượt cũng rơi giữa các vì sao.","Crypto không ngủ. Bạn thì hơi hơi. 😄","Mỗi sai lầm trong mô phỏng tránh cho bạn một mất mát thật.","Chào mừng, nhà xây dựng Web3 tương lai.","Kiến thức chia sẻ luôn trở lại mạnh hơn.","Đi theo nhịp của bạn, nhưng hãy đi.","Bài học đang đợi — đừng để nó chờ.","Khó nhất là bắt đầu. Và bạn đã làm.","Hãy là người thông minh nhất phòng. Học đi.","Chuỗi của bạn là niềm tự hào. Tiếp tục. 🔥","Bạn được trả bằng kỹ năng, không phải lời hứa.","Mai quay lại. Não bạn thích lắm.","Mỗi ngày một bước, núi cũng leo xong.","Bạn biến thời gian thành siêu năng lực.","Web3 cần người hiểu. Như bạn.","Không hype ở đây. Chỉ kiến thức thật.","Mỗi huy hiệu kể câu chuyện của bạn. Viết tiếp đi.","Kiến thức là áo giáp chống lừa đảo của bạn.","Cất cánh. Không ai thành huyền thoại khi đứng dưới đất. 🚀","Tương lai crypto của bạn đang được xây ngay bây giờ.","Quay lại, bắt đầu lại, tốt hơn.","Bạn gần đỉnh hơn hôm qua.","Mặt trăng xa? Không phải với người như bạn. 🌙"],
 th:["กลับมาแล้วเหรอ? พระจันทร์รอคุณอยู่ 🌙","ทุกวันที่เรียนพาคุณสูงขึ้น","มือโปรวันนี้คือมือใหม่เมื่อวาน","วันละบทเรียน คุณก็ไร้เทียมทาน","ตัวคุณในอนาคตขอบคุณคุณแล้ว","ตลาดให้รางวัลคนที่เรียนรู้","พร้อมทะยานหรือยัง? 🚀","ความสม่ำเสมอชนะพรสวรรค์ กลับมาอีกนะ","คุณกำลังสร้างสิ่งยิ่งใหญ่ ทีละก้อนอิฐ","วันนี้ ใกล้ MOON-RZ Legend ไปอีกก้าว","ความรู้คือสินทรัพย์เดียวที่ไม่มีวันแครช","อยากรู้ไว้ ปลอดภัยไว้ เป็นตำนานไว้","ทุกควิซที่ผ่าน คือกล้ามเนื้อเพิ่มอีกมัด","จรวดที่กำลังบินหยุดไม่ได้ 🚀","คริปโตให้รางวัลความอดทนและการเรียนรู้","คุณกลับมาแล้ว นั่นคือ 90% ของเส้นทาง","ทีละนิด ลูกศิษย์กลายเป็นปรมาจารย์","เรียนเหมือนคุณจะใช้มันเลี้ยงชีพ","วินัยวันนี้ = อิสรภาพวันพรุ่งนี้","การลงทุนที่ดีที่สุด? ตัวคุณเอง","รักษากุญแจ รักษาสติ รักษาเส้นทาง","นักสำรวจไม่เคยหยุดกลางทาง","คุณเรียน ฝึก และรับรางวัล ไปกันเลย","MOON-RZ ต้องไขว่คว้า ตาคุณแล้ว","ความสงสัยลบหายด้วยความรู้","อีกหนึ่งเซสชัน อีกหนึ่งเลเวล","คุณไม่ได้สาย คุณมาตรงเวลาพอดี","เล็งไปที่ดวงจันทร์ พลาดก็ยังตกอยู่ท่ามกลางดวงดาว","คริปโตไม่เคยหลับ คุณก็หลับนิดหน่อยนะ 😄","ทุกความผิดพลาดในเครื่องจำลองช่วยคุณเลี่ยงการขาดทุนจริง","ยินดีต้อนรับ ว่าที่นักสร้าง Web3","ความรู้ที่แบ่งปันกลับมาแข็งแกร่งกว่าเสมอ","ไปตามจังหวะของคุณ แต่ต้องไป","บทเรียนรออยู่ — อย่าให้มันรอ","ที่ยากที่สุดคือการเริ่ม และคุณทำแล้ว","เป็นคนที่ฉลาดที่สุดในห้อง เรียนรู้สิ","สตรีคของคุณคือความภูมิใจ ทำต่อไป 🔥","คุณได้รับเป็นทักษะ ไม่ใช่คำสัญญา","พรุ่งนี้กลับมาอีก สมองคุณชอบมาก","วันละก้าว ภูเขาก็พิชิตได้","คุณเปลี่ยนเวลาเป็นพลังพิเศษ","Web3 ต้องการคนที่เข้าใจ อย่างคุณ","ที่นี่ไม่มีการปั่น มีแต่ความรู้จริง","ทุกตราเล่าเรื่องของคุณ เขียนบทต่อไป","ความรู้คือเกราะกันสแกมของคุณ","ทะยานขึ้น ไม่มีใครเป็นตำนานบนพื้นดิน 🚀","อนาคตคริปโตของคุณกำลังถูกสร้างตอนนี้","กลับมา เริ่มใหม่ ทำให้ดีขึ้น","คุณใกล้ยอดมากกว่าเมื่อวาน","พระจันทร์ไกลเหรอ? ไม่ไกลสำหรับคนอย่างคุณ 🌙"],
 my:["ပြန်ရောက်ပြီလား? လ က သင့်ကို စောင့်နေတယ်။ 🌙","သင်ယူတဲ့ နေ့တိုင်း သင့်ကို ပိုမြင့်အောင် တင်ပေးတယ်။","ဒီနေ့ ကျွမ်းကျင်သူတွေဟာ မနေ့က စတင်သူတွေပဲ။","နေ့စဉ် သင်ခန်းစာတစ်ခု သင်ယူရင် မနိုင်နိုင်အောင် ဖြစ်မယ်။","အနာဂတ်က သင်ဟာ သင့်ကို ကျေးဇူးတင်နေပြီ။","ဈေးကွက်က သင်ယူသူတွေကို ဆုချတယ်။","ပျံတက်ဖို့ အသင့်ပြီလား? 🚀","မှန်မှန်လုပ်ခြင်းက အရည်အချင်းကို နိုင်တယ်။ ထပ်ပြန်လာပါ။","သင်ဟာ အုတ်တစ်ချပ်ချင်း ကြီးမားတဲ့အရာ တည်ဆောက်နေတယ်။","ဒီနေ့ MOON-RZ Legend နဲ့ တစ်လှမ်း ပိုနီးပြီ။","အသိပညာသည် ဘယ်တော့မှ ကျဆုံးမသွားသော တစ်ခုတည်းသော ပိုင်ဆိုင်မှု။","စူးစမ်းနေပါ၊ ဘေးကင်းနေပါ၊ ဒဏ္ဍာရီ ဖြစ်နေပါ။","အောင်တဲ့ ပဟေဠိတိုင်း ကြွက်သားတစ်ခု တိုးတယ်။","ပျံနေဆဲ ဒုံးပျံကို မရပ်တန့်ဘူး။ 🚀","Crypto က စိတ်ရှည်ခြင်းနဲ့ သင်ယူခြင်းကို ဆုချတယ်။","ပြန်လာပြီ။ ဒါက လမ်းရဲ့ 90% ဖြစ်နေပြီ။","တဖြည်းဖြည်း တပည့်ဟာ ဆရာ ဖြစ်လာတယ်။","အသက်မွေးမယ့်အလား သင်ယူပါ။","ဒီနေ့ စည်းကမ်း = မနက်ဖြန် လွတ်လပ်မှု။","အကောင်းဆုံး ရင်းနှီးမြှုပ်နှံမှု? သင်ကိုယ်တိုင်ပဲ။","သင့်သော့ ထိန်း၊ စိတ်ထား ထိန်း၊ လမ်းကြောင်း ထိန်းပါ။","စူးစမ်းသူဟာ လမ်းခုလပ်မှာ ဘယ်တော့မှ မရပ်ဘူး။","သင်ယူ၊ လေ့ကျင့်၊ ဆုရယူ။ သွားကြစို့။","MOON-RZ ကို ကြိုးစားမှ ရတယ်။ သင့်အလှည့်။","သံသယဟာ အသိပညာနဲ့ ပျောက်သွားတယ်။","နောက်ထပ် တစ်ခါ၊ နောက်ထပ် အဆင့်တစ်ဆင့်။","သင် နောက်မကျဘူး။ အချိန်တိကျတယ်။","လ ကို ချိန်ရွယ်ပါ။ လွဲသွားရင်တောင် ကြယ်တွေကြားမှာ ဆင်းသက်မယ်။","Crypto ဘယ်တော့မှ မအိပ်ဘူး။ သင်တော့ နည်းနည်း အိပ်ပါ။ 😄","ပုံတူစနစ်ထဲက အမှားတိုင်း တကယ့်ဆုံးရှုံးမှုကို ကယ်တင်ပေးတယ်။","ကြိုဆိုပါတယ်၊ အနာဂတ် Web3 တည်ဆောက်သူ။","မျှဝေတဲ့ အသိပညာဟာ အမြဲ ပိုအားကောင်းပြီး ပြန်လာတယ်။","သင့်အရှိန်နဲ့ သွားပါ၊ ဒါပေမဲ့ သွားပါ။","သင့်သင်ခန်းစာ စောင့်နေတယ် — မစောင့်ခိုင်းပါနဲ့။","အခက်ဆုံးက စတင်ခြင်း။ သင် လုပ်ပြီးပြီ။","အခန်းထဲမှာ အတော်ဆုံး ဖြစ်ပါ။ သင်ယူပါ။","သင့် streak က ဂုဏ်ယူစရာ။ ဆက်ထိန်းပါ။ 🔥","သင် ကတိမဟုတ်ဘဲ ကျွမ်းကျင်မှုနဲ့ အဖိုးအခ ရတယ်။","မနက်ဖြန် ပြန်လာပါ။ သင့်ဦးနှောက် ဒါကို နှစ်သက်တယ်။","နေ့စဉ် တစ်လှမ်း၊ တောင်ကို တက်ပြီးသား ဖြစ်မယ်။","သင် သင့်အချိန်ကို စွမ်းအားကြီး အဖြစ် ပြောင်းတယ်။","Web3 က နားလည်တဲ့သူတွေ လိုတယ်။ သင်လိုပေါ့။","ဒီမှာ hype မရှိ။ တကယ့် အသိပညာသာ။","တံဆိပ်တိုင်း သင့်ဇာတ်လမ်းကို ပြောတယ်။ နောက်တစ်ခု ရေးပါ။","အသိပညာသည် သင့် လိမ်လည်မှု ကာကွယ်ရေး သံချပ်။","ပျံတက်ပါ။ မြေပြင်မှာ ဘယ်သူမှ ဒဏ္ဍာရီ မဖြစ်ဘူး။ 🚀","သင့် crypto အနာဂတ်ကို အခုပဲ တည်ဆောက်နေတယ်။","ပြန်လာ၊ ပြန်စ၊ ပိုကောင်းအောင် စပါ။","မနေ့ကထက် ထိပ်ဆုံးနဲ့ ပိုနီးပြီ။","လ က ဝေးသလား? သင်လို သူအတွက်တော့ မဟုတ်ဘူး။ 🌙"]
};

/* ---------- ÉCRAN DE LANCEMENT ---------- */
(function(){
  var l=$("launch"); if(!l) return;
  var msg=$("launchMsg"); if(msg){ var arr=(PHRASES_I18N[S.lang]||PHRASES_I18N.en||PHRASES_I18N.fr); msg.textContent=arr[Math.floor(Math.random()*arr.length)]; }
  var img=$("launchImg");
  if(img){ img.src=(window.MOONRZ_ASSETS&&MOONRZ_ASSETS.launch)||"assets/brand/launch.jpg";
    if(img.complete) img.classList.add("in"); else img.onload=()=>img.classList.add("in"); }
  let done=false;
  function hide(){ if(done)return; done=true; l.classList.add("hide"); setTimeout(()=>{l.style.display="none";},650); }
  const tmr=setTimeout(hide,3000);
  l.addEventListener("click",()=>{clearTimeout(tmr);hide();});
})();

/* ---------- BOOT ---------- */
handleIncomingRef();
buildNav(); applyLang(); renderHUD(); render();
if(!S.onboarded) showOnboarding();
</script>
