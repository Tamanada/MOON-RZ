  7:{ modules:{
    mtf:{title:"Multi-Timeframe-Analyse",body:`
      <p>Ein guter Trader schaut <b>mehrere Timeframes</b> an, bevor er handelt. Nur einer ist wie durchs Schlüsselloch schauen.</p>
      <h4>Die Top-Down-Methode</h4>
      <ul><li><b>Höherer TF</b> (Tag/Woche) → der zugrundeliegende Trend, die Kulisse.</li><li><b>Mittlerer TF</b> (4h/1h) → die Interessenszonen.</li><li><b>Niedrigerer TF</b> (15m/5m) → der präzise Einstiegspunkt.</li></ul>
      <p>Goldene Regel: <b>im Sinne des höheren Trends traden</b> und den Einstieg auf dem niedrigeren verfeinern.</p>
      <div class="callout warn">⚠️ Klassischer Anfängerfehler: ein 5-Minuten-Signal gegen den Tagestrend nehmen. Das ist gegen den Strom schwimmen.</div>`},
    risk:{title:"Risikomanagement",body:`
      <p>Die Wahrheit, die niemand Anfängern sagt: <b>Trading heißt zuerst Risiko managen, nicht Preis vorhersagen.</b> Man überlebt, bevor man gewinnt.</p>
      <h4>Die 1%-Regel</h4>
      <p>Riskiere nie <b>mehr als 1 bis 2%</b> deines Kapitals pro Trade. Bei 1% Risiko bräuchte es 100 Verlust-Trades in Folge, um pleite zu gehen — fast unmöglich.</p>
      <ul><li>Ein Verlust von 50% erfordert danach 100% Gewinn, nur um auf null zu kommen. Kapital schützen ist Mathematik.</li><li>Der <b>Stop-Loss</b> ist nicht optional: er ist dein Sicherheitsgurt.</li></ul>
      <div class="callout">🧮 Übe es im Simulator: entscheide VOR dem Kauf, wie viel du zu verlieren bereit bist, und halte dich daran.</div>`},
    sizing:{title:"Position Sizing",body:`
      <p>Das <b>Position Sizing</b> beantwortet „wie viel kaufe ich?". Es folgt aus deinem Risiko, nicht aus deiner Begeisterung.</p>
      <h4>Die Formel</h4>
      <p><code>Größe = (Kapital × % Risiko) ÷ Abstand zum Stop-Loss</code></p>
      <p>Beispiel: Kapital 10.000 $, Risiko 1% (100 $), Stop bei -5% → du kannst <b>2.000 $</b> in diesen Trade stecken (denn 5% von 2000 = 100).</p>
      <div class="callout warn">⚠️ Es ist nicht „ich mag diesen Coin, also setze ich alles". Die Positionsgröße ist eine <b>Rechnung</b>, definiert dadurch, wo du schneidest, wenn du falsch liegst.</div>`},
    rr:{title:"Stop-Loss, Take-Profit und R:R",body:`
      <p>Jeder Trade muss einen Ausstiegsplan <b>vor</b> dem Einstieg haben.</p>
      <ul><li><b>Stop-Loss (SL)</b> — der Preis, bei dem du zugibst, falsch zu liegen, und schneidest.</li><li><b>Take-Profit (TP)</b> — der Preis, bei dem du Gewinne mitnimmst.</li><li><b>Chance-Risiko-Verhältnis (R:R)</b> — wie viel du anvisierst vs wie viel du riskierst.</li></ul>
      <p>Ein R:R von <b>1:3</b> heißt 100 $ riskieren, um 300 $ anzuvisieren. Mit so einem Verhältnis kannst du öfter falsch als richtig liegen und trotzdem <b>profitabel</b> sein.</p>
      <div class="callout">📐 Ziel auf mindestens 1:2. Darunter versenkt dich die kleinste Verlustserie.</div>`},
    journal:{title:"Journal und Psychologie",body:`
      <p>Dein schlimmster Feind im Trading ist nicht der Markt: es bist <b>du</b> (Angst, Gier, Rache).</p>
      <h4>Das Trading-Journal</h4>
      <p>Notiere jeden Trade: Einstieg, Ausstieg, Grund, gefühlte Emotion, Ergebnis. So findest du wiederkehrende Fehler und verbesserst dich wirklich.</p>
      <ul><li><b>FOMO</b> — aus Angst, etwas zu verpassen, kaufen = zu spät einsteigen.</li><li><b>Revenge Trading</b> — nach einem Verlust „zurückholen" wollen = Katastrophe.</li><li><b>Disziplin > Motivation</b> — ein kühl befolgter Plan schlägt den Instinkt.</li></ul>
      <div class="callout">🧠 Mantra des Professional Trader: „Plan the trade, trade the plan." Kühl entscheiden, ohne Emotion ausführen.</div>`},
    strategy:{title:"Deine Strategie bauen",body:`
      <p>Eine Strategie ist eine Reihe <b>geschriebener Regeln</b>, denen du ohne Improvisation folgst. Drei große Stile:</p>
      <ul><li><b>Scalping</b> — viele sehr kurze Trades (Minuten). Intensiv, anspruchsvoll.</li><li><b>Swing</b> — eine Position einige Tage/Wochen in einem Trend halten.</li><li><b>Investieren (DCA)</b> — regelmäßig langfristig kaufen, ohne Timing.</li></ul>
      <h4>Deine Strategie muss festlegen</h4>
      <p>Welcher Markt · welcher TF · Einstiegsbedingung · Stop-Loss · Take-Profit · Positionsgröße · Emotionsmanagement-Regel.</p>
      <div class="callout">🏋️ Übung des Professional Trader: schreibe EINE Strategie (Swing-Stil) und teste sie über 10 Trades im Simulator unter Beachtung jeder Regel. Notiere alles im Journal.</div>`}
  }, quiz:[
    {q:"In der Multi-Timeframe-Analyse tradest du…",a:["Gegen den höheren Trend","Im Sinne des höheren Trends, Einstieg auf dem niedrigeren TF verfeinert","Nur auf 1 Minute","Zufällig"],correct:1},
    {q:"Die 1%-Regel sagt,…",a:["1% garantiert pro Tag zu verdienen","nie mehr als 1-2% des Kapitals pro Trade zu riskieren","1% in Bitcoin zu investieren","1% Gebühren zu zahlen"],correct:1},
    {q:"Position Sizing hängt vor allem ab von…",a:["Deiner Begeisterung für den Coin","Deinem akzeptierten Risiko und dem Abstand zum Stop-Loss","Der Follower-Zahl des Projekts","Der Kerzenfarbe"],correct:1},
    {q:"Ein Chance-Risiko von 1:3 heißt…",a:["300 riskieren, um 100 zu machen","100 riskieren, um 300 anzuvisieren","Drei Trades pro Tag","30% Gebühren"],correct:1},
    {q:"Was ist Revenge Trading?",a:["Eine Gewinnstrategie","Einen Verlust zurückholen wollen, oft katastrophal","Eine Art Order","Nachts traden"],correct:1},
    {q:"Wofür ist ein Trading-Journal?",a:["Für nichts","Wiederkehrende Fehler finden und sich verbessern","Weniger Steuern zahlen","Coins minen"],correct:1}
  ]},
  8:{ modules:{
    copilot:{title:"Die KI, dein Krypto-Copilot",body:`
      <p>KI (Claude, ChatGPT…) ersetzt nicht dein Hirn: sie ist ein <b>Copilot</b>, der enorm Zeit bei Recherche, Analyse und Lernen spart.</p>
      <ul><li>Ein komplexes Konzept auf deinem Niveau <b>erklären</b>.</li><li>Ein 40-Seiten-Whitepaper in 10 Zeilen <b>zusammenfassen</b>.</li><li>Eine Strategie oder ein Projekt <b>brainstormen</b>.</li><li>Ein Skript, einen Bot, einen einfachen Smart Contract <b>programmieren</b>.</li></ul>
      <div class="callout">💡 Diese MOON-RZ-Academy-App wurde mit KI gebaut. KI ist ein Kraftverstärker für einen Solo-Creator.</div>`},
    prompt:{title:"Gut prompten",body:`
      <p>Die Qualität der Antwort hängt von der Qualität der Frage ab. Ein guter <b>Prompt</b> gibt Kontext und ein klares Ziel.</p>
      <h4>Das R-C-T-Rezept</h4>
      <ul><li><b>Rolle</b> — „Handle als Experten-Krypto-Analyst."</li><li><b>Kontext</b> — die Daten, dein Niveau, die Einschränkung.</li><li><b>Aufgabe</b> — was du genau willst, und das Ausgabeformat.</li></ul>
      <div class="callout warn">⚠️ Sei präzise: „analysiere BTC" ist vage. „Gib mir Unterstützung, Widerstand und Trend von BTC im H4, in 5 Punkten" ist umsetzbar.</div>`},
    analyst:{title:"Einen KI-Krypto-Analysten bauen",body:`
      <p>Du kannst eine KI in einen wiederverwendbaren <b>Analyse-Assistenten</b> mit festen Anweisungen verwandeln.</p>
      <h4>Beispiel-Anweisung</h4>
      <p>„Du bist mein Analyst. Für jedes Asset, das ich gebe, antworte immer mit: Trend, Schlüsselniveaus, Volumen, Risikostufe /10 und einem Plan in einem Satz. Nie Finanzberatung, nur Analyse."</p>
      <div class="callout">🎯 Die KI strukturiert dein Denken und zwingt dich, der Methode aus Academy 6 zu folgen. Die finale Entscheidung bleibst DU.</div>`},
    scanner:{title:"KI-Marktscanner",body:`
      <p>Ein <b>Scanner</b> filtert die Information auf das Wesentliche, und KI beschleunigt dieses Filtern.</p>
      <ul><li>Die News und die Marktstimmung des Tages zusammenfassen.</li><li>Mehrere Projekte nach festen Kriterien vergleichen (Team, Tokenomics, Liquidität…).</li><li>Signale zum Nachforschen erkennen — <b>nie</b> blind ausführen.</li></ul>
      <div class="callout warn">⚠️ Ein KI-Signal ist ein <b>Hinweis</b>, kein Befehl. Prüfe die Daten immer selbst, bevor du handelst.</div>`},
    agents:{title:"KI-Agenten und Automatisierung",body:`
      <p>Ein <b>KI-Agent</b> ist eine KI, die Aktionen auf ein Ziel hin verkettet (suchen, analysieren, schreiben, manchmal über Tools ausführen).</p>
      <ul><li>Eine tägliche Überwachung automatisieren.</li><li>Regelmäßige Berichte erzeugen.</li><li>Das Erschaffen unterstützen (Inhalt, Code, Design).</li></ul>
      <div class="callout warn">⚠️ Echte Gefahr: ein Agent, der mit einer Wallet oder Börse verbunden ist, kann Schaden anrichten, wenn schlecht eingegrenzt. Beginne im Lesemodus / im Simulator.</div>`},
    ailimits:{title:"Grenzen und Sicherheit der KI",body:`
      <p>KI ist mächtig, aber fehlbar. Die Grenzen kennen = sie klug nutzen.</p>
      <ul><li><b>Halluzinationen</b> — die KI kann Fakten selbstbewusst erfinden. Prüfe Zahlen und Contracts.</li><li><b>Veraltete Daten</b> — sie kennt vielleicht nicht die aktuellen Preise.</li><li><b>Sicherheit</b> — gib NIEMALS deine Seed Phrase oder privaten Schlüssel an eine KI oder eine Seite.</li></ul>
      <div class="callout">🧠 Regel des AI Trader: die KI <b>unterstützt</b> deine Entscheidung, sie <b>ersetzt</b> sie nicht. Behalte immer Kontrolle und kritisches Denken.</div>`}
  }, quiz:[
    {q:"Was ist die gute Rolle der KI in Krypto?",a:["Für dich entscheiden","Ein Copilot, der Recherche und Analyse beschleunigt","Deine privaten Schlüssel halten","Gewinne garantieren"],correct:1},
    {q:"Ein guter Prompt enthält idealerweise…",a:["Ein einziges vages Wort","Rolle, Kontext und eine klare Aufgabe mit Format","Nur Emojis","Deine Seed Phrase"],correct:1},
    {q:"Ein Signal eines KI-Scanners ist…",a:["Ein Befehl zum blinden Ausführen","Ein Hinweis, den du selbst prüfst","Eine Gewinngarantie","Ein Smart Contract"],correct:1},
    {q:"Was ist das Risiko eines KI-Agenten an einer Wallet?",a:["Keines","Er kann Schaden anrichten, wenn schlecht eingegrenzt","Er mint schneller","Er senkt das Gas"],correct:1},
    {q:"Was ist eine KI-Halluzination?",a:["Ein Anzeigefehler","Wenn die KI einen Fakt selbstbewusst erfindet","Eine Art NFT","Ein Netzwerkausfall"],correct:1},
    {q:"Darfst du deine Seed Phrase einer KI zur Hilfe geben?",a:["Ja, wenn sie bekannt ist","Niemals, niemandem und keinem Tool","Ja, die ersten 12 Wörter","Nur am Wochenende"],correct:1}
  ]},
  9:{ modules:{
    standards:{title:"Die Token-Standards",body:`
      <p>Einen Token zu erstellen heißt, einem anerkannten <b>Standard</b> zu folgen, damit er mit Wallets und Börsen kompatibel ist.</p>
      <ul><li><b>ERC-20</b> (Ethereum) — der Standard für fungible Tokens.</li><li><b>BEP-20</b> (BNB Chain) — das Äquivalent, niedrigere Gebühren.</li><li>Auf Solana ist es das <b>SPL-Token</b>-Programm.</li></ul>
      <p>Ein Token wird definiert durch: einen <b>Namen</b>, ein <b>Symbol</b> (z. B. MOON), ein <b>Gesamtangebot</b> und eine Anzahl von <b>Dezimalstellen</b>.</p>
      <div class="callout">💡 Technisch ist einen Basis-Token zu erstellen einfach. Das Schwere — und das, was zählt — ist alles drumherum (Utility, Liquidität, Vertrauen).</div>`},
    contract:{title:"Der Token-Contract",body:`
      <p>Der Token lebt in einem <b>Smart Contract</b>, der seine Regeln definiert: wer minten, burnen darf, und mit welchen Grenzen.</p>
      <ul><li><b>Mint</b> — neue Tokens erstellen.</li><li><b>Burn</b> — einige zerstören (senkt das Angebot, deflationär).</li><li><b>Owner / Berechtigungen</b> — wer was kontrolliert.</li></ul>
      <div class="callout warn">⚠️ Ein schlecht geschriebener Contract = offene Tür für Hacks und Rug Pulls. Für einen echten Launch ist ein professionelles <b>Audit</b> unverzichtbar.</div>`},
    liquidity9:{title:"Liquidität und Launch",body:`
      <p>Ein Token ohne <b>Liquidität</b> ist wertlos: niemand kann ihn kaufen oder verkaufen.</p>
      <h4>Einen Markt schaffen</h4>
      <p>Man erstellt einen <b>Liquidity Pool</b> auf einer DEX (z. B. dein Token + USDC). Das hinterlegte Verhältnis legt den Startpreis fest.</p>
      <ul><li><b>Die Liquidität sperren</b> beruhigt: das Team kann nicht alles abziehen.</li><li>Kommuniziere den offiziellen Contract, um Fake-Tokens zu vermeiden (siehe Academy 2).</li></ul>
      <div class="callout">🔒 Gesperrte Liquidität + auditierter Contract = zwei Seriositätssignale, nach denen ein cleverer Investor sucht.</div>`},
    vesting:{title:"Das Vesting",body:`
      <p>Das <b>Vesting</b> gibt die Tokens <b>schrittweise</b> über die Zeit frei, statt alles auf einmal.</p>
      <ul><li>Hindert Team und Erstinvestoren daran, beim Launch alles zu verkaufen (ein „Dump").</li><li>Richtet die Interessen <b>langfristig</b> aus.</li><li>Wird oft in einem Emissionskalender gezeigt.</li></ul>
      <div class="callout warn">⚠️ Bevor du in ein Projekt investierst, schau aufs Vesting: werden bald riesige Mengen freigegeben, kann der Preis fallen.</div>`},
    governance:{title:"Die Governance",body:`
      <p>Ein Token kann <b>Entscheidungsmacht</b> geben: das ist Governance (verbunden mit DAOs, Academy 5).</p>
      <ul><li>Den Token halten = über die Entwicklung des Projekts abstimmen.</li><li>Entscheidungen und Treasury transparent on-chain verwaltet.</li><li>Die Herausforderung: die Dominanz der <b>Wale</b> über alle Abstimmungen vermeiden.</li></ul>
      <div class="callout">⚖️ Ein gutes Governance-Design verteilt die Macht und fördert die Teilnahme der Community.</div>`},
    launch9:{title:"Einen verantwortungsvollen Token launchen",body:`
      <p>Zusammenfassung eines <b>seriösen</b> Launches, das Gegenteil eines Scams:</p>
      <ul><li><b>1.</b> Klare Utility — wofür der Token wirklich gut ist.</li><li><b>2.</b> Auditierter Contract, gesunde Berechtigungen.</li><li><b>3.</b> Transparente Tokenomics (Angebot, Verteilung, Vesting).</li><li><b>4.</b> Liquidität bereitgestellt und gesperrt.</li><li><b>5.</b> Informierte Community, offizieller Contract veröffentlicht.</li></ul>
      <div class="callout">🪙 Mantra des Token Engineer: „Ein Token hat nur Wert durch das, was man mit ihm tun kann." Baue den Nutzen vor dem Preis. Genau die Logik des MOON-RZ-Tokens.</div>`}
  }, quiz:[
    {q:"Was ist der Standard für fungible Tokens auf Ethereum?",a:["ERC-721","ERC-20","SPL","BTC-1"],correct:1},
    {q:"Was macht die « Burn »-Operation?",a:["Erstellt Tokens","Zerstört Tokens und senkt das Angebot","Sperrt die Liquidität","Mintet ein NFT"],correct:1},
    {q:"Warum die Liquidität sperren?",a:["Um weniger Gas zu zahlen","Um zu beruhigen: das Team kann nicht alles abziehen","Um die Dezimalstellen zu erhöhen","Um zu minen"],correct:1},
    {q:"Wofür ist das Vesting?",a:["Tokens schrittweise freigeben und Dumps vermeiden","Ein NFT erstellen","Den Code auditieren","Gebühren zahlen"],correct:0},
    {q:"Ein Governance-Token erlaubt…",a:["Über die Entwicklung des Projekts abzustimmen","Binance-Gebühren zu senken","Bitcoin zu minen","Die Seed Phrase zu speichern"],correct:0},
    {q:"Was gibt einem Token dauerhaften Wert?",a:["Sein Logo","Seine echte Utility","Die Anzahl der Dezimalstellen","Seine Farbe"],correct:1}
  ]},
  10:{ modules:{
    m_wallet:{title:"Checkpoint 1 — Wallet und Sicherheit",body:`
      <p>Willkommen in der letzten Akademie. Hier entdeckst du nicht mehr: du <b>verbindest alles</b> und beweist deine Meisterschaft.</p>
      <h4>Was du jetzt beherrschst</h4>
      <ul><li>Eine Wallet erstellen und sichern, deine Seed Phrase schützen.</li><li>Phishing, Rug Pulls, Drainer erkennen (Academy 2).</li><li>Der Reflex: „Langsam machen, prüfen, dann unterschreiben."</li></ul>
      <div class="callout">🌙 Ein echter Web3-Meister schützt seine Gelder <b>aus Gewohnheit</b>, ohne nachzudenken. Sicherheit ist deine Basis.</div>`},
    m_defi:{title:"Checkpoint 2 — DeFi und Rendite",body:`
      <p>Jetzt weißt du, deine Assets arbeiten zu lassen <b>und dabei die Risiken zu verstehen</b>.</p>
      <ul><li>Swap auf einer DEX, Liquidität bereitstellen, einen APY lesen.</li><li>Staking, Lending und die Gefahr der Liquidation.</li><li>Impermanent Loss und Smart-Contract-Risiko.</li></ul>
      <div class="callout">🧠 Meisterschaft = nie einer Rendite hinterherjagen, deren Quelle du nicht erklären kannst.</div>`},
    m_nft:{title:"Checkpoint 3 — NFT und Erschaffen",body:`
      <p>Du siehst das NFT, was es ist: ein <b>Eigentumsnachweis</b> und ein Träger von Utility.</p>
      <ul><li>Collections, Standards, Seltenheit verstehen.</li><li>Die echte Utility vor dem Kauf bewerten.</li><li>Erstellen, listen und Royalties konfigurieren können.</li></ul>
      <div class="callout">🎯 Deine MOON-RZ-Abzeichen sind selbst Utility-NFTs: sie beweisen, was du gelernt hast.</div>`},
    m_trade:{title:"Checkpoint 4 — Trading und Risiko",body:`
      <p>Du liest einen Markt und handelst mit einem <b>Plan</b>, nicht mit Emotionen.</p>
      <ul><li>Trend, Unterstützungen/Widerstände, Volumen, Liquidität.</li><li>Die 1%-Regel, Position Sizing, R:R ≥ 1:2.</li><li>Trading-Journal und Disziplin gegen FOMO.</li></ul>
      <div class="callout">🏋️ Beweis durch Tat: wende eine vollständige Strategie im <b>Simulator</b> an, vom Einstiegsplan bis zum Stop-Loss.</div>`},
    m_build:{title:"Checkpoint 5 — Bauen und tokenisieren",body:`
      <p>Du kannst vom bloßen Nutzer zum <b>Erbauer</b> von Ökosystemen werden.</p>
      <ul><li>Vision, Branding, Community zuerst.</li><li>Gesunde Tokenomics: Angebot, Verteilung, Vesting, Utility.</li><li>Einen verantwortungsvollen Token launchen, mit Governance und gesperrter Liquidität.</li></ul>
      <div class="callout">🏗️ „Community first, Hype second." Du erkennst — und baust — jetzt ein seriöses Projekt.</div>`},
    m_master:{title:"Finaler Checkpoint — MOON-RZ Master",body:`
      <p>Zielgerade. Du hast alle 10 Akademien durchlaufen: Blockchain, Sicherheit, DeFi, NFT, Unternehmertum, Trading, KI, Tokenisierung.</p>
      <h4>Das Profil des MOON-RZ Master</h4>
      <ul><li>🛡️ Autonom und sicher im Web3.</li><li>💹 Fähig, einen Markt zu analysieren und sein Risiko zu managen.</li><li>🏗️ Fähig, ein Projekt zu verstehen, zu bewerten und zu bauen.</li><li>🧠 Kritisches Denken: kein Versprechen von leichtem Geld fängt dich.</li></ul>
      <div class="callout">🏆 Bestehe die Abschlussprüfung, um das <b>MOON-RZ MASTER NFT</b> zu erringen und den höchsten Rang zu erreichen: <b>MOON-RZ Legend</b>. Wahre Meisterschaft ist, weiter zu lernen. 🚀</div>`}
  }, quiz:[
    {q:"Der ultimative Sicherheitsreflex eines Web3-Meisters?",a:["Schnell unterschreiben","Langsam machen, prüfen, dann unterschreiben; nie deine Seed geben","Gelder auf einer Börse halten","Den Antivirus deaktivieren"],correct:1},
    {q:"Bevor du einer hohen DeFi-Rendite hinterherjagst, musst du…",a:["Schnell alles investieren","Erklären können, woher die Rendite kommt und ihr Risiko","Die Gebühren ignorieren","Dem gezeigten APY vertrauen"],correct:1},
    {q:"Welche Regel schützt dein Kapital im Trading?",a:["Alles auf einen Coin setzen","Max. 1-2% pro Trade mit Stop-Loss riskieren","Ohne Plan traden","Nach jedem Verlust verdoppeln"],correct:1},
    {q:"Was gibt einem Token/NFT dauerhaften Wert?",a:["Nur der Hype","Seine echte Utility und Community","Die Anzahl der Dezimalstellen","Die Logo-Farbe"],correct:1},
    {q:"Die gute Rolle der KI für einen Krypto-Meister?",a:["Für ihn entscheiden und traden","Die Entscheidung unterstützen, die menschlich bleibt","Die privaten Schlüssel halten","Gewinne garantieren"],correct:1},
    {q:"Im Grunde ist wahre Web3-Meisterschaft…",a:["Das größte Portfolio haben","Autonom sein, das Risiko managen und weiter lernen","Jedem Influencer folgen","Jeden neuen Token kaufen"],correct:1}
  ]}
 },
 ru:{
  1:{ modules:{
    bc:{title:"Что такое блокчейн?",body:`
      <p><b>Блокчейн</b> — это огромный реестр, который совместно ведут тысячи компьютеров по всему миру. Им никто не владеет, и каждый может его проверить.</p>
      <h4>Ключевая идея</h4>
      <p>Транзакции объединяются в <b>блоки</b>. Каждый блок связан с предыдущим криптографическим отпечатком (<code>hash</code>). Отсюда название: <i>цепочка блоков</i>.</p>
      <ul><li><b>Децентрализованный</b> — нет банка и центрального сервера.</li><li><b>Неизменяемый</b> — записанное прошлое уже не изменить.</li><li><b>Прозрачный</b> — любой может всё проверить.</li></ul>
      <div class="callout">💡 Аналогия: публичный Google-документ, который тысячи людей копируют одновременно. Если кто-то схитрит в своей копии, остальные автоматически её отвергнут.</div>`},
    btc:{title:"Bitcoin — цифровое золото",body:`
      <p><b>Bitcoin (BTC)</b> — первый блокчейн, созданный в 2009 году Сатоши Накамото. Цель: цифровые деньги без банка, которые невозможно подделать.</p>
      <h4>Почему «цифровое золото»?</h4>
      <ul><li>Предложение <b>ограничено 21 миллионом</b> BTC. Больше не будет.</li><li>Защищён <b>Proof of Work</b> (майнинг).</li><li>В основном используется как <b>средство сохранения стоимости</b>.</li></ul>
      <div class="callout">Наименьшая часть Bitcoin — это <code>сатоши</code>: 1 BTC = 100 000 000 сатоши.</div>`},
    eth:{title:"Ethereum — мировой компьютер",body:`
      <p><b>Ethereum (ETH)</b> служит не только для отправки денег: это платформа, которая выполняет <b>смарт-контракты</b>.</p>
      <p>На ней строят децентрализованные приложения (<code>dApps</code>): DeFi, NFT, DAO, игры Web3.</p>
      <ul><li>Нативная монета: <b>Ether (ETH)</b>.</li><li>Комиссии называются <b>gas</b>.</li><li>С 2022 года использует <b>Proof of Stake</b>, намного экологичнее.</li></ul>`},
    bnb:{title:"BNB Chain — быстро и дёшево",body:`
      <p><b>BNB Chain</b> совместима с Ethereum, с <b>очень низкими комиссиями</b> и быстрыми транзакциями.</p>
      <ul><li>Нативная монета: <b>BNB</b>.</li><li>Совместима с <b>EVM</b>: те же кошельки и инструменты, что и у Ethereum.</li><li>Очень популярна у новичков.</li></ul>
      <div class="callout warn">⚠️ Низкие комиссии означают и множество мошенничеств и фейковых токенов. (Academy 2)</div>`},
    sc:{title:"Смарт-контракты",body:`
      <p><b>Смарт-контракт</b> — это программа в блокчейне, которая выполняется сама, когда выполнены её условия. Без посредника.</p>
      <h4>Пример</h4><p>« <i>Если я получаю 1 ETH, я автоматически отправляю этот NFT покупателю.</i> » Код — это закон: <code>code is law</code>.</p>
      <div class="callout">Автоматично и неподделываемо, но если в коде есть баг — поддержки нет. Поэтому нужны <b>аудиты</b>.</div>`},
    wallet:{title:"Кошельки (Wallets)",body:`
      <p><b>Кошелёк</b> не «хранит» твою крипту (она в блокчейне). Он хранит твои <b>ключи</b>.</p>
      <ul><li><b>Публичный адрес</b> — как IBAN, для получения.</li><li><b>Приватный ключ</b> — главный пароль, никогда не делись им.</li><li><b>Seed-фраза</b> (12/24 слова) — резервная копия кошелька.</li></ul>
      <div class="callout warn">🔒 «Not your keys, not your coins.» Запиши seed-фразу на бумаге, никогда — на фото или в облаке.</div>`}
  }, quiz:[

  2:{ modules:{
    scam:{title:"Крипто-мошенничества: обзор",body:`
      <p>В крипте нет посредника: <b>ни один банк не отменит</b> транзакцию. Это свобода… но и площадка для мошенников. Твоя лучшая защита — <b>ты сам</b>.</p>
      <h4>Основные виды</h4>
      <ul><li><b>Фишинг</b> — поддельные сайты/сообщения, ворующие доступ.</li><li><b>Rug pull</b> — команда проекта исчезает со средствами.</li><li><b>Wallet drainer</b> — подпись-ловушка, опустошающая кошелёк.</li><li><b>Фейковые airdrop/токены</b> — приманка, чтобы ты подписал.</li></ul>
      <div class="callout warn">🚩 Правило №1: если слишком хорошо, чтобы быть правдой (×10 гарантированно, «удвой свой ETH»), это мошенничество. Всегда.</div>`},
    phish:{title:"Фишинг",body:`
      <p><b>Фишинг</b> имитирует знакомый тебе сайт/сервис, чтобы украсть seed-фразу или заставить подписать.</p>
      <h4>Как распознать</h4>
      <ul><li>Проверяй <b>URL посимвольно</b>: <code>binance.com</code> ≠ <code>binqnce.com</code>.</li><li>Опасайся <b>рекламы Google</b> вверху выдачи — часто поддельная.</li><li><b>Ни одна</b> легитимная поддержка не просит seed-фразу.</li><li>Добавь настоящие сайты в закладки и заходи всегда через них.</li></ul>
      <div class="callout warn">⚠️ Сайт, просящий твои 12/24 слова, — мошенничество на 100%. Без исключений.</div>`},
    rug:{title:"Rug Pull",body:`
      <p><b>Rug pull</b>: команда создаёт токен, привлекает покупателей, затем <b>выводит всю ликвидность</b> и исчезает. Цена падает до нуля.</p>
      <h4>Сигналы тревоги</h4>
      <ul><li><b>Анонимная</b> команда без истории.</li><li><b>Ликвидность не заблокирована</b>.</li><li>Несколько кошельков держат <b>большинство</b> токенов.</li><li>Огромный хайп, обещания прибыли, никакого реального продукта.</li></ul>
      <div class="callout">🔎 Инструменты: блок-эксплорер (Etherscan/BscScan) + сканеры контракта, чтобы увидеть распределение холдеров.</div>`},
    drain:{title:"Wallet Drainer и approvals",body:`
      <p>Не нужно отдавать приватный ключ, чтобы тебя опустошили: достаточно подписать ловушку-<b>разрешение (approval)</b>.</p>
      <h4>Классическая ловушка</h4>
      <p>Фейковый «mint» или «claim» заставляет подписать <code>approve</code>, дающий атакующему право тратить твои токены. Позже он выводит всё.</p>
      <ul><li>Читай, <b>что подписываешь</b>: сообщение «set approval for all» опасно.</li><li>Отзывай ненужные разрешения (например, <code>revoke.cash</code>).</li><li>Используй <b>burner-кошелёк</b> для рискованных минтов.</li></ul>
      <div class="callout warn">🖊️ Одна подпись может стоить так же, как утёкшая seed-фраза. Не спеши перед «Confirm».</div>`},
    fake:{title:"Фейковые airdrop и токены",body:`
      <p>Ты «бесплатно» получаешь странный токен в кошелёк. Это <b>приманка</b>.</p>
      <ul><li><b>Никогда</b> не взаимодействуй с незнакомым токеном, полученным без причины.</li><li>«Airdrop», требующие <b>подключить кошелёк и подписать</b> на сомнительном сайте, = drainer.</li><li>Проверяй официальный адрес токена на <b>настоящих</b> сайте/Twitter проекта.</li></ul>
      <div class="callout">🎁 Настоящий airdrop никогда не просит отправить средства, «чтобы разблокировать» награду.</div>`},
    audit:{title:"Твой чек-лист безопасности",body:`
      <p>Прежде чем коснуться проекта, пройди этот <b>быстрый аудит-чеклист</b>:</p>
      <ul><li>✅ URL проверен + в закладках</li><li>✅ Команда идентифицируема / репутация</li><li>✅ Контракт проаудирован, ликвидность заблокирована</li><li>✅ Здоровое распределение холдеров</li><li>✅ Я понимаю, что подписываю</li><li>✅ Burner-кошелёк для рискованных действий</li><li>✅ Seed-фраза офлайн, никогда не вводится онлайн</li></ul>
      <div class="callout">🛡️ Мантра Crypto Guardian: <b>«Замедлись, проверь, потом подписывай.»</b> Спешка — друг вора.</div>`}
  }, quiz:[
    {q:"Сайт просит твои 12 слов seed-фразы. Что делаешь?",a:["Ввожу, это поддержка","Ухожу: ни один легитимный сервис их не просит","Даю только первые 6","Спрашиваю друга"],correct:1},
    {q:"Что такое rug pull?",a:["Обновление сети","Команда выводит ликвидность и исчезает","Вид стейкинга","Аппаратный кошелёк"],correct:1},
    {q:"Как drainer опустошает кошелёк без приватного ключа?",a:["Угадывая пароль","Через подпись/approval-ловушку","Майня твои монеты","По email"],correct:1},
    {q:"Какой сильный сигнал rug pull?",a:["Заблокированная ликвидность","Анонимная команда + незаблокированная ликвидность","Проаудированный контракт","Много распределённых холдеров"],correct:1},
    {q:"Ты получил незнакомый токен бесплатно. Правильная реакция?",a:["Быстро продать","Не взаимодействовать с ним","Кликнуть, чтобы увидеть сайт","Отправить обратно"],correct:1},
    {q:"Правильный рефлекс перед подписью транзакции?",a:["Подписать быстро, пока цена не выросла","Читать, что подписываю, и проверять URL","Отключить антивирус","Поделиться экраном"],correct:1}
  ]},
  3:{ modules:{
    dex:{title:"DEX и CEX",body:`
      <p>Есть два способа обменивать крипту:</p>
      <h4>CEX — централизованная биржа</h4>
      <p>Например Binance, Coinbase. Компания хранит твои средства. Удобно, но <b>«not your keys, not your coins»</b>: ты зависишь от неё.</p>
      <h4>DEX — децентрализованная биржа</h4>
      <p>Например Uniswap, PancakeSwap. Ты обмениваешь <b>прямо из кошелька</b>, без посредника. Свопом управляет смарт-контракт.</p>
      <ul><li>CEX = просто, быстро, но централизованно и с KYC.</li><li>DEX = автономно, открыто 24/7, но ты сам за всё отвечаешь.</li></ul>
      <div class="callout">💡 DeFi (децентрализованные финансы) — весь мир финансовых сервисов на смарт-контрактах, без банка.</div>`},
    lp:{title:"Пулы ликвидности и AMM",body:`
      <p>На DEX нет классического стакана заявок: обмены делают возможными <b>пулы ликвидности</b>.</p>
      <h4>Как это работает</h4>
      <p>Пользователи (<b>LP, поставщики ликвидности</b>) вносят два актива равной стоимости, например ETH + USDC. Алгоритм <b>AMM</b> задаёт цену по формуле <code>x · y = k</code>.</p>
      <ul><li>Ты даёшь ликвидность → получаешь <b>торговые комиссии</b>.</li><li>Взамен получаешь <b>LP-токен</b>, отражающий твою долю в пуле.</li></ul>
      <div class="callout">Чем больше ликвидности в пуле, тем меньше цена двигается за сделку (низкий <i>slippage</i>).</div>`},
    yield:{title:"Yield Farming",body:`
      <p><b>Yield farming</b> — заставить крипту работать ради доходности, часто складывая несколько протоколов.</p>
      <ul><li>Даёшь ликвидность → получаешь LP-токены.</li><li>Стейкаешь эти LP-токены → получаешь токены-награды.</li><li>Доходность измеряется в <b>APR / APY</b> (годовая ставка).</li></ul>
      <div class="callout warn">⚠️ APY в 1000% бывают… но почти всегда неустойчивы. Высокая доходность = высокий риск. Всегда спрашивай «откуда эта доходность?».</div>`},
    stake:{title:"Стейкинг",body:`
      <p><b>Стейкинг</b> — заблокировать токены, чтобы помочь защитить сеть на <b>Proof of Stake</b>, и получать награды.</p>
      <ul><li>Блокируешь токены (например ETH, SOL) → получаешь стабильную доходность.</li><li>Стабильнее и проще, чем yield farming.</li><li>Учитывай <b>периоды разблокировки</b>: средства могут быть заблокированы на несколько дней.</li></ul>
      <div class="callout">Стейкинг ≈ «деньги, приносящие проценты», при этом ты сохраняешь контроль над ключами.</div>`},
    lend:{title:"Кредитование (Lending & Borrowing)",body:`
      <p>Протоколы вроде Aave позволяют <b>давать в долг</b> крипту (и получать проценты) или <b>брать в долг</b> (под залог).</p>
      <h4>Ключевая идея: переобеспечение</h4>
      <p>Чтобы занять 100 $, нужно внести более 100 $ залога (например 150 $). Если залог слишком упадёт, тебя <b>ликвидируют</b> автоматически.</p>
      <ul><li>Кредитор → пассивный доход на крипту.</li><li>Заёмщик → ликвидность без продажи активов.</li></ul>
      <div class="callout warn">⚠️ Ликвидация — опасность №1 при займе. Всегда держи комфортный запас прочности.</div>`},
    derisk:{title:"Риски DeFi",body:`
      <p>DeFi мощна, но у неё свои риски. Знать их — половина дела.</p>
      <ul><li><b>Непостоянные потери</b> — давая ликвидность, при расхождении цен можно остаться с меньшей стоимостью, чем при простом холде.</li><li><b>Риск смарт-контракта</b> — баг или взлом может опустошить протокол.</li><li><b>Rug pull / фейковые протоколы</b> — см. Academy 2.</li><li><b>Риск ликвидации</b> — при займе.</li></ul>
      <div class="callout">🧠 Правило DeFi Builder: никогда не клади в протокол больше, чем готов потерять, и предпочитай зрелые проаудированные протоколы.</div>`}
  }, quiz:[
    {q:"Ключевое отличие CEX от DEX?",a:["DEX дороже","На DEX ты торгуешь из кошелька, без посредника","У CEX нет комиссий","Разницы нет"],correct:1},
    {q:"Что задаёт цену на DEX вроде Uniswap?",a:["Трейдер-человек","AMM по математической формуле","Центробанк","Случайность"],correct:1},
    {q:"Что ты получаешь, давая ликвидность пулу?",a:["Ничего","Торговые комиссии и LP-токен","Кредитную карту","Гарантированный NFT"],correct:1},
    {q:"Протокол показывает APY 1500%. Здоровая реакция?",a:["Вложить всё, это бесплатно","Насторожиться: очень высокая доходность = очень высокий риск","Это точно скам, игнорирую","Верю на слово"],correct:1},
    {q:"Что такое ликвидация в lending?",a:["Бонус лояльности","Принудительная продажа залога, если он слишком падает","Снятие процентов","Обновление сети"],correct:1},
    {q:"Непостоянные потери затрагивают в основном…",a:["Заёмщиков","Поставщиков ликвидности при расхождении цен","Стейкеров Bitcoin","Никого"],correct:1}
  ]},
  4:{ modules:{
    nftbasic:{title:"NFT: основы",body:`
      <p><b>NFT</b> (Non-Fungible Token) — <b>уникальный</b> неподделываемый токен, записанный в блокчейне. «Невзаимозаменяемый» = не обмениваемый, в отличие от 1 €, равного любому другому 1 €.</p>
      <ul><li>Доказывает <b>владение</b> и <b>подлинность</b> цифрового (или физического) актива.</li><li>У каждого NFT уникальный идентификатор и публичная история.</li></ul>
      <div class="callout warn">⚠️ Частый миф: «NFT — это просто картинка». Нет — это <b>сертификат владения</b> в блокчейне. Картинка — лишь одно из применений.</div>`},
    collec:{title:"Коллекции и стандарты",body:`
      <p>Большинство NFT объединены в <b>коллекции</b> (например 10 000 экземпляров с общей темой).</p>
      <h4>Технические стандарты</h4>
      <ul><li><b>ERC-721</b> — каждый токен уникален (1 работа = 1 токен).</li><li><b>ERC-1155</b> — позволяет полу-взаимозаменяемость (например 100 копий одного игрового предмета).</li></ul>
      <p><b>Редкость</b> (редкие признаки) сильно влияет на воспринимаемую ценность в коллекции.</p>
      <div class="callout">Метаданные (картинка, атрибуты) часто хранятся на IPFS, чтобы оставаться децентрализованными и постоянными.</div>`},
    utility:{title:"Utility NFT",body:`
      <p><b>Utility NFT</b> даёт доступ к чему-то: в этом его реальная ценность, помимо картинки.</p>
      <ul><li><b>Доступ / членство</b> — вход в сообщество, событие, премиум-контент (как NFT MOON-RZ Academy 😉).</li><li><b>Преимущества</b> — скидки, airdrop, право голоса.</li><li><b>Сертификации</b> — проверяемый диплом или значок.</li></ul>
      <div class="callout">💡 Вопрос перед покупкой: «что этот NFT реально даёт?». Если только для спекуляции — риск высок.</div>`},
    gaming:{title:"Игровые NFT",body:`
      <p>В играх Web3 предметы (персонажи, оружие, земля) могут быть NFT, которыми ты <b>реально владеешь</b> и можешь перепродать.</p>
      <ul><li><b>Play-to-earn</b> — зарабатывать токены/NFT, играя.</li><li><b>Совместимость</b> — (ещё молодая) идея использовать один предмет в нескольких играх.</li></ul>
      <div class="callout warn">⚠️ Многие P2E-игры рухнули, потому что их экономика держалась на постоянном притоке новых игроков. Всегда оценивай <b>экономическую устойчивость</b> игры.</div>`},
    rwa:{title:"Реальные активы (RWA)",body:`
      <p><b>RWA</b> токенизируют реальные активы: недвижимость, искусство, облигации, золото… представленные токеном в блокчейне.</p>
      <ul><li>Позволяют <b>дробное владение</b> (владеть 1% квартиры).</li><li>Больше ликвидности для активов, которые обычно сложно продать.</li><li>Быстрорастущий сектор, сильно связанный с <b>регулированием</b>.</li></ul>
      <div class="callout">Другой твой проект (STAYLO) как раз о токенизации реальных активов — именно об этом модуль.</div>`},
    mint:{title:"Создать и выставить NFT",body:`
      <p>Шаги от идеи до NFT на продаже:</p>
      <ul><li><b>1. Создать</b> визуал / контент и его метаданные.</li><li><b>2. Mint</b> — записать NFT в блокчейн (через маркетплейс или контракт).</li><li><b>3. Выставить</b> — на продажу (фикс-цена или аукцион) на маркетплейсе (OpenSea, Magic Eden…).</li><li><b>4. Роялти</b> — настроить %, который ты получаешь с каждой будущей перепродажи.</li></ul>
      <div class="callout">🎨 Совет NFT Architect: ценность коллекции на 80% — <b>сообщество и utility</b>, на 20% — искусство. Строй и то, и другое.</div>`}
  }, quiz:[
    {q:"Что значит « невзаимозаменяемый »?",a:["Без ценности","Уникальный и не обмениваемый","Бесплатный","Хранится офлайн"],correct:1},
    {q:"По сути NFT — это…",a:["Просто JPEG-картинка","Сертификат владения в блокчейне","Монета вроде Bitcoin","Пароль"],correct:1},
    {q:"Какой стандарт для полу-взаимозаменяемых игровых предметов?",a:["ERC-20","ERC-721","ERC-1155","BTC-1"],correct:2},
    {q:"Что даёт « utility NFT »?",a:["Ничего, кроме картинки","Конкретный доступ или преимущество","Гарантию прибыли","Сниженные комиссии на Binance"],correct:1},
    {q:"Что такое RWA?",a:["Торговые боты","Токенизация реальных активов","Вид кошелька","Комиссии gas"],correct:1},
    {q:"Зачем нужны роялти NFT?",a:["Платить gas","Получать % с каждой будущей перепродажи","Минтить бесплатно","Удалять NFT"],correct:1}
  ]},
  5:{ modules:{
    brand:{title:"Брендинг Web3",body:`
      <p>В Web3 твой <b>бренд</b> — то, что вызывает доверие в океане проектов. Прежде техники идёт <b>история</b>.</p>
      <ul><li><b>Чёткая миссия</b> — какую проблему ты решаешь и для кого.</li><li><b>Визуальная идентичность</b> — логотип, цвета, тон (как лунная вселенная MOON-RZ).</li><li><b>Согласованность</b> — одно сообщение везде (сайт, X, Discord).</li></ul>
      <div class="callout">💡 Люди покупают не токен, а присоединяются к <b>видению</b>. Расскажи историю, к которой они захотят принадлежать.</div>`},
    community:{title:"Построение сообщества",body:`

    marketing:{title:"Крипто-маркетинг",body:`

      <ul><li><b>Образовательный контент</b> — давать ценность до продажи.</li><li><b>Партнёрства и KOL</b> — крипто-инфлюенсеры (проверяй, много фейков).</li><li><b>Airdrop и квесты</b> — награждать действие, чтобы запустить сообщество (модель Learn→Earn).</li></ul>

    dao:{title:"DAO",body:`
      <p><b>DAO</b> (децентрализованная автономная организация) — организация, управляемая сообществом через блокчейн, а не начальником.</p>
      <ul><li><b>Токены управления</b> — владеть токеном = право голоса.</li><li><b>Предложения и голосования</b> — сообщество решает развитие и казну.</li><li><b>Прозрачность</b> — решения и средства видны on-chain.</li></ul>
      <div class="callout">⚖️ Ключевая задача: не дать нескольким крупным держателям («китам») контролировать все голоса. Дизайн управления важен не меньше технологии.</div>`},
    tokenomics:{title:"Токеномика",body:`
      <p><b>Токеномика</b> — экономика твоего токена: то, что определяет, сохранит ли он ценность со временем.</p>

  6:{ modules:{
    candles:{title:"Читать график: свечи",body:`
      <p>График <b>японских свечей</b> — универсальный язык трейдера. Каждая свеча резюмирует борьбу покупателей/продавцов за период.</p>
      <h4>Одна свеча = 4 цены</h4>
      <ul><li><b>Открытие</b> и <b>закрытие</b> (тело свечи).</li><li><b>Максимум</b> и <b>минимум</b> (тени).</li><li><b>Зелёное</b> тело = закрытие выше открытия (рост). <b>Красное</b> = падение.</li></ul>
      <p><b>Таймфрейм</b> меняет всё: свеча 1 минуты ≠ свеча 1 дня.</p>
      <div class="callout">💡 Открой <b>Симулятор</b> параллельно: ты видишь, как двигаются реальные цены. Трейдингу учатся, глядя на рынок, а не в книгах.</div>`},
    sr:{title:"Поддержки и сопротивления",body:`
      <p>Это важнейшие уровни цены для определения.</p>
      <h4>Поддержка</h4>
      <p><b>Пол</b>, где покупатели берут верх и отбивают цену. Цене «трудно падать» ниже этого уровня.</p>
      <h4>Сопротивление</h4>
      <p><b>Потолок</b>, где продавцы берут верх. Цене «трудно расти» выше.</p>
      <ul><li>Чем чаще уровень тестируется, тем он значимее.</li><li>Пробитая поддержка часто становится сопротивлением (и наоборот).</li></ul>
      <div class="callout warn">⚠️ Эти уровни — <b>зоны</b>, а не идеальные линии до пикселя. Не переусердствуй с точностью.</div>`},
    trend:{title:"Тренды",body:`
      <p>«<b>The trend is your friend</b>»: первый вопрос трейдера всегда «куда идёт рынок?».</p>
      <ul><li><b>Восходящий тренд</b> — всё более высокие вершины и впадины.</li><li><b>Нисходящий тренд</b> — всё более низкие вершины и впадины.</li><li><b>Боковик</b> — цена колеблется горизонтально, без направления.</li></ul>
      <div class="callout">📐 <b>Линия тренда</b> соединяет впадины (на росте) или вершины (на падении). Её пробой может сигнализировать смену направления.</div>`},
    volume:{title:"Объём",body:`
      <p><b>Объём</b> = количество, проторгованное за период. Это <b>топливо</b> за движением цены.</p>
      <ul><li>Рост на <b>высоком объёме</b> = достоверное, поддержанное движение.</li><li>Рост на <b>низком объёме</b> = подозрительно, движение может выдохнуться.</li><li>Всплеск объёма часто сопровождает развороты или пробои.</li></ul>
      <div class="callout">🔎 Простое правило: объём <b>подтверждает</b> цену. Пробой сопротивления без объёма подозрителен.</div>`},
    liquidity:{title:"Ликвидность",body:`
      <p><b>Ликвидность</b> — лёгкость купить или продать, не двигая цену. Много заявок с обеих сторон = ликвидный рынок.</p>
      <ul><li><b>Ликвидный</b> актив (BTC, ETH) → низкий <b>slippage</b>, исполнение близко к показанной цене.</li><li><b>Неликвидный</b> актив (мелкий токен) → одна крупная заявка двигает цену, почва для манипуляций.</li></ul>
      <div class="callout warn">⚠️ Многие ловушки (pump &amp; dump) возможны только на неликвидных активах. На старте предпочитай глубокие рынки.</div>`},
    analyse:{title:"Применить на практике",body:`
      <p>Собери всё для первого структурированного <b>анализа рынка</b>:</p>
      <ul><li><b>1. Тренд</b> — вверх, вниз или боковик?</li><li><b>2. Уровни</b> — где ключевые поддержки и сопротивления?</li><li><b>3. Объём</b> — подтверждает ли он текущее движение?</li><li><b>4. Ликвидность</b> — достаточно ли глубок актив?</li><li><b>5. План</b> — где вхожу, где режу, если ошибся (это Academy 7).</li></ul>
      <div class="callout">🏋️ Упражнение Market Analyst: открой <b>Симулятор</b>, выбери BTC или ETH и проговори эти 5 шагов вслух перед кликом «Купить». Повтори с ETH, BNB, SOL, XRP.</div>`}

  7:{ modules:{
    mtf:{title:"Мультитаймфрейм-анализ",body:`
      <p>Хороший трейдер смотрит <b>несколько таймфреймов</b> перед действием. Один — как смотреть в замочную скважину.</p>
      <h4>Метод top-down</h4>
      <ul><li><b>Старший ТФ</b> (день/неделя) → фоновый тренд, декорация.</li><li><b>Средний ТФ</b> (4ч/1ч) → зоны интереса.</li><li><b>Младший ТФ</b> (15м/5м) → точная точка входа.</li></ul>
      <p>Золотое правило: <b>торгуй в сторону старшего тренда</b>, уточняя вход на младшем.</p>
      <div class="callout warn">⚠️ Классическая ошибка новичка: брать 5-минутный сигнал против дневного тренда. Это плыть против течения.</div>`},
    risk:{title:"Управление риском",body:`
      <p>Правда, которую не говорят новичкам: <b>трейдинг — это сначала управление риском, а не предсказание цены.</b> Сначала выживаешь, потом зарабатываешь.</p>
      <h4>Правило 1%</h4>
      <p>Никогда не рискуй <b>более 1–2%</b> капитала на одну сделку. При риске 1% нужно 100 убыточных сделок подряд, чтобы разориться — почти невозможно.</p>
      <ul><li>Потеря 50% требует затем прибыли <b>100%</b>, чтобы выйти в ноль. Защита капитала — это математика.</li><li><b>Стоп-лосс</b> не опционален: это ремень безопасности.</li></ul>
      <div class="callout">🧮 Практикуй в Симуляторе: реши ДО покупки, сколько готов потерять, и держись этого.</div>`},
    sizing:{title:"Размер позиции",body:`
      <p><b>Position sizing</b> отвечает на «сколько покупаю?». Следует из риска, а не из энтузиазма.</p>
      <h4>Формула</h4>
      <p><code>Размер = (Капитал × % риска) ÷ расстояние до стоп-лосса</code></p>
      <p>Пример: капитал 10 000 $, риск 1% (100 $), стоп на -5% → можно вложить <b>2 000 $</b> в эту сделку (ведь 5% от 2000 = 100).</p>
      <div class="callout warn">⚠️ Это не «мне нравится монета, вкладываю всё». Размер позиции — это <b>расчёт</b>, заданный тем, где ты режешь при ошибке.</div>`},
    rr:{title:"Стоп-лосс, Тейк-профит и R:R",body:`
      <p>У каждой сделки должен быть план выхода <b>до</b> входа.</p>
      <ul><li><b>Стоп-лосс (SL)</b> — цена, где признаёшь ошибку и режешь.</li><li><b>Тейк-профит (TP)</b> — цена, где фиксируешь прибыль.</li><li><b>Соотношение Риск/Прибыль (R:R)</b> — сколько целишь vs сколько рискуешь.</li></ul>
      <p>R:R <b>1:3</b> значит рисковать 100 $ ради 300 $. С таким соотношением можно ошибаться чаще, чем быть правым, и оставаться <b>в плюсе</b>.</p>
      <div class="callout">📐 Целься минимум 1:2. Ниже — малейшая серия потерь топит тебя.</div>`},
    journal:{title:"Журнал и психология",body:`
      <p>Твой худший враг в трейдинге не рынок: это <b>ты</b> (страх, жадность, месть).</p>
      <h4>Торговый журнал</h4>
      <p>Записывай каждую сделку: вход, выход, причина, эмоция, результат. Так находишь повторяющиеся ошибки и реально растёшь.</p>
      <ul><li><b>FOMO</b> — покупать из страха упустить = входить поздно.</li><li><b>Revenge trading</b> — хотеть «отыграться» после потери = катастрофа.</li><li><b>Дисциплина > мотивация</b> — холодно соблюдённый план побеждает инстинкт.</li></ul>
      <div class="callout">🧠 Мантра Professional Trader: «Plan the trade, trade the plan.» Решай холодно, исполняй без эмоций.</div>`},
    strategy:{title:"Построй свою стратегию",body:`
      <p>Стратегия — набор <b>записанных правил</b>, которым следуешь без импровизации. Три больших стиля:</p>
      <ul><li><b>Скальпинг</b> — много очень коротких сделок (минуты). Интенсивно, требовательно.</li><li><b>Свинг</b> — держать позицию несколько дней/недель в тренде.</li><li><b>Инвестирование (DCA)</b> — покупать регулярно вдолгую, без тайминга.</li></ul>
      <h4>Стратегия должна определить</h4>
      <p>Какой рынок · какой ТФ · условие входа · стоп-лосс · тейк-профит · размер позиции · правило управления эмоциями.</p>
      <div class="callout">🏋️ Упражнение Professional Trader: напиши ОДНУ стратегию (свинг) и протестируй её на 10 сделках в Симуляторе, соблюдая каждое правило. Записывай всё в журнал.</div>`}

  8:{ modules:{

    analyst:{title:"Создать ИИ-аналитика крипты",body:`

function ac(aid){
  const base=CONTENT[aid]; if(!base) return base;
  const tr=(S.lang!=="fr" && CONTENT_I18N[S.lang] && CONTENT_I18N[S.lang][aid]) ? CONTENT_I18N[S.lang][aid] : null;
  if(!tr) return base;
  return {
    modules: base.modules.map(m=> (tr.modules&&tr.modules[m.id]) ? Object.assign({},m,{title:tr.modules[m.id].title,body:tr.modules[m.id].body}) : m),
    quiz: tr.quiz || base.quiz
  };
}

let S=load();

function load(){
  let r={}; try{ r=JSON.parse(localStorage.getItem("moonrz"))||{}; }catch(e){}
  // migration v0.1 -> v0.2
  if(Array.isArray(r.doneModules)){ r.done={1:r.doneModules}; delete r.doneModules; }
  if(typeof r.quizPassed==="boolean"){ r.passed={1:r.quizPassed}; delete r.quizPassed; }
  const s=Object.assign({},DEFAULT,r);
  s.done=Object.assign({},r.done); s.passed=Object.assign({},r.passed);
  s.sim=Object.assign({cash:10000,qty:{},started:false},r.sim||{});
  s.profile=Object.assign({name:"",avatar:"🧑‍🚀",accent:"#a78bfa"},r.profile||{});
  s.ref=Object.assign({code:"",invited:0},r.ref||{});
  if(!s.ref.code) s.ref.code=genRefCode();
  return s;
}
function genRefCode(){ return "MOON-"+Math.random().toString(36).slice(2,7).toUpperCase(); }
function displayName(){ return S.profile.name && S.profile.name.trim() ? S.profile.name.trim() : rankFor(levelFromXp(S.xp).lvl); }

function qrSvg(text){
  try{ var qr=qrcode(0,"M"); qr.addData(text); qr.make(); return qr.createSvgTag({cellSize:6,margin:1,scalable:true}); }
  catch(e){ return '<div style="padding:24px;font-size:12px;color:#666">QR…</div>'; }
}

/* ---------- RPG ---------- */
function xpForLevel(l){ return Math.round(100*Math.pow(l,1.35)); }
function levelFromXp(t){ let l=1,acc=0; while(l<100){const n=xpForLevel(l); if(t<acc+n)break; acc+=n; l++;} return {lvl:l,into:t-acc,need:xpForLevel(l)}; }
function rankFor(l){ let r=RANKS[0]; for(const x of RANKS) if(l>=x.lvl) r=x; return r.name; }
function academyUnlocked(aid){ return aid===1 || isPassed(aid-1); }

function award(xp,coins,msg){
  const before=levelFromXp(S.xp).lvl;
  S.xp+=xp; S.coins+=coins; save();
  const after=levelFromXp(S.xp).lvl;
  toast(`+${xp} XP &nbsp; <b>+${coins} MOON-RZ</b>${msg?"<br>"+msg:""}`);
  if(after>before) levelUp(after);
  renderHUD();
}
function levelUp(l){ document.getElementById("luLvl").textContent=l; document.getElementById("luRank").textContent=rankFor(l); document.getElementById("levelup").style.display="flex"; }

function renderHUD(){
  const L=levelFromXp(S.xp);
  tokenBal.textContent=S.coins; streak.textContent=S.streak;
  avatarChip.textContent=S.profile.avatar; applyAccent();
  const lw=t("level"), pct=Math.min(100,(L.into/L.need)*100);
  $("lvlRoller").innerHTML=
    `<div class="lr-side lr-prev">${L.lvl>1?lw+" "+(L.lvl-1):"&nbsp;"}</div>`+
    `<div class="lr-cur">`+
      `<div class="lr-line"><span class="lr-num mrz-display">${lw} ${L.lvl}</span><span class="lr-rank">${rankFor(L.lvl)}</span></div>`+
      `<div class="bar"><span style="width:${pct}%"></span></div>`+
      `<div class="lr-xp mrz-mono">${L.into} / ${L.need} XP</div>`+
    `</div>`+
    `<div class="lr-side lr-next">${L.lvl<100?lw+" "+(L.lvl+1):"&nbsp;"}</div>`;
}

}

  document.querySelectorAll('#nav button[data-view="academy"]').forEach(b=>{
    const id=+b.dataset.id, a=ACADEMIES.find(x=>x.id===id), lock=!academyUnlocked(id);
    b.className=(lock?"locked ":"")+(VIEW.name==="academy"&&VIEW.id===id?"active":"");
    b.innerHTML=`<span class="ico">${a.icon}</span> ${a.id}. ${a.title}${lock?'<span class="lk">🔒</span>':isPassed(id)?'<span class="lk">🏅</span>':''}`;
    b.onclick=()=> academyUnlocked(id)?go("academy",id):toast("🔒 Termine l'académie précédente pour débloquer !");

function setActiveNav(){
  refreshNavLocks();
  document.querySelectorAll("#nav button:not([data-view='academy'])").forEach(b=>b.classList.toggle("active",b.dataset.view===VIEW.name));
}
function go(name,id){ stopSim(); closeDrawer(); VIEW={name,id:id||1}; render(); }

function render(){
  setActiveNav();
  renderHUD();
  const c=$("content");
  if(VIEW.name==="academy") c.innerHTML = academyUnlocked(VIEW.id)?viewAcademy(VIEW.id):viewLocked(VIEW.id);
  else if(VIEW.name==="lesson") c.innerHTML=viewLesson(VIEW.id,VIEW.aid);
  else if(VIEW.name==="quiz") c.innerHTML=viewQuiz(VIEW.id);
  else if(VIEW.name==="simulator"){ c.innerHTML=viewSim(); startSim(); }
  else if(VIEW.name==="profile") c.innerHTML=viewProfile();
  else if(VIEW.name==="missions") c.innerHTML=viewMissions();
  else if(VIEW.name==="referral") c.innerHTML=viewReferral();
  else if(VIEW.name==="partners") c.innerHTML=viewPartners();
  bindContent();
  window.scrollTo(0,0); // toujours remonter en haut à chaque transition de page
}

/* ---------- QUIZ ---------- */
let quizState=null;
function viewQuiz(aid){
  const C=ac(aid), A=ACADEMIES.find(x=>x.id===aid), total=C.quiz.length;
  if(!quizState || quizState.aid!==aid){ quizState={aid,answers:Array(total).fill(null),submitted:false,cur:0}; }
  if(quizState.submitted) return viewQuizResult(aid);
  const i=quizState.cur, q=C.quiz[i], answeredCount=quizState.answers.filter(a=>a!==null).length;
  return `<button class="btn ghost" data-goto="${aid}" style="margin-bottom:8px">${t("quit")}</button>
   <div class="hero" style="padding:14px 20px 12px">
     <span class="pill" style="margin-bottom:0">${A.title} — ${t("exam_word")}</span>
     <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:8px">
       <b class="mrz-display" style="color:var(--text);font-size:17px">Question ${i+1}/${total}</b>
       <span class="mrz-mono" style="color:var(--muted);font-size:12px">${answeredCount}/${total} ✓</span>
     </div>
     <div class="bar" style="margin-top:8px"><span style="width:${Math.round((i+1)/total*100)}%"></span></div>
   </div>
   <div class="quiz card" style="padding:14px">
     <div class="q"><h4 style="margin-bottom:10px">${q.q}</h4>${q.a.map((opt,oi)=>`<button class="opt ${quizState.answers[i]===oi?'sel':''}" data-oi="${oi}">${opt}</button>`).join("")}</div>
     <div style="display:flex;gap:10px;margin-top:6px">
       ${i>0?`<button class="btn ghost" id="qPrev" style="flex:0 0 58px">←</button>`:''}
       ${i<total-1
         ?`<button class="btn moon" id="qNext" style="flex:1">${t("ob_next")}</button>`
         :`<button class="btn moon" id="submitQuiz" style="flex:1">${t("submit_answers")}</button>`}
     </div>
   </div>`;
}
function viewQuizResult(aid){
  const total=ac(aid).quiz.length, score=quizState.score, pct=Math.round(score/total*100), pass=pct>=80;
  return `<div class="mrz-card" style="padding:30px 22px;text-align:center;margin-bottom:16px">
     <div style="font-size:46px">${pass?'🎉':'😬'}</div>
     <h1 class="mrz-display" style="font-size:42px;color:${pass?'var(--pos)':'var(--text)'};margin-top:6px">${score}/${total}</h1>
     <p class="mrz-mono" style="color:var(--muted);font-size:15px">${pct}%</p>
     <p style="color:var(--text);font-weight:700;margin-top:12px">${pass?t("pass_msg"):t("fail_msg")}</p>
   </div>
   <div style="display:flex;gap:10px;justify-content:center">
     ${pass?`<button class="btn" data-goto="${aid}">${t("back_academy")}</button>`
           :`<button class="btn moon" data-action="quiz" data-aid="${aid}">${t("retry")}</button>`}
   </div>`;
}
function bindQuiz(){
  const total=quizState?ac(quizState.aid).quiz.length:0;
  document.querySelectorAll(".quiz .opt").forEach(o=>o.onclick=()=>{
    const i=quizState.cur;
    quizState.answers[i]=+o.dataset.oi;
    document.querySelectorAll(".quiz .opt").forEach(x=>x.classList.remove("sel")); o.classList.add("sel");
    if(i<total-1){ setTimeout(()=>{ quizState.cur=i+1; render(); },260); } // auto-avance vers la question suivante
  });
  const nx=$("qNext"); if(nx) nx.onclick=()=>{ const i=quizState.cur; if(quizState.answers[i]===null){toast(t("answer_all"));return;} quizState.cur=i+1; render(); };
  const pv=$("qPrev"); if(pv) pv.onclick=()=>{ quizState.cur=Math.max(0,quizState.cur-1); render(); };
  const sb=$("submitQuiz"); if(sb) sb.onclick=submitQuiz;
}
function submitQuiz(){
  const aid=quizState.aid, C=ac(aid), total=C.quiz.length;
  const unanswered=quizState.answers.indexOf(null);
  if(unanswered>=0){ quizState.cur=unanswered; toast(t("answer_all")); render(); return; }
  let score=0; C.quiz.forEach((q,qi)=>{ if(quizState.answers[qi]===q.correct) score++; });
  quizState.score=score; quizState.submitted=true;
  const pass=Math.round(score/total*100)>=80;
  if(pass){
    const first=!isPassed(aid); S.passed[aid]=true; save();
    if(first){ award(120,80,`🏅 ${ACADEMIES.find(x=>x.id===aid).reward} !`); renderHUD(); }
    else toast("✓ "+t("exam_passed")); // déjà validé : pas de récompense (anti-farm)
  }
  render();
}

const COINS=[
  {sym:"BTCUSDT",name:"Bitcoin",t:"BTC",col:"#f7931a"},
  {sym:"ETHUSDT",name:"Ethereum",t:"ETH",col:"#627eea"},
  {sym:"BNBUSDT",name:"BNB",t:"BNB",col:"#f3ba2f"},
  {sym:"SOLUSDT",name:"Solana",t:"SOL",col:"#14f195"},
  {sym:"XRPUSDT",name:"XRP",t:"XRP",col:"#23292f"}
];
let prices={}, simTimer=null, tradeCtx=null;
const FALLBACK={BTCUSDT:67000,ETHUSDT:3500,BNBUSDT:600,SOLUSDT:160,XRPUSDT:0.55};

function fmt(n,d){ return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function priceOf(sym){ return prices[sym]?.p ?? FALLBACK[sym]; }
function portfolioValue(){ let v=S.sim.cash; COINS.forEach(c=>v+=(S.sim.qty[c.sym]||0)*priceOf(c.sym)); return v; }

async function fetchPrices(){
  const syms=encodeURIComponent(JSON.stringify(COINS.map(c=>c.sym)));
  try{
    const r=await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${syms}`);
    if(!r.ok) throw 0; const data=await r.json();
    data.forEach(d=>prices[d.symbol]={p:+d.lastPrice,ch:+d.priceChangePercent});
    updateSimDOM(true);
  }catch(e){
    COINS.forEach(c=>{ if(!prices[c.sym]) prices[c.sym]={p:FALLBACK[c.sym],ch:0}; });
    updateSimDOM(false);
  }
}
function startSim(){ if(!S.sim.started){S.sim.started=true;save();} fetchPrices(); simTimer=setInterval(fetchPrices,8000); }
function stopSim(){ if(simTimer){clearInterval(simTimer);simTimer=null;} }

function viewSim(){
  return `

  const tb=$("tickBody"); if(!tb)return;

/* ---- trade modal ---- */
function openTrade(sym,side){
  const c=COINS.find(x=>x.sym===sym), pr=priceOf(sym);
  tradeCtx={sym,side,price:pr};
  $("tmTitle").textContent=(side==="buy"?"Acheter ":"Vendre ")+c.t;
  $("tmSub").textContent=`Prix actuel : $${fmt(pr,pr<2?5:2)}`;
  const inp=$("tmInput"); inp.value="";
  inp.placeholder= side==="buy"?"Montant en $":"Quantité "+c.t;
  const quick=$("tmQuick"); quick.innerHTML="";
  const presets= side==="buy"?[["25%",.25],["50%",.5],["Max",1]]:[["25%",.25],["50%",.5],["100%",1]];
  presets.forEach(([lab,f])=>{ const btn=document.createElement("button"); btn.textContent=lab;
    btn.onclick=()=>{ if(side==="buy") inp.value=(S.sim.cash*f).toFixed(2); else inp.value=((S.sim.qty[sym]||0)*f).toFixed(6); updTmInfo(); };
    quick.appendChild(btn); });
  inp.oninput=updTmInfo; updTmInfo();
  $("tmConfirm").className="btn sm "+(side==="buy"?"green":"red");
  $("tmConfirm").textContent= side==="buy"?"Acheter":"Vendre";
  $("tmConfirm").onclick=confirmTrade;
  $("tradeModal").style.display="flex"; inp.focus();
}
function updTmInfo(){
  const {sym,side,price}=tradeCtx, c=COINS.find(x=>x.sym===sym), v=parseFloat($("tmInput").value)||0;
  $("tmInfo").innerHTML= side==="buy"
    ? `Tu reçois ≈ <b>${fmt(v/price,6)} ${c.t}</b> · Cash dispo : $${fmt(S.sim.cash,2)}`
    : `Tu reçois ≈ <b>$${fmt(v*price,2)}</b> · ${c.t} dispo : ${fmt(S.sim.qty[sym]||0,6)}`;
}
function closeTrade(){ $("tradeModal").style.display="none"; }
function confirmTrade(){
  const {sym,side,price}=tradeCtx, v=parseFloat($("tmInput").value)||0;
  if(v<=0){ toast("⚠️ Montant invalide."); return; }
  if(side==="buy"){
    if(v>S.sim.cash){ toast("⚠️ Cash insuffisant."); return; }
    S.sim.cash-=v; S.sim.qty[sym]=(S.sim.qty[sym]||0)+v/price;
    toast(`🟢 Achat exécuté : ${fmt(v/price,6)} ${COINS.find(c=>c.sym===sym).t}`);
  } else {
    const held=S.sim.qty[sym]||0; if(v>held+1e-9){ toast("⚠️ Quantité supérieure à ta position."); return; }
    S.sim.qty[sym]=held-v; S.sim.cash+=v*price;
    toast(`🔴 Vente exécutée : +$${fmt(v*price,2)}`);
  }
  save(); closeTrade();
  if(!S.firstTrade){ S.firstTrade=true; save(); award(20,15,"🎉 Premier trade dans le simulateur !"); }
  updateSimDOM(true);
}

function copyText(txt,okMsg){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(()=>toast(okMsg)).catch(()=>fallbackCopy(txt,okMsg)); }
  else fallbackCopy(txt,okMsg);
}
function fallbackCopy(txt,okMsg){ const i=$("refUrl"); if(i){i.select();try{document.execCommand("copy");toast(okMsg);}catch(e){toast("Copie manuelle : "+txt);}} else toast(txt); }

function bindReferral(){
  const cr=$("copyRef"); if(cr) cr.onclick=()=>copyText(refLink(),"🔗 Lien copié !");
  const msg=encodeURIComponent("🌙 Rejoins-moi sur MOON-RZ Academy — apprends la crypto et gagne des MOON-RZ ! "+refLink());
  const wa=$("shareWa"); if(wa) wa.onclick=()=>window.open("https://wa.me/?text="+msg,"_blank");
  const tg=$("shareTg"); if(tg) tg.onclick=()=>window.open("https://t.me/share/url?url="+encodeURIComponent(refLink())+"&text="+encodeURIComponent("🌙 Rejoins MOON-RZ Academy !"),"_blank");
  const tx=$("shareX"); if(tx) tx.onclick=()=>window.open("https://twitter.com/intent/tweet?text="+msg,"_blank");
  const sn=$("shareNative"); if(sn) sn.onclick=()=>{ if(navigator.share) navigator.share({title:"MOON-RZ Academy",text:"🌙 Rejoins-moi sur MOON-RZ Academy !",url:refLink()}).catch(()=>{}); else copyText(refLink(),"🔗 Lien copié (partage natif indisponible)"); };
}
function completeModule(id,aid){
  if(doneList(aid).includes(id))return;
  const m=ac(aid).modules.find(x=>x.id===id);
  doneList(aid).push(id); save();
  award(m.xp,m.coins,`✓ Module « ${m.title} » validé`);
  VIEW={name:"lesson",id,aid}; render();
}

function handleIncomingRef(){
  const params=new URLSearchParams(location.search);
  const ref=params.get("ref");
  if(ref && !S.referredBy && ref!==S.ref.code){
    S.referredBy=ref; S.coins+=50; save();
    setTimeout(()=>{ toast(`🎉 Invité par <b>${ref}</b> !<br><b>+50 MOON-RZ</b> de bienvenue`); renderHUD(); },800);
  }
  // nettoie l'URL pour éviter de re-créditer au refresh
  if(ref && history.replaceState){ history.replaceState(null,"",location.pathname); }
}

let obStep=0;
function showOnboarding(){ obStep=0; renderOnboarding(); $("onboarding").classList.add("show"); }
function closeOnboarding(){ $("onboarding").classList.remove("show"); if(!S.onboarded){ S.onboarded=true; save(); } }
function obFinish(){ closeOnboarding(); go("academy",1); }
function renderOnboarding(){
  const langOpts=LANGS.map(l=>`<option value="${l.c}" ${l.c===S.lang?'selected':''}>${l.f} ${l.n}</option>`).join("");
  let body="";
  if(obStep===0){
    body=`<div class="ob-moon"></div><h2><span class="acc">${t("ob1_t")}</span></h2><p class="ob-lead">${t("ob1_d")}</p>`;
  } else if(obStep===1){
    const pills=[["📚","ob2a"],["🎮","ob2b"],["🪙","ob2c"]];
    body=`<h2>${t("ob2_t")}</h2><div class="ob-pillars">${pills.map(([ic,k])=>`<div class="ob-pill"><span class="pi">${ic}</span><div><b>${t(k+"_t").replace(ic+" ","")}</b><p>${t(k+"_d")}</p></div></div>`).join("")}</div>`;
  } else {
    body=`<div class="ob-moon"></div><h2><span class="acc">${t("ob3_t")}</span></h2><p class="ob-lead">${t("ob3_d")}</p>`;
  }
  $("obCard").innerHTML=`
    <div class="ob-top">
      <select id="obLang" class="langsel">${langOpts}</select>
      <button class="ob-skip" id="obSkip">${t("ob_skip")}</button>
    </div>
    <div class="ob-body">${body}</div>
    <div class="ob-dots">${[0,1,2].map(i=>`<i class="${i===obStep?'on':''}"></i>`).join("")}</div>
    <div class="ob-nav">
      ${obStep>0?`<button class="btn ghost" id="obBack" style="flex:0 0 54px">←</button>`:''}
      <button class="btn ${obStep===2?'':'moon'}" id="obNext">${obStep===2?t("ob_start"):t("ob_next")}</button>
    </div>`;
  $("obLang").onchange=()=>{ setLang($("obLang").value); renderOnboarding(); };
  $("obSkip").onclick=obFinish;
  $("obNext").onclick=()=>{ if(obStep<2){ obStep++; renderOnboarding(); } else obFinish(); };
  const bk=$("obBack"); if(bk) bk.onclick=()=>{ obStep--; renderOnboarding(); };
}
