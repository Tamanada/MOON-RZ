  9:{ modules:{
    standards:{title:"Token standards",body:`
      <p>Creating a token means following a recognized <b>standard</b> so it's compatible with wallets and exchanges.</p>
      <ul><li><b>ERC-20</b> (Ethereum) — the standard for fungible tokens.</li><li><b>BEP-20</b> (BNB Chain) — the equivalent, lower fees.</li><li>On Solana it's the <b>SPL Token</b> program.</li></ul>
      <p>A token is defined by: a <b>name</b>, a <b>symbol</b> (e.g. MOON), a <b>total supply</b> and a number of <b>decimals</b>.</p>
      <div class="callout">💡 Technically, creating a basic token is simple. What's hard — and what matters — is everything around it (utility, liquidity, trust).</div>`},
    contract:{title:"The token smart contract",body:`
      <p>The token lives in a <b>smart contract</b> that defines its rules: who can mint, burn, and with what limits.</p>
      <ul><li><b>Mint</b> — create new tokens.</li><li><b>Burn</b> — destroy some (reduces supply, deflationary).</li><li><b>Owner / permissions</b> — who controls what.</li></ul>
      <div class="callout warn">⚠️ A badly written contract = an open door to hacks and rug pulls. For a real launch, a professional <b>audit</b> is essential.</div>`},
    liquidity9:{title:"Liquidity & launch",body:`
      <p>A token with no <b>liquidity</b> is worthless: no one can buy or sell it.</p>
      <h4>Creating a market</h4>
      <p>You create a <b>liquidity pool</b> on a DEX (e.g. your token + USDC). The deposited ratio sets the starting price.</p>
      <ul><li><b>Locking the liquidity</b> reassures people: the team can't pull it all.</li><li>Communicate the official contract to avoid fake tokens (see Academy 2).</li></ul>
      <div class="callout">🔒 Locked liquidity + audited contract = two seriousness signals a savvy investor looks for.</div>`},
    vesting:{title:"Vesting",body:`
      <p><b>Vesting</b> unlocks tokens <b>gradually</b> over time, instead of releasing everything at once.</p>
      <ul><li>Stops the team and early investors from selling everything at launch (a "dump").</li><li>Aligns incentives for the <b>long term</b>.</li><li>Often shown in a token release schedule.</li></ul>
      <div class="callout warn">⚠️ Before investing in a project, check the vesting: if huge amounts unlock soon, the price can drop.</div>`},
    governance:{title:"Governance",body:`
      <p>A token can grant <b>decision power</b>: that's governance (linked to DAOs, Academy 5).</p>
      <ul><li>Holding the token = voting on the project's evolution.</li><li>Decisions and treasury managed transparently, on-chain.</li><li>The challenge: avoiding <b>whale</b> dominance over all votes.</li></ul>
      <div class="callout">⚖️ Good governance design distributes power and encourages community participation.</div>`},
    launch9:{title:"Launch a token responsibly",body:`
      <p>Recap of a <b>serious</b> launch, the opposite of a scam:</p>
      <ul><li><b>1.</b> Clear utility — what the token is really for.</li><li><b>2.</b> Audited contract, healthy permissions.</li><li><b>3.</b> Transparent tokenomics (supply, distribution, vesting).</li><li><b>4.</b> Liquidity provided and locked.</li><li><b>5.</b> Informed community, official contract published.</li></ul>
      <div class="callout">🪙 Token Engineer mantra: "A token only has value through what you can do with it." Build the use before the price. That's exactly the MOON-RZ token logic.</div>`}
  }, quiz:[
    {q:"What is the standard for fungible tokens on Ethereum?",a:["ERC-721","ERC-20","SPL","BTC-1"],correct:1},
    {q:"What does the « burn » operation do?",a:["Creates tokens","Destroys tokens and reduces supply","Locks liquidity","Mints an NFT"],correct:1},
    {q:"Why lock the liquidity?",a:["To pay less gas","To reassure: the team can't pull it all","To increase decimals","To mine"],correct:1},
    {q:"What is vesting for?",a:["Gradually unlocking tokens and avoiding dumps","Creating an NFT","Auditing the code","Paying fees"],correct:0},
    {q:"A governance token lets you…",a:["Vote on the project's evolution","Lower Binance fees","Mine Bitcoin","Store the seed phrase"],correct:0},
    {q:"What gives a token lasting value?",a:["Its logo","Its real utility","The number of decimals","Its color"],correct:1}
  ]},
  10:{ modules:{
    m_wallet:{title:"Checkpoint 1 — Wallet & security",body:`
      <p>Welcome to the final academy. Here you no longer discover: you <b>connect everything</b> and prove your mastery.</p>
      <h4>What you now master</h4>
      <ul><li>Create and secure a wallet, protect your seed phrase.</li><li>Recognize phishing, rug pulls, drainers (Academy 2).</li><li>The reflex: "Slow down, verify, then sign."</li></ul>
      <div class="callout">🌙 A true Web3 master protects their funds <b>by habit</b>, without even thinking. Security is your foundation.</div>`},
    m_defi:{title:"Checkpoint 2 — DeFi & yield",body:`
      <p>You now know how to put your assets to work <b>while understanding the risks</b>.</p>
      <ul><li>Swap on a DEX, provide liquidity, read an APY.</li><li>Staking, lending, and the danger of liquidation.</li><li>Impermanent loss and smart contract risk.</li></ul>
      <div class="callout">🧠 Mastery = never chasing a yield you can't explain the source of.</div>`},
    m_nft:{title:"Checkpoint 3 — NFT & creation",body:`
      <p>You see the NFT for what it is: an <b>ownership certificate</b> and a carrier of utility.</p>
      <ul><li>Understand collections, standards, rarity.</li><li>Assess the real utility before buying.</li><li>Know how to create, list, and set royalties.</li></ul>
      <div class="callout">🎯 Your MOON-RZ badges are themselves utility NFTs: they prove what you've learned.</div>`},
    m_trade:{title:"Checkpoint 4 — Trading & risk",body:`
      <p>You read a market and act with a <b>plan</b>, not your emotions.</p>
      <ul><li>Trend, supports/resistances, volume, liquidity.</li><li>The 1% rule, position sizing, R:R ≥ 1:2.</li><li>Trading journal and discipline against FOMO.</li></ul>
      <div class="callout">🏋️ Proof by action: apply a full strategy in the <b>Simulator</b>, from entry plan to stop-loss.</div>`},
    m_build:{title:"Checkpoint 5 — Build & tokenize",body:`
      <p>You can go from mere user to ecosystem <b>builder</b>.</p>
      <ul><li>Vision, branding, community first.</li><li>Healthy tokenomics: supply, distribution, vesting, utility.</li><li>Launch a responsible token, with governance and locked liquidity.</li></ul>
      <div class="callout">🏗️ "Community first, hype second." You can now recognize — and build — a serious project.</div>`},
    m_master:{title:"Final checkpoint — MOON-RZ Master",body:`
      <p>Final stretch. You've gone through all 10 academies: blockchain, security, DeFi, NFT, entrepreneurship, trading, AI, tokenization.</p>
      <h4>The MOON-RZ Master profile</h4>
      <ul><li>🛡️ Autonomous and safe in Web3.</li><li>💹 Able to analyze a market and manage risk.</li><li>🏗️ Able to understand, assess and build a project.</li><li>🧠 Critical thinking: no easy-money promise traps you.</li></ul>
      <div class="callout">🏆 Pass the final exam to earn the <b>MOON-RZ MASTER NFT</b> and reach the ultimate rank: <b>MOON-RZ Legend</b>. True mastery is to keep learning. 🚀</div>`}
  }, quiz:[

    {q:"Before chasing a high DeFi yield, you must…",a:["Invest everything fast","Be able to explain where the yield comes from and its risk","Ignore fees","Trust the shown APY"],correct:1},

 es:{
  1:{ modules:{
    bc:{title:"¿Qué es una blockchain?",body:`
      <p>Una <b>blockchain</b> es un gran registro compartido por miles de ordenadores en todo el mundo. Nadie la posee y cualquiera puede verificarla.</p>
      <h4>La idea clave</h4>
      <p>Las transacciones se agrupan en <b>bloques</b>. Cada bloque se enlaza con el anterior mediante una huella criptográfica (un <code>hash</code>). De ahí el nombre: una <i>cadena de bloques</i>.</p>
      <ul><li><b>Descentralizada</b> — sin banco ni servidor central.</li><li><b>Inmutable</b> — una vez escrito, el pasado no se puede cambiar.</li><li><b>Transparente</b> — cualquiera puede verificar todo.</li></ul>
      <div class="callout">💡 Analogía: un Google Doc público que miles de personas copian a la vez. Si alguien hace trampa en su copia, los demás la rechazan automáticamente.</div>`},
    btc:{title:"Bitcoin — el oro digital",body:`
      <p><b>Bitcoin (BTC)</b> es la primera blockchain, creada en 2009 por Satoshi Nakamoto. Su objetivo: dinero digital sin banco, imposible de falsificar.</p>
      <h4>¿Por qué oro digital?</h4>
      <ul><li>Oferta <b>limitada a 21 millones</b> de BTC. Nunca más.</li><li>Asegurado por <b>Prueba de Trabajo</b> (minería).</li><li>Se usa sobre todo como <b>reserva de valor</b>.</li></ul>
      <div class="callout">La porción más pequeña de Bitcoin es un <code>satoshi</code>: 1 BTC = 100.000.000 satoshis.</div>`},
    eth:{title:"Ethereum — el ordenador mundial",body:`
      <p><b>Ethereum (ETH)</b> no sirve solo para enviar dinero: es una plataforma que ejecuta <b>contratos inteligentes</b>.</p>
      <p>Sobre él se construyen aplicaciones descentralizadas (<code>dApps</code>): DeFi, NFT, DAO, juegos Web3.</p>
      <ul><li>Moneda nativa: <b>Ether (ETH)</b>.</li><li>Las comisiones se llaman <b>gas</b>.</li><li>Desde 2022 usa <b>Prueba de Participación</b>, mucho más ecológica.</li></ul>`},
    bnb:{title:"BNB Chain — rápida y barata",body:`
      <p><b>BNB Chain</b> es compatible con Ethereum, con <b>comisiones muy bajas</b> y transacciones rápidas.</p>
      <ul><li>Moneda nativa: <b>BNB</b>.</li><li>Compatible con <b>EVM</b>: mismas billeteras y herramientas que Ethereum.</li><li>Muy popular entre principiantes.</li></ul>
      <div class="callout warn">⚠️ Comisiones bajas también significan muchas estafas y tokens falsos. (Academia 2)</div>`},
    sc:{title:"Contratos inteligentes",body:`
      <p>Un <b>contrato inteligente</b> es un programa en la blockchain que se ejecuta solo cuando se cumplen sus condiciones. Sin intermediarios.</p>
      <h4>Ejemplo</h4><p>« <i>Si recibo 1 ETH, envío este NFT al comprador.</i> » El código es la ley: <code>code is law</code>.</p>
      <div class="callout">Automático e infalsificable, pero si el código tiene un fallo no hay servicio de atención. De ahí las <b>auditorías</b>.</div>`},
    wallet:{title:"Las billeteras (wallets)",body:`
      <p>Una <b>billetera</b> no "contiene" tus criptos (están en la blockchain). Contiene tus <b>claves</b>.</p>
      <ul><li><b>Dirección pública</b> — como un IBAN, para recibir.</li><li><b>Clave privada</b> — la contraseña definitiva, jamás se comparte.</li><li><b>Frase semilla</b> (12/24 palabras) — la copia de seguridad de tu billetera.</li></ul>
      <div class="callout warn">🔒 "Not your keys, not your coins." Anota tu frase semilla en papel, nunca en foto ni en la nube.</div>`}
  }, quiz:[
    {q:"¿Qué hace que una blockchain sea « inmutable »?",a:["Un banco central la protege","Cada bloque se enlaza al anterior por un hash","Una contraseña de administrador","Está en un solo servidor"],correct:1},
    {q:"¿Cuál es la oferta máxima de Bitcoin?",a:["100 millones","Ilimitada","21 millones","1.000 millones"],correct:2},
    {q:"Además de enviar dinero, ¿para qué sirve Ethereum?",a:["Minar Bitcoin","Ejecutar contratos inteligentes y dApps","Almacenar archivos","Reemplazar a los bancos centrales"],correct:1},
    {q:"¿Qué NO debes compartir nunca?",a:["Tu dirección pública","Tu apodo","Tu frase semilla / clave privada","El nombre de tu blockchain"],correct:2},
    {q:"Las comisiones en Ethereum se llaman…",a:["Gas","Satoshi","Staking","Hash"],correct:0},
    {q:"« Not your keys, not your coins » significa…",a:["Guardar cripto en un exchange","Quien tiene las claves controla los fondos","Las claves son gratis","No puedes perder cripto"],correct:1}
  ]},
  2:{ modules:{
    scam:{title:"Estafas cripto: panorama",body:`
      <p>La cripto no tiene intermediarios: <b>ningún banco puede revertir</b> una transacción. Eso es libertad… pero también el terreno de juego de los estafadores. Tu mejor protección eres <b>tú</b>.</p>
      <h4>Las grandes familias</h4>
      <ul><li><b>Phishing</b> — sitios/mensajes falsos que roban tu acceso.</li><li><b>Rug pull</b> — el equipo de un proyecto desaparece con los fondos.</li><li><b>Wallet drainer</b> — una firma trampa que vacía tu billetera.</li><li><b>Airdrops/tokens falsos</b> — cebo para que firmes.</li></ul>
      <div class="callout warn">🚩 Regla nº1: si es demasiado bueno para ser verdad (×10 garantizado, "duplica tu ETH"), es una estafa. Siempre.</div>`},
    phish:{title:"El phishing",body:`
      <p>El <b>phishing</b> imita un sitio/servicio que conoces para robar tu frase semilla o hacerte firmar.</p>
      <h4>Cómo detectarlo</h4>
      <ul><li>Verifica la <b>URL carácter por carácter</b>: <code>binance.com</code> ≠ <code>binqnce.com</code>.</li><li>Cuidado con los <b>anuncios de Google</b> arriba de los resultados — a menudo falsos.</li><li><b>Ningún</b> soporte legítimo pide tu frase semilla.</li><li>Guarda los sitios reales en <b>favoritos</b> y entra siempre por ahí.</li></ul>
      <div class="callout warn">⚠️ Un sitio que pide tus 12/24 palabras = estafa al 100%. Sin excepciones.</div>`},
    rug:{title:"Los rug pulls",body:`
      <p>Un <b>rug pull</b>: un equipo crea un token, atrae compradores y luego <b>retira toda la liquidez</b> y desaparece. El precio cae a cero.</p>
      <h4>Señales de alerta</h4>
      <ul><li>Equipo <b>anónimo</b> sin historial.</li><li><b>Liquidez no bloqueada</b>.</li><li>Pocas billeteras tienen <b>la mayoría</b> de los tokens.</li><li>Mucho hype, promesas de ganancias, ningún producto real.</li></ul>
      <div class="callout">🔎 Herramientas: un explorador de bloques (Etherscan/BscScan) + escáneres de contrato para ver la distribución de holders.</div>`},
    drain:{title:"Wallet drainers y aprobaciones",body:`
      <p>No hace falta dar tu clave privada para que te vacíen: basta con firmar una <b>aprobación (approval)</b> trampa.</p>
      <h4>La trampa clásica</h4>
      <p>Un "mint" o "claim" falso te hace firmar un <code>approve</code> que permite al atacante gastar tus tokens. Después lo vacía todo.</p>
      <ul><li>Lee <b>lo que firmas</b>: un mensaje "set approval for all" es peligroso.</li><li>Revoca aprobaciones inútiles (p. ej. <code>revoke.cash</code>).</li><li>Usa una <b>billetera burner</b> para mints arriesgados.</li></ul>
      <div class="callout warn">🖊️ Una firma puede costarte tanto como una frase semilla filtrada. Ve despacio antes de pulsar "Confirm".</div>`},
    fake:{title:"Airdrops y tokens falsos",body:`
      <p>Recibes "gratis" un token raro en tu billetera. Es un <b>cebo</b>.</p>
      <ul><li><b>Nunca</b> interactúes con un token desconocido recibido sin motivo.</li><li>Los "airdrops" que piden <b>conectar la billetera y firmar</b> en un sitio dudoso = drainer.</li><li>Verifica la dirección oficial del token en el sitio/Twitter <b>reales</b> del proyecto.</li></ul>
      <div class="callout">🎁 Un airdrop real nunca pide enviar fondos "para desbloquear" tu recompensa.</div>`},
    audit:{title:"Tu checklist de seguridad",body:`
      <p>Antes de tocar un proyecto, pasa esta <b>checklist de auditoría rápida</b>:</p>
      <ul><li>✅ URL verificada + en favoritos</li><li>✅ Equipo identificable / reputación</li><li>✅ Contrato auditado, liquidez bloqueada</li><li>✅ Distribución sana de holders</li><li>✅ Entiendo lo que firmo</li><li>✅ Billetera burner para acciones arriesgadas</li><li>✅ Frase semilla offline, nunca escrita online</li></ul>
      <div class="callout">🛡️ Lema del Crypto Guardian: <b>"Ve despacio, verifica y luego firma."</b> La prisa es la amiga del ladrón.</div>`}
  }, quiz:[
    {q:"Un sitio pide tus 12 palabras semilla. ¿Qué haces?",a:["Las escribo, es el soporte","Me voy: ningún servicio legítimo las pide","Doy solo las 6 primeras","Pregunto a un amigo"],correct:1},
    {q:"¿Qué es un rug pull?",a:["Una actualización de red","El equipo retira la liquidez y desaparece","Un tipo de staking","Una billetera física"],correct:1},
    {q:"¿Cómo vacía un drainer una billetera sin tu clave privada?",a:["Adivinando tu contraseña","Con una firma/aprobación trampa","Minando tus monedas","Por email"],correct:1},
    {q:"¿Cuál es una señal fuerte de rug pull?",a:["Liquidez bloqueada","Equipo anónimo + liquidez sin bloquear","Contrato auditado","Muchos holders repartidos"],correct:1},
    {q:"Recibes un token desconocido gratis. ¿Mejor reacción?",a:["Venderlo rápido","No interactuar con él","Hacer clic para ver el sitio","Devolverlo"],correct:1},
    {q:"¿El reflejo correcto antes de firmar una transacción?",a:["Firmar rápido antes de que suba el precio","Leer lo que firmo y verificar la URL","Desactivar el antivirus","Compartir mi pantalla"],correct:1}
  ]},
  3:{ modules:{
    dex:{title:"DEX vs CEX",body:`
      <p>Hay dos formas de intercambiar cripto:</p>
      <h4>CEX — exchange centralizado</h4>
      <p>Como Binance, Coinbase. Una empresa guarda tus fondos. Cómodo, pero <b>"not your keys, not your coins"</b>: dependes de ella.</p>
      <h4>DEX — exchange descentralizado</h4>
      <p>Como Uniswap, PancakeSwap. Intercambias <b>directamente desde tu billetera</b>, sin intermediario. Un contrato inteligente gestiona el swap.</p>
      <ul><li>CEX = simple, rápido, pero centralizado y con KYC.</li><li>DEX = autónomo, abierto 24/7, pero eres el único responsable.</li></ul>
      <div class="callout">💡 La DeFi (finanzas descentralizadas) es todo el universo de servicios financieros que funcionan con contratos inteligentes, sin banco.</div>`},
    lp:{title:"Pools de liquidez y AMM",body:`
      <p>En un DEX no hay libro de órdenes clásico: los <b>pools de liquidez</b> hacen posibles los intercambios.</p>
      <h4>Cómo funciona</h4>
      <p>Usuarios (los <b>LP, proveedores de liquidez</b>) depositan dos activos a partes iguales, p. ej. ETH + USDC. Un algoritmo llamado <b>AMM</b> fija el precio con la fórmula <code>x · y = k</code>.</p>
      <ul><li>Aportas liquidez → ganas <b>comisiones de trading</b>.</li><li>A cambio recibes un <b>LP token</b> que representa tu parte del pool.</li></ul>
      <div class="callout">Cuanta más liquidez en un pool, menos se mueve el precio por operación (bajo <i>slippage</i>).</div>`},
    yield:{title:"Yield farming",body:`
      <p>El <b>yield farming</b> consiste en poner a trabajar tus criptos para generar rendimiento, a menudo apilando varios protocolos.</p>
      <ul><li>Aportas liquidez → obtienes LP tokens.</li><li>Pones esos LP tokens en staking → recibes tokens de recompensa.</li><li>El rendimiento se mide en <b>APR / APY</b> (tasa anual).</li></ul>
      <div class="callout warn">⚠️ Existen APY del 1000%… pero casi siempre son insostenibles. Alto rendimiento = alto riesgo. Pregúntate siempre "¿de dónde viene este rendimiento?".</div>`},
    stake:{title:"Staking",body:`
      <p>El <b>staking</b> es inmovilizar tus tokens para ayudar a asegurar una red de <b>Prueba de Participación</b>, y recibir recompensas a cambio.</p>
      <ul><li>Bloqueas tokens (p. ej. ETH, SOL) → ganas un rendimiento regular.</li><li>Más estable y simple que el yield farming.</li><li>Cuidado con los <b>periodos de desbloqueo</b>: tus fondos pueden quedar bloqueados unos días.</li></ul>
      <div class="callout">Staking ≈ "dinero que genera intereses", manteniendo el control de tus claves.</div>`},
    lend:{title:"Préstamos (Lending & Borrowing)",body:`
      <p>Protocolos como Aave permiten <b>prestar</b> tus criptos (y cobrar intereses) o <b>pedir prestado</b> (con garantía).</p>
      <h4>El concepto clave: sobrecolateralización</h4>
      <p>Para pedir 100 $ debes depositar más de 100 $ de garantía (p. ej. 150 $). Si tu garantía baja demasiado, te <b>liquidan</b> automáticamente.</p>
      <ul><li>Prestamista → ingreso pasivo con tus criptos.</li><li>Prestatario → liquidez sin vender tus activos.</li></ul>
      <div class="callout warn">⚠️ La liquidación es el peligro nº1 de pedir prestado. Mantén siempre un margen de seguridad cómodo.</div>`},
    derisk:{title:"Los riesgos de la DeFi",body:`
      <p>La DeFi es potente pero tiene riesgos propios. Conocerlos es la mitad del trabajo.</p>
      <ul><li><b>Pérdida impermanente</b> — al aportar liquidez, si los precios divergen puedes acabar con menos valor que solo manteniendo.</li><li><b>Riesgo de contrato inteligente</b> — un fallo o hackeo puede vaciar un protocolo.</li><li><b>Rug pulls / protocolos falsos</b> — ver Academia 2.</li><li><b>Riesgo de liquidación</b> — al pedir prestado.</li></ul>
      <div class="callout">🧠 Regla del DeFi Builder: nunca pongas en un protocolo más de lo que puedas permitirte perder, y prioriza protocolos establecidos y auditados.</div>`}
  }, quiz:[
    {q:"¿Diferencia clave entre un CEX y un DEX?",a:["El DEX es más caro","En un DEX operas desde tu billetera, sin intermediario","El CEX no tiene comisiones","No hay diferencia"],correct:1},
    {q:"¿Qué fija el precio en un DEX como Uniswap?",a:["Un trader humano","Un AMM con una fórmula matemática","El banco central","El azar"],correct:1},
    {q:"¿Qué recibes al aportar liquidez a un pool?",a:["Nada","Comisiones de trading y un LP token","Una tarjeta de crédito","Un NFT garantizado"],correct:1},
    {q:"Un protocolo muestra 1500% de APY. ¿Reacción sana?",a:["Invierto todo, es gratis","Desconfío: rendimiento muy alto = riesgo muy alto","Es seguro un scam, lo ignoro","Lo creo sin más"],correct:1},
    {q:"¿Qué es la liquidación en lending?",a:["Un bono de fidelidad","La venta forzada de tu garantía si baja demasiado","Retirar tus intereses","Una actualización de red"],correct:1},
    {q:"La pérdida impermanente afecta sobre todo a…",a:["Los prestatarios","Los proveedores de liquidez cuando los precios divergen","Los stakers de Bitcoin","Nadie"],correct:1}
  ]},
  4:{ modules:{
    nftbasic:{title:"NFT: lo básico",body:`
      <p>Un <b>NFT</b> (token no fungible) es un token <b>único</b> e infalsificable registrado en una blockchain. "No fungible" = no intercambiable, a diferencia de 1 € que equivale a cualquier otro 1 €.</p>
      <ul><li>Prueba la <b>propiedad</b> y la <b>autenticidad</b> de un activo digital (o físico).</li><li>Cada NFT tiene un identificador único y un historial público.</li></ul>
      <div class="callout warn">⚠️ Mito común: "un NFT es solo una imagen". No — es un <b>certificado de propiedad</b> en la blockchain. La imagen es solo uno de los usos.</div>`},
    collec:{title:"Colecciones y estándares",body:`
      <p>La mayoría de los NFT se agrupan en <b>colecciones</b> (p. ej. 10.000 piezas con un tema común).</p>
      <h4>Los estándares técnicos</h4>
      <ul><li><b>ERC-721</b> — cada token es único (1 obra = 1 token).</li><li><b>ERC-1155</b> — permite lo semi-fungible (p. ej. 100 copias del mismo objeto de juego).</li></ul>
      <p>La <b>rareza</b> (rasgos raros) influye mucho en el valor percibido dentro de una colección.</p>
      <div class="callout">Los <b>metadatos</b> (imagen, atributos) suelen guardarse en IPFS para seguir descentralizados y permanentes.</div>`},
    utility:{title:"NFT de utilidad",body:`
      <p>Un <b>NFT de utilidad</b> da acceso a algo: ese es su valor real, más allá de la imagen.</p>
      <ul><li><b>Acceso / membresía</b> — entrada a una comunidad, un evento, contenido premium (como los NFT de MOON-RZ Academy 😉).</li><li><b>Ventajas</b> — descuentos, airdrops, derechos de voto.</li><li><b>Certificaciones</b> — un diploma o insignia verificable.</li></ul>
      <div class="callout">💡 La pregunta antes de comprar: "¿para qué sirve realmente este NFT?". Si solo sirve para especular, el riesgo es alto.</div>`},
    gaming:{title:"NFT de videojuegos",body:`
      <p>En los juegos Web3, los objetos (personajes, armas, terrenos) pueden ser NFT que <b>posees de verdad</b> y puedes revender.</p>
      <ul><li><b>Play-to-earn</b> — ganar tokens/NFT jugando.</li><li><b>Interoperabilidad</b> — la idea (aún joven) de usar un mismo objeto en varios juegos.</li></ul>
      <div class="callout warn">⚠️ Muchos juegos P2E colapsaron porque su economía dependía de la llegada constante de nuevos jugadores. Evalúa siempre la <b>sostenibilidad económica</b> del juego.</div>`},
    rwa:{title:"Activos del mundo real (RWA)",body:`
      <p>Los <b>RWA</b> tokenizan activos del mundo real: inmuebles, arte, bonos, oro… representados por un token en la blockchain.</p>
      <ul><li>Permiten la <b>propiedad fraccionada</b> (poseer el 1% de un piso).</li><li>Más liquidez para activos normalmente difíciles de vender.</li><li>Sector en fuerte crecimiento, muy ligado a la <b>regulación</b>.</li></ul>
      <div class="callout">Uno de tus otros proyectos (STAYLO) trata justamente de tokenizar activos reales — exactamente lo que cubre este módulo.</div>`},
    mint:{title:"Crear y listar un NFT",body:`
      <p>Pasos de la idea al NFT en venta:</p>
      <ul><li><b>1. Crear</b> el visual / contenido y sus metadatos.</li><li><b>2. Mint</b> — registrar el NFT en la blockchain (vía un marketplace o contrato).</li><li><b>3. Listar</b> — ponerlo a la venta (precio fijo o subasta) en un marketplace (OpenSea, Magic Eden…).</li><li><b>4. Regalías</b> — configurar un % que cobras en cada reventa futura.</li></ul>
      <div class="callout">🎨 Consejo del NFT Architect: el valor de una colección es 80% <b>comunidad y utilidad</b>, 20% arte. Construye ambas.</div>`}
  }, quiz:[
    {q:"¿Qué significa « no fungible »?",a:["Sin valor","Único y no intercambiable","Gratis","Guardado offline"],correct:1},
    {q:"Un NFT es fundamentalmente…",a:["Solo una imagen JPEG","Un certificado de propiedad en la blockchain","Una moneda como Bitcoin","Una contraseña"],correct:1},
    {q:"¿Qué estándar sirve para objetos de juego semi-fungibles?",a:["ERC-20","ERC-721","ERC-1155","BTC-1"],correct:2},
    {q:"¿Qué aporta un « NFT de utilidad »?",a:["Nada más que la imagen","Un acceso o una ventaja concreta","Garantía de ganancia","Comisiones reducidas en Binance"],correct:1},
    {q:"¿Qué son los RWA?",a:["Bots de trading","La tokenización de activos del mundo real","Un tipo de billetera","Comisiones de gas"],correct:1},
    {q:"¿Para qué sirven las regalías de un NFT?",a:["Pagar el gas","Cobrar un % en cada reventa futura","Mintar gratis","Borrar el NFT"],correct:1}
  ]},
  5:{ modules:{
    brand:{title:"Branding Web3",body:`
      <p>En Web3, tu <b>marca</b> es lo que hace que confíen en ti en un océano de proyectos. Antes de la técnica, está la <b>historia</b>.</p>
      <ul><li><b>Misión clara</b> — qué problema resuelves y para quién.</li><li><b>Identidad visual</b> — logo, colores, tono (como el universo lunar de MOON-RZ).</li><li><b>Coherencia</b> — el mismo mensaje en todas partes (web, X, Discord).</li></ul>
      <div class="callout">💡 La gente no compra un token, se une a una <b>visión</b>. Cuenta una historia a la que quieran pertenecer.</div>`},
    community:{title:"Construir comunidad",body:`
      <p>En cripto, <b>la comunidad es el producto</b>. Un proyecto sin comunidad está muerto, aunque tenga gran tecnología.</p>
      <ul><li><b>Discord / Telegram</b> — el cuartel general diario.</li><li><b>X (Twitter)</b> — el escaparate y la captación.</li><li><b>Compromiso real</b> — responde, escucha, recompensa a los miembros activos.</li></ul>
      <div class="callout warn">⚠️ Cuidado con las métricas de vanidad: 50.000 seguidores comprados valen menos que 500 fans reales y activos. Busca calidad, no ruido.</div>`},
    marketing:{title:"Marketing cripto",body:`
      <p>El marketing Web3 mezcla lo clásico con palancas propias del ecosistema.</p>
      <ul><li><b>Contenido educativo</b> — aportar valor antes de vender.</li><li><b>Alianzas y KOL</b> — influencers cripto (verifícalos, hay muchos falsos).</li><li><b>Airdrops y misiones</b> — recompensar la acción para arrancar la comunidad (el modelo Learn→Earn).</li></ul>
      <div class="callout">El mejor marketing cripto sigue siendo un producto que funciona + usuarios que hablan de él solos.</div>`},
    dao:{title:"Las DAO",body:`
      <p>Una <b>DAO</b> (Organización Autónoma Descentralizada) es una organización gobernada por su comunidad vía blockchain, en vez de por un jefe.</p>
      <ul><li><b>Tokens de gobernanza</b> — tener el token = derecho a voto.</li><li><b>Propuestas y votos</b> — la comunidad decide la evolución y la tesorería.</li><li><b>Transparencia</b> — decisiones y fondos visibles on-chain.</li></ul>
      <div class="callout">⚖️ Reto clave: evitar que unos pocos grandes tenedores ("ballenas") controlen todos los votos. El diseño de gobernanza importa tanto como la tecnología.</div>`},
    tokenomics:{title:"Tokenomics",body:`
      <p>La <b>tokenomics</b> es la economía de tu token: lo que determina si mantiene valor con el tiempo.</p>
      <ul><li><b>Oferta</b> — total, circulante, inflación/deflación.</li><li><b>Distribución</b> — equipo, comunidad, inversores, y el <b>vesting</b> (desbloqueo gradual).</li><li><b>Utilidad</b> — ¿por qué tener el token? (gas, gobernanza, acceso, recompensas…).</li><li><b>Oferta vs demanda</b> — un token útil y escaso gana valor.</li></ul>
      <div class="callout">🧮 El token MOON-RZ sigue esta lógica: se gana con la acción (Learn→Earn) y se gasta para desbloquear contenido, NFT y competiciones.</div>`},
    launch:{title:"Lanzar tu proyecto",body:`
      <p>Juntar las piezas para pasar de la idea al lanzamiento:</p>
      <ul><li><b>1. Visión y whitepaper</b> — qué, por qué, cómo.</li><li><b>2. Comunidad</b> — constrúyela ANTES del lanzamiento.</li><li><b>3. Tokenomics</b> — sana y transparente.</li><li><b>4. Producto / MVP</b> — demuestra que funciona (¡como esta app!).</li><li><b>5. Lanzamiento y liquidez</b> — luego itera con la comunidad.</li></ul>
      <div class="callout">🏗️ Lema del Web3 Founder: "Comunidad primero, hype después." Un lanzamiento exitoso se prepara con meses de antelación.</div>`}
  }, quiz:[
    {q:"En cripto, ¿qué compra realmente la gente?",a:["Un token aislado","Una visión y una comunidad","El logo","Gas"],correct:1},
    {q:"¿Por qué desconfiar de 50.000 seguidores de golpe?",a:["Siempre es buena señal","Puede ser métrica de vanidad (engagement falso)","Baja el precio del token","Sube el gas"],correct:1},
    {q:"¿Qué es una DAO?",a:["Una billetera física","Una organización gobernada por su comunidad on-chain","Un tipo de NFT","Un exchange centralizado"],correct:1},
    {q:"¿Para qué sirve el vesting en tokenomics?",a:["Quemar tokens","Desbloquear tokens gradualmente (equipo, inversores)","Pagar gas","Crear NFT"],correct:0},
    {q:"¿Qué riesgo amenaza la gobernanza de una DAO?",a:["Demasiada transparencia","La concentración de votos en pocas ballenas","Votos gratis","Demasiados miembros"],correct:1},
    {q:"¿La prioridad correcta antes de un lanzamiento?",a:["Máximo hype de inmediato","Construir la comunidad y un producto que funcione","Comprar seguidores","Lanzar sin whitepaper"],correct:1}
  ]},
  6:{ modules:{
    candles:{title:"Leer un gráfico: las velas",body:`
      <p>El gráfico de <b>velas japonesas</b> es el lenguaje universal del trader. Cada vela resume la batalla compradores/vendedores en un periodo.</p>
      <h4>Una vela = 4 precios</h4>
      <ul><li><b>Apertura</b> y <b>cierre</b> (el cuerpo de la vela).</li><li><b>Máximo</b> y <b>mínimo</b> (las mechas).</li><li>Cuerpo <b>verde</b> = cierre por encima de la apertura (sube). <b>Rojo</b> = baja.</li></ul>
      <p>La <b>temporalidad (timeframe)</b> lo cambia todo: una vela de 1 minuto ≠ una vela de 1 día.</p>
      <div class="callout">💡 Abre tu <b>Simulador</b> en paralelo: verás moverse precios reales. El trading se aprende con el ojo en el mercado, no en los libros.</div>`},
    sr:{title:"Soportes y resistencias",body:`
      <p>Son los niveles de precio más importantes que identificar.</p>
      <h4>Soporte</h4>
      <p>Un <b>suelo</b> donde los compradores retoman el control y rebotan el precio. Al precio "le cuesta bajar" de ese nivel.</p>
      <h4>Resistencia</h4>
      <p>Un <b>techo</b> donde los vendedores toman el control. Al precio "le cuesta subir" por encima.</p>
      <ul><li>Cuanto más se prueba un nivel, más significativo es.</li><li>Un soporte roto suele convertirse en resistencia (y viceversa).</li></ul>
      <div class="callout warn">⚠️ Estos niveles son <b>zonas</b>, no líneas perfectas al píxel. No te pases de preciso.</div>`},
    trend:{title:"Las tendencias",body:`
      <p>"<b>The trend is your friend</b>": la primera pregunta de un trader es siempre "¿hacia dónde va el mercado?".</p>
      <ul><li><b>Tendencia alcista</b> — máximos y mínimos cada vez más altos.</li><li><b>Tendencia bajista</b> — máximos y mínimos cada vez más bajos.</li><li><b>Rango</b> — el precio oscila lateral, sin dirección.</li></ul>
      <div class="callout">📐 Una <b>línea de tendencia</b> une los mínimos (al alza) o los máximos (a la baja). Su ruptura puede señalar un cambio de dirección.</div>`},
    volume:{title:"El volumen",body:`
      <p>El <b>volumen</b> = la cantidad negociada en un periodo. Es el <b>combustible</b> detrás de un movimiento de precio.</p>
      <ul><li>Una subida con <b>fuerte volumen</b> = movimiento creíble, sostenido.</li><li>Una subida con <b>poco volumen</b> = sospechosa, el movimiento puede agotarse.</li><li>Un pico de volumen suele acompañar giros o rupturas.</li></ul>
      <div class="callout">🔎 Regla simple: el volumen <b>confirma</b> el precio. Una ruptura de resistencia sin volumen es sospechosa.</div>`},
    liquidity:{title:"La liquidez",body:`
      <p>La <b>liquidez</b> es la facilidad para comprar o vender sin mover el precio. Muchas órdenes en ambos lados = mercado líquido.</p>
      <ul><li>Activo <b>líquido</b> (BTC, ETH) → bajo <b>slippage</b>, ejecución cerca del precio mostrado.</li><li>Activo <b>ilíquido</b> (token pequeño) → una sola orden grande mueve el precio, terreno de manipulación.</li></ul>
      <div class="callout warn">⚠️ Muchas trampas (pump &amp; dump) solo son posibles en activos ilíquidos. Prioriza mercados profundos al empezar.</div>`},
    analyse:{title:"Ponerlo en práctica",body:`
      <p>Junta todo para tu primer <b>análisis de mercado</b> estructurado:</p>
      <ul><li><b>1. Tendencia</b> — ¿alcista, bajista o rango?</li><li><b>2. Niveles</b> — ¿dónde están los soportes y resistencias clave?</li><li><b>3. Volumen</b> — ¿confirma el movimiento actual?</li><li><b>4. Liquidez</b> — ¿el activo es suficientemente profundo?</li><li><b>5. Plan</b> — dónde entro, dónde corto si me equivoco (eso es la Academia 7).</li></ul>
      <div class="callout">🏋️ Ejercicio del Market Analyst: abre el <b>Simulador</b>, elige BTC o ETH y haz estos 5 pasos en voz alta antes de pulsar "Comprar". Repite con ETH, BNB, SOL, XRP.</div>`}
  }, quiz:[
    {q:"¿Qué representa el cuerpo de una vela?",a:["El máximo y el mínimo","La apertura y el cierre","El volumen","Las comisiones"],correct:1},
    {q:"¿Qué es un soporte?",a:["Un techo de precio","Un suelo donde los compradores rebotan el precio","Un tipo de token","Una vela roja"],correct:1},
    {q:"Una tendencia alcista es…",a:["Máximos y mínimos cada vez más altos","Un precio plano","Mínimos cada vez más bajos","Siempre poco volumen"],correct:0},
    {q:"¿Para qué sirve el volumen?",a:["Calcular comisiones","Confirmar la credibilidad de un movimiento de precio","Crear NFT","Asegurar la billetera"],correct:1},
    {q:"Un activo ilíquido es peligroso porque…",a:["Tiene demasiado volumen","Una orden grande puede mover el precio (manipulación)","Es muy caro","No tiene gráfico"],correct:1},
    {q:"¿La primera pregunta antes de operar?",a:["¿Cuál es el logo del proyecto?","¿Hacia dónde va la tendencia?","¿Quién es el CEO?","¿Cuántos seguidores?"],correct:1}
  ]},
  7:{ modules:{
    mtf:{title:"Análisis multi-temporal",body:`
      <p>Un buen trader mira <b>varias temporalidades</b> antes de actuar. Una sola es mirar por el ojo de una cerradura.</p>
      <h4>El método top-down</h4>
      <ul><li><b>TF mayor</b> (día/semana) → la tendencia de fondo, el escenario.</li><li><b>TF media</b> (4h/1h) → las zonas de interés.</li><li><b>TF menor</b> (15m/5m) → el punto de entrada preciso.</li></ul>
      <p>Regla de oro: <b>operar a favor de la tendencia mayor</b>, y afinar la entrada en la menor.</p>
      <div class="callout warn">⚠️ Error clásico de principiante: tomar una señal de 5 minutos contra la tendencia diaria. Es nadar contracorriente.</div>`},
    risk:{title:"Gestión del riesgo",body:`
      <p>La verdad que nadie cuenta a los principiantes: <b>el trading es primero gestionar el riesgo, no predecir el precio.</b> Sobrevives antes de ganar.</p>
      <h4>La regla del 1%</h4>
      <p>Nunca arriesgues <b>más del 1 al 2%</b> de tu capital en una sola operación. Con 1% de riesgo harían falta 100 operaciones perdedoras seguidas para arruinarte — casi imposible.</p>
      <ul><li>Una pérdida del 50% exige luego una ganancia del <b>100%</b> solo para volver a cero. Proteger el capital es matemática.</li><li>El <b>stop-loss</b> no es opcional: es tu cinturón de seguridad.</li></ul>
      <div class="callout">🧮 Practícalo en el Simulador: decide ANTES de comprar cuánto aceptas perder, y respétalo.</div>`},
    sizing:{title:"Tamaño de la posición",body:`
      <p>El <b>position sizing</b> responde a "¿cuánto compro?". Sale de tu riesgo, no de tu entusiasmo.</p>
      <h4>La fórmula</h4>
      <p><code>Tamaño = (Capital × % riesgo) ÷ distancia al stop-loss</code></p>
      <p>Ejemplo: capital 10.000 $, riesgo 1% (100 $), stop a -5% → puedes desplegar <b>2.000 $</b> en esta operación (porque 5% de 2000 = 100).</p>
      <div class="callout warn">⚠️ No es "me gusta esta moneda, lo meto todo". El tamaño es un <b>cálculo</b>, definido por dónde cortas si te equivocas.</div>`},
    rr:{title:"Stop-loss, Take-profit y R:R",body:`
      <p>Cada operación debe tener un plan de salida <b>antes</b> de entrar.</p>
      <ul><li><b>Stop-loss (SL)</b> — el precio donde admites que te equivocaste y cortas.</li><li><b>Take-profit (TP)</b> — el precio donde tomas ganancias.</li><li><b>Ratio Riesgo/Beneficio (R:R)</b> — cuánto buscas vs cuánto arriesgas.</li></ul>
      <p>Un R:R de <b>1:3</b> significa arriesgar 100 $ para buscar 300 $. Con ese ratio puedes fallar más veces de las que aciertas y seguir siendo <b>rentable</b>.</p>
      <div class="callout">📐 Busca al menos 1:2. Por debajo, la mínima racha perdedora te hunde.</div>`},
    journal:{title:"Diario y psicología",body:`
      <p>Tu peor enemigo en el trading no es el mercado: eres <b>tú</b> (miedo, codicia, venganza).</p>
      <h4>El diario de trading</h4>
      <p>Anota cada operación: entrada, salida, motivo, emoción sentida, resultado. Así detectas tus errores recurrentes y mejoras de verdad.</p>
      <ul><li><b>FOMO</b> — comprar por miedo a perderse algo = entrar tarde.</li><li><b>Revenge trading</b> — querer "recuperarse" tras una pérdida = desastre.</li><li><b>Disciplina > motivación</b> — un plan seguido en frío vence al instinto.</li></ul>
      <div class="callout">🧠 Lema del Professional Trader: "Plan the trade, trade the plan." Decide en frío, ejecuta sin emoción.</div>`},
    strategy:{title:"Construir tu estrategia",body:`
      <p>Una estrategia es un conjunto de <b>reglas escritas</b> que sigues sin improvisar. Tres grandes estilos:</p>
      <ul><li><b>Scalping</b> — muchas operaciones muy cortas (minutos). Intenso, exigente.</li><li><b>Swing</b> — mantener una posición unos días/semanas en una tendencia.</li><li><b>Inversión (DCA)</b> — comprar regularmente a largo plazo, sin timing.</li></ul>
      <h4>Tu estrategia debe definir</h4>
      <p>Qué mercado · qué TF · condición de entrada · stop-loss · take-profit · tamaño de posición · regla de gestión emocional.</p>
      <div class="callout">🏋️ Ejercicio del Professional Trader: escribe UNA estrategia (estilo swing), y pruébala en 10 operaciones en el Simulador respetando cada regla. Anótalo todo en tu diario.</div>`}
  }, quiz:[
    {q:"En el análisis multi-temporal, operas…",a:["Contra la tendencia mayor","A favor de la tendencia mayor, entrada afinada en la TF menor","Solo en 1 minuto","Al azar"],correct:1},
    {q:"La regla del 1% dice…",a:["Ganar 1% garantizado al día","Nunca arriesgar más del 1-2% del capital por operación","Invertir 1% en Bitcoin","Pagar 1% de comisiones"],correct:1},
    {q:"El position sizing depende sobre todo de…",a:["Tu entusiasmo por la moneda","Tu riesgo aceptado y la distancia a tu stop-loss","El número de seguidores del proyecto","El color de la vela"],correct:1},
    {q:"Un Riesgo/Beneficio de 1:3 significa…",a:["Arriesgar 300 para ganar 100","Arriesgar 100 para buscar 300","Tres operaciones al día","30% de comisiones"],correct:1},
    {q:"¿Qué es el revenge trading?",a:["Una estrategia ganadora","Querer recuperar una pérdida, a menudo desastroso","Un tipo de orden","Operar de noche"],correct:1},
    {q:"¿Para qué sirve un diario de trading?",a:["Para nada","Detectar errores recurrentes y mejorar","Pagar menos impuestos","Minar monedas"],correct:1}
  ]},
  8:{ modules:{
    copilot:{title:"La IA, tu copiloto cripto",body:`
      <p>La IA (Claude, ChatGPT…) no reemplaza tu cerebro: es un <b>copiloto</b> que ahorra muchísimo tiempo en investigación, análisis y aprendizaje.</p>
      <ul><li><b>Explicar</b> un concepto complejo a tu nivel.</li><li><b>Resumir</b> un whitepaper de 40 páginas en 10 líneas.</li><li><b>Idear</b> una estrategia o un proyecto.</li><li><b>Programar</b> un script, un bot, un contrato inteligente simple.</li></ul>
      <div class="callout">💡 Esta app de MOON-RZ Academy se construyó con IA. La IA es un multiplicador de fuerza para un creador en solitario.</div>`},
    prompt:{title:"Hacer buenos prompts",body:`
      <p>La calidad de la respuesta depende de la calidad de tu pregunta. Un buen <b>prompt</b> da contexto y un objetivo claro.</p>
      <h4>La receta R-C-T</h4>
      <ul><li><b>Rol</b> — "Actúa como un analista cripto experto."</li><li><b>Contexto</b> — los datos, tu nivel, la restricción.</li><li><b>Tarea</b> — qué quieres exactamente, y el formato de salida.</li></ul>
      <div class="callout warn">⚠️ Sé preciso: "analiza BTC" es vago. "Dame soporte, resistencia y tendencia de BTC en H4, en 5 viñetas" es accionable.</div>`},
    analyst:{title:"Crear un analista cripto con IA",body:`
      <p>Puedes convertir una IA en un <b>asistente de análisis</b> reutilizable, con instrucciones fijas.</p>
      <h4>Ejemplo de instrucción</h4>
      <p>"Eres mi analista. Para cada activo que te dé, responde siempre con: tendencia, niveles clave, volumen, nivel de riesgo /10 y un plan en una frase. Nunca consejo financiero, solo análisis."</p>
      <div class="callout">🎯 La IA estructura tu razonamiento y te obliga a seguir el método de la Academia 6. La decisión final sigues siendo TÚ.</div>`},
    scanner:{title:"Escáner de mercado con IA",body:`
      <p>Un <b>escáner</b> filtra la información para quedarse con lo que importa, y la IA acelera ese filtrado.</p>
      <ul><li>Resumir las noticias y el sentimiento del mercado del día.</li><li>Comparar varios proyectos según criterios fijos (equipo, tokenomics, liquidez…).</li><li>Detectar señales para investigar — <b>nunca</b> para ejecutar a ciegas.</li></ul>
      <div class="callout warn">⚠️ Una señal de IA es una <b>pista</b>, no una orden. Siempre verifica los datos por ti mismo antes de actuar.</div>`},
    agents:{title:"Agentes IA y automatización",body:`
      <p>Un <b>agente IA</b> es una IA que puede encadenar acciones hacia un objetivo (buscar, analizar, redactar, a veces ejecutar vía herramientas).</p>
      <ul><li>Automatizar una vigilancia diaria.</li><li>Generar informes periódicos.</li><li>Asistir la creación (contenido, código, diseño).</li></ul>
      <div class="callout warn">⚠️ Peligro real: un agente conectado a una billetera o exchange puede causar daños si está mal acotado. Empieza en solo lectura / en el simulador.</div>`},
    ailimits:{title:"Límites y seguridad de la IA",body:`
      <p>La IA es potente pero falible. Conocer los límites = usarla con inteligencia.</p>
      <ul><li><b>Alucinaciones</b> — la IA puede inventar datos con seguridad. Verifica cifras y contratos.</li><li><b>Datos desfasados</b> — puede no conocer los precios del momento.</li><li><b>Seguridad</b> — NUNCA des tu frase semilla ni claves privadas a una IA ni a ningún sitio.</li></ul>
      <div class="callout">🧠 Regla del AI Trader: la IA <b>asiste</b> tu decisión, no la <b>reemplaza</b>. Mantén siempre el control y el sentido crítico.</div>`}
  }, quiz:[
    {q:"¿Cuál es el buen papel de la IA en cripto?",a:["Decidir por ti","Un copiloto que acelera investigación y análisis","Guardar tus claves privadas","Garantizar ganancias"],correct:1},
    {q:"Un buen prompt contiene idealmente…",a:["Una sola palabra vaga","Rol, contexto y una tarea clara con formato","Solo emojis","Tu frase semilla"],correct:1},
    {q:"Una señal de un escáner IA es…",a:["Una orden a ejecutar a ciegas","Una pista a verificar por ti mismo","Una garantía de ganancia","Un contrato inteligente"],correct:1},
    {q:"¿Riesgo de un agente IA conectado a una billetera?",a:["Ninguno","Puede causar daños si está mal acotado","Mina más rápido","Baja el gas"],correct:1},
    {q:"¿Qué es una alucinación de IA?",a:["Un fallo de pantalla","Cuando la IA inventa un dato con seguridad","Un tipo de NFT","Una caída de red"],correct:1},
    {q:"¿Puedes dar tu frase semilla a una IA para que te ayude?",a:["Sí si es conocida","Nunca, a nadie ni a ninguna herramienta","Sí las 12 primeras palabras","Solo los fines de semana"],correct:1}
  ]},
  9:{ modules:{
    standards:{title:"Los estándares de token",body:`
      <p>Crear un token es seguir un <b>estándar</b> reconocido para que sea compatible con billeteras y exchanges.</p>
      <ul><li><b>ERC-20</b> (Ethereum) — el estándar de los tokens fungibles.</li><li><b>BEP-20</b> (BNB Chain) — el equivalente, comisiones más bajas.</li><li>En Solana es el programa <b>SPL Token</b>.</li></ul>
      <p>Un token se define por: un <b>nombre</b>, un <b>símbolo</b> (p. ej. MOON), una <b>oferta total</b> y un número de <b>decimales</b>.</p>
      <div class="callout">💡 Técnicamente, crear un token básico es simple. Lo difícil — y lo que importa — es todo lo de alrededor (utilidad, liquidez, confianza).</div>`},
    contract:{title:"El contrato del token",body:`
      <p>El token vive en un <b>contrato inteligente</b> que define sus reglas: quién puede mintar, quemar, y con qué límites.</p>
      <ul><li><b>Mint</b> — crear nuevos tokens.</li><li><b>Burn</b> — destruir algunos (reduce la oferta, deflacionario).</li><li><b>Owner / permisos</b> — quién controla qué.</li></ul>
      <div class="callout warn">⚠️ Un contrato mal escrito = puerta abierta a hackeos y rug pulls. Para un lanzamiento real, una <b>auditoría</b> profesional es indispensable.</div>`},
    liquidity9:{title:"Liquidez y lanzamiento",body:`
      <p>Un token sin <b>liquidez</b> no vale nada: nadie puede comprarlo ni venderlo.</p>
      <h4>Crear un mercado</h4>
      <p>Se crea un <b>pool de liquidez</b> en un DEX (p. ej. tu token + USDC). La proporción depositada fija el precio inicial.</p>
      <ul><li><b>Bloquear la liquidez</b> (lock) tranquiliza: el equipo no puede retirarla toda.</li><li>Comunica el contrato oficial para evitar tokens falsos (ver Academia 2).</li></ul>
      <div class="callout">🔒 Liquidez bloqueada + contrato auditado = dos señales de seriedad que busca un inversor avispado.</div>`},
    vesting:{title:"El vesting",body:`
      <p>El <b>vesting</b> desbloquea los tokens <b>gradualmente</b> en el tiempo, en vez de liberarlo todo de golpe.</p>
      <ul><li>Impide que el equipo y los primeros inversores vendan todo en el lanzamiento (un "dump").</li><li>Alinea intereses a <b>largo plazo</b>.</li><li>Suele mostrarse en un calendario de emisión.</li></ul>
      <div class="callout warn">⚠️ Antes de invertir en un proyecto, mira el vesting: si se desbloquean grandes cantidades pronto, el precio puede caer.</div>`},
    governance:{title:"La gobernanza",body:`
      <p>Un token puede dar <b>poder de decisión</b>: eso es la gobernanza (ligada a las DAO, Academia 5).</p>
      <ul><li>Tener el token = votar la evolución del proyecto.</li><li>Decisiones y tesorería gestionadas de forma transparente, on-chain.</li><li>El reto: evitar el dominio de las <b>ballenas</b> sobre todos los votos.</li></ul>
      <div class="callout">⚖️ Un buen diseño de gobernanza distribuye el poder y fomenta la participación de la comunidad.</div>`},
    launch9:{title:"Lanzar un token responsable",body:`
      <p>Resumen de un lanzamiento <b>serio</b>, lo opuesto a un scam:</p>
      <ul><li><b>1.</b> Utilidad clara — para qué sirve realmente el token.</li><li><b>2.</b> Contrato auditado, permisos sanos.</li><li><b>3.</b> Tokenomics transparente (oferta, distribución, vesting).</li><li><b>4.</b> Liquidez aportada y bloqueada.</li><li><b>5.</b> Comunidad informada, contrato oficial publicado.</li></ul>
      <div class="callout">🪙 Lema del Token Engineer: "Un token solo vale por lo que puedes hacer con él." Construye el uso antes que el precio. Esa es justo la lógica del token MOON-RZ.</div>`}

  10:{ modules:{

      <p>Bienvenido a la última academia. Aquí ya no descubres: <b>conectas todo</b> y demuestras tu dominio.</p>

    m_defi:{title:"Checkpoint 2 — DeFi y rendimiento",body:`

      <ul><li>Swap en un DEX, aportar liquidez, leer un APY.</li><li>Staking, lending y el peligro de la liquidación.</li><li>Pérdida impermanente y riesgo de contrato inteligente.</li></ul>
      <div class="callout">🧠 Dominio = no perseguir nunca un rendimiento cuya fuente no puedas explicar.</div>`},
    m_nft:{title:"Checkpoint 3 — NFT y creación",body:`
      <p>Ves el NFT por lo que es: un <b>certificado de propiedad</b> y un portador de utilidad.</p>
      <ul><li>Entender colecciones, estándares, rareza.</li><li>Evaluar la utilidad real antes de comprar.</li><li>Saber crear, listar y configurar regalías.</li></ul>
      <div class="callout">🎯 Tus insignias MOON-RZ son ellas mismas NFT de utilidad: prueban lo que has aprendido.</div>`},
    m_trade:{title:"Checkpoint 4 — Trading y riesgo",body:`
      <p>Lees un mercado y actúas con un <b>plan</b>, no con tus emociones.</p>
      <ul><li>Tendencia, soportes/resistencias, volumen, liquidez.</li><li>La regla del 1%, position sizing, R:R ≥ 1:2.</li><li>Diario de trading y disciplina ante el FOMO.</li></ul>
      <div class="callout">🏋️ Prueba por la acción: aplica una estrategia completa en el <b>Simulador</b>, del plan de entrada al stop-loss.</div>`},
    m_build:{title:"Checkpoint 5 — Construir y tokenizar",body:`
      <p>Puedes pasar de simple usuario a <b>constructor</b> de ecosistemas.</p>
      <ul><li>Visión, branding, comunidad primero.</li><li>Tokenomics sana: oferta, distribución, vesting, utilidad.</li><li>Lanzar un token responsable, con gobernanza y liquidez bloqueada.</li></ul>
      <div class="callout">🏗️ "Comunidad primero, hype después." Ya sabes reconocer — y construir — un proyecto serio.</div>`},
    m_master:{title:"Checkpoint final — MOON-RZ Master",body:`
      <p>Recta final. Has recorrido las 10 academias: blockchain, seguridad, DeFi, NFT, emprendimiento, trading, IA, tokenización.</p>
      <h4>El perfil del MOON-RZ Master</h4>
      <ul><li>🛡️ Autónomo y seguro en Web3.</li><li>💹 Capaz de analizar un mercado y gestionar su riesgo.</li><li>🏗️ Capaz de entender, evaluar y construir un proyecto.</li><li>🧠 Sentido crítico: ninguna promesa de dinero fácil te atrapa.</li></ul>
      <div class="callout">🏆 Aprueba el examen final para conseguir el <b>MOON-RZ MASTER NFT</b> y alcanzar el rango supremo: <b>MOON-RZ Legend</b>. El verdadero dominio es seguir aprendiendo. 🚀</div>`}

 th:{
  1:{ modules:{
    bc:{title:"บล็อกเชนคืออะไร?",body:`
      <p><b>บล็อกเชน</b> คือสมุดบัญชีขนาดใหญ่ที่แชร์กันระหว่างคอมพิวเตอร์หลายพันเครื่องทั่วโลก ไม่มีใครเป็นเจ้าของ และทุกคนตรวจสอบได้</p>
      <h4>แนวคิดหลัก</h4>
      <p>ธุรกรรมถูกจัดกลุ่มไว้ใน <b>บล็อก</b> แต่ละบล็อกเชื่อมกับบล็อกก่อนหน้าด้วยลายนิ้วมือทางคริปโต (<code>hash</code>) จึงเป็นที่มาของชื่อ: <i>ห่วงโซ่ของบล็อก</i></p>
      <ul><li><b>กระจายศูนย์</b> — ไม่มีธนาคารหรือเซิร์ฟเวอร์กลาง</li><li><b>แก้ไขไม่ได้</b> — เมื่อบันทึกแล้วเปลี่ยนอดีตไม่ได้</li><li><b>โปร่งใส</b> — ใครก็ตรวจสอบทุกอย่างได้</li></ul>
      <div class="callout">💡 เปรียบเทียบ: Google Doc สาธารณะที่คนหลายพันคัดลอกพร้อมกัน ถ้าใครโกงในสำเนาของตน คนอื่นจะปฏิเสธโดยอัตโนมัติ</div>`},
    btc:{title:"Bitcoin — ทองคำดิจิทัล",body:`
      <p><b>Bitcoin (BTC)</b> คือบล็อกเชนแรก สร้างปี 2009 โดย Satoshi Nakamoto เป้าหมาย: เงินดิจิทัลที่ไม่มีธนาคาร ปลอมแปลงไม่ได้</p>
      <h4>ทำไมเรียก « ทองคำดิจิทัล »?</h4>
      <ul><li>อุปทาน <b>จำกัดที่ 21 ล้าน</b> BTC ไม่มีมากกว่านี้</li><li>ปลอดภัยด้วย <b>Proof of Work</b> (การขุด)</li><li>ส่วนใหญ่ใช้เป็น <b>ที่เก็บมูลค่า</b></li></ul>
      <div class="callout">หน่วยย่อยที่สุดของ Bitcoin คือ <code>satoshi</code>: 1 BTC = 100,000,000 satoshi</div>`},
    eth:{title:"Ethereum — คอมพิวเตอร์ของโลก",body:`
      <p><b>Ethereum (ETH)</b> ไม่ได้มีไว้แค่ส่งเงิน แต่เป็นแพลตฟอร์มที่รัน <b>smart contract</b></p>
      <p>บนนั้นสร้างแอปแบบกระจายศูนย์ (<code>dApps</code>): DeFi, NFT, DAO, เกม Web3</p>
      <ul><li>เหรียญหลัก: <b>Ether (ETH)</b></li><li>ค่าธรรมเนียมเรียกว่า <b>gas</b></li><li>ตั้งแต่ปี 2022 ใช้ <b>Proof of Stake</b> ประหยัดพลังงานกว่ามาก</li></ul>`},
    bnb:{title:"BNB Chain — เร็วและถูก",body:`
      <p><b>BNB Chain</b> เข้ากันได้กับ Ethereum โดยมี <b>ค่าธรรมเนียมต่ำมาก</b> และธุรกรรมรวดเร็ว</p>
      <ul><li>เหรียญหลัก: <b>BNB</b></li><li>รองรับ <b>EVM</b>: ใช้กระเป๋าและเครื่องมือเดียวกับ Ethereum</li><li>นิยมมากในหมู่มือใหม่</li></ul>
      <div class="callout warn">⚠️ ค่าธรรมเนียมต่ำก็หมายถึงมีสแกมและโทเคนปลอมเยอะด้วย (Academy 2)</div>`},
    sc:{title:"Smart Contracts",body:`
      <p><b>Smart contract</b> คือโปรแกรมบนบล็อกเชนที่ทำงานเองเมื่อเงื่อนไขครบ ไม่มีคนกลาง</p>
      <h4>ตัวอย่าง</h4><p>« <i>ถ้าฉันได้รับ 1 ETH ฉันจะส่ง NFT นี้ให้ผู้ซื้อ</i> » โค้ดคือกฎหมาย: <code>code is law</code></p>
      <div class="callout">อัตโนมัติและปลอมไม่ได้ แต่ถ้าโค้ดมีบั๊กก็ไม่มีฝ่ายบริการลูกค้า จึงต้องมี <b>การตรวจสอบ (audit)</b></div>`},
    wallet:{title:"กระเป๋าเงิน (Wallet)",body:`
      <p><b>กระเป๋า</b> ไม่ได้ "เก็บ" คริปโตของคุณ (มันอยู่บนบล็อกเชน) แต่เก็บ <b>กุญแจ</b> ของคุณ</p>
      <ul><li><b>ที่อยู่สาธารณะ</b> — เหมือนเลขบัญชี ใช้รับเงิน</li><li><b>Private key</b> — รหัสผ่านสูงสุด ห้ามแชร์เด็ดขาด</li><li><b>Seed phrase</b> (12/24 คำ) — ข้อมูลสำรองของกระเป๋า</li></ul>
      <div class="callout warn">🔒 « Not your keys, not your coins » จด seed phrase ลงกระดาษ อย่าถ่ายรูปหรือเก็บบนคลาวด์</div>`}
  }, quiz:[
    {q:"อะไรทำให้บล็อกเชน « แก้ไขไม่ได้ »?",a:["ธนาคารกลางคุ้มครอง","แต่ละบล็อกเชื่อมกับบล็อกก่อนหน้าด้วย hash","รหัสผ่านผู้ดูแลระบบ","อยู่บนเซิร์ฟเวอร์เดียว"],correct:1},
    {q:"อุปทานสูงสุดของ Bitcoin คือเท่าไร?",a:["100 ล้าน","ไม่จำกัด","21 ล้าน","1 พันล้าน"],correct:2},
    {q:"นอกจากส่งเงิน Ethereum มีไว้ทำอะไร?",a:["ขุด Bitcoin","รัน smart contract และ dApp","เก็บไฟล์","แทนที่ธนาคารกลาง"],correct:1},
    {q:"สิ่งใดที่ห้ามเปิดเผยเด็ดขาด?",a:["ที่อยู่สาธารณะ","ชื่อเล่น","seed phrase / private key ของคุณ","ชื่อบล็อกเชน"],correct:2},
    {q:"ค่าธรรมเนียมบน Ethereum เรียกว่า…",a:["gas","satoshi","staking","hash"],correct:0},
    {q:"« Not your keys, not your coins » หมายความว่า…",a:["เก็บคริปโตไว้บน exchange","ใครถือกุญแจคนนั้นคุมเงิน","กุญแจฟรี","คริปโตหายไม่ได้"],correct:1}
  ]},
  2:{ modules:{
    scam:{title:"สแกมคริปโต: ภาพรวม",body:`
      <p>คริปโตไม่มีคนกลาง: <b>ไม่มีธนาคารยกเลิก</b> ธุรกรรมได้ นั่นคืออิสรภาพ… แต่ก็เป็นสนามเด็กเล่นของมิจฉาชีพ เกราะที่ดีที่สุดคือ <b>ตัวคุณเอง</b></p>
      <h4>กลุ่มหลัก ๆ</h4>
      <ul><li><b>Phishing</b> — เว็บ/ข้อความปลอมที่ขโมยการเข้าถึง</li><li><b>Rug pull</b> — ทีมโปรเจกต์หายไปพร้อมเงิน</li><li><b>Wallet drainer</b> — ลายเซ็นกับดักที่ดูดกระเป๋า</li><li><b>Airdrop/โทเคนปลอม</b> — เหยื่อล่อให้คุณเซ็น</li></ul>
      <div class="callout warn">🚩 กฎข้อ 1: ถ้าดีเกินจริง (×10 การันตี, "เพิ่ม ETH สองเท่า") นั่นคือสแกมเสมอ</div>`},
    phish:{title:"Phishing",body:`
      <p><b>Phishing</b> เลียนแบบเว็บ/บริการที่คุณรู้จัก เพื่อขโมย seed phrase หรือหลอกให้คุณเซ็น</p>
      <h4>วิธีสังเกต</h4>
      <ul><li>ตรวจ <b>URL ทีละตัวอักษร</b>: <code>binance.com</code> ≠ <code>binqnce.com</code></li><li>ระวัง <b>โฆษณา Google</b> ด้านบนผลค้นหา มักปลอม</li><li><b>ไม่มี</b> ฝ่ายสนับสนุนตัวจริงถาม seed phrase</li><li>บุ๊กมาร์กเว็บจริงไว้ แล้วเข้าผ่านนั้นเสมอ</li></ul>
      <div class="callout warn">⚠️ เว็บที่ขอ 12/24 คำ = สแกม 100% ไม่มีข้อยกเว้น</div>`},
    rug:{title:"Rug Pull",body:`
      <p><b>Rug pull</b>: ทีมสร้างโทเคน ดึงดูดผู้ซื้อ แล้ว <b>ถอนสภาพคล่องทั้งหมด</b> และหายไป ราคาดิ่งเป็นศูนย์</p>
      <h4>สัญญาณเตือน</h4>
      <ul><li>ทีม <b>ไม่เปิดเผยตัวตน</b> ไร้ประวัติ</li><li><b>สภาพคล่องไม่ถูกล็อก</b></li><li>มีไม่กี่กระเป๋าถือโทเคน <b>ส่วนใหญ่</b></li><li>ไฮป์เยอะ สัญญากำไร แต่ไม่มีผลิตภัณฑ์จริง</li></ul>
      <div class="callout">🔎 เครื่องมือ: block explorer (Etherscan/BscScan) + สแกนเนอร์สัญญาเพื่อดูการกระจายของผู้ถือ</div>`},
    drain:{title:"Wallet Drainer และ approval",body:`
      <p>คุณไม่ต้องให้ private key ก็โดนดูดได้ แค่เซ็น <b>การอนุญาต (approval)</b> ที่เป็นกับดักก็พอ</p>
      <h4>กับดักคลาสสิก</h4>
      <p>"mint" หรือ "claim" ปลอมหลอกให้คุณเซ็น <code>approve</code> ที่ให้สิทธิ์ผู้โจมตีใช้โทเคนของคุณ แล้วต่อมาก็ดูดหมด</p>
      <ul><li>อ่าน <b>สิ่งที่คุณเซ็น</b>: ข้อความ "set approval for all" อันตราย</li><li>เพิกถอน approval ที่ไม่ใช้ (เช่น <code>revoke.cash</code>)</li><li>ใช้ <b>กระเป๋า burner</b> สำหรับ mint เสี่ยง ๆ</li></ul>
      <div class="callout warn">🖊️ ลายเซ็นเดียวอาจแพงเท่า seed phrase รั่ว ช้าลงก่อนกด "Confirm"</div>`},
    fake:{title:"Airdrop และโทเคนปลอม",body:`
      <p>คุณได้รับโทเคนแปลก ๆ "ฟรี" ในกระเป๋า นั่นคือ <b>เหยื่อล่อ</b></p>
      <ul><li><b>อย่า</b> ยุ่งกับโทเคนแปลกหน้าที่ได้มาแบบไร้เหตุผล</li><li>"Airdrop" ที่ขอให้ <b>เชื่อมกระเป๋าและเซ็น</b> บนเว็บน่าสงสัย = drainer</li><li>ตรวจที่อยู่ทางการของโทเคนบนเว็บ/Twitter <b>จริง</b> ของโปรเจกต์</li></ul>
      <div class="callout">🎁 Airdrop จริงไม่เคยขอให้ส่งเงิน "เพื่อปลดล็อก" รางวัล</div>`},
    audit:{title:"เช็กลิสต์ความปลอดภัยของคุณ",body:`
      <p>ก่อนแตะโปรเจกต์ใด ให้ผ่าน <b>เช็กลิสต์ตรวจสอบเร็ว</b> นี้:</p>
      <ul><li>✅ ตรวจ URL + บุ๊กมาร์ก</li><li>✅ ทีมระบุตัวตนได้ / มีชื่อเสียง</li><li>✅ สัญญาถูก audit, สภาพคล่องล็อก</li><li>✅ การกระจายผู้ถือสมเหตุสมผล</li><li>✅ เข้าใจสิ่งที่เซ็น</li><li>✅ ใช้กระเป๋า burner กับการกระทำเสี่ยง</li><li>✅ seed phrase ออฟไลน์ ไม่เคยพิมพ์ออนไลน์</li></ul>
      <div class="callout">🛡️ คาถาของ Crypto Guardian: <b>"ช้าลง ตรวจสอบ แล้วค่อยเซ็น"</b> ความรีบเร่งคือเพื่อนของหัวขโมย</div>`}
  }, quiz:[

  ]},
  3:{ modules:{
    dex:{title:"DEX กับ CEX",body:`
      <p>มีสองวิธีในการแลกคริปโต:</p>
      <h4>CEX — exchange แบบรวมศูนย์</h4>
      <p>เช่น Binance, Coinbase บริษัทเก็บเงินให้คุณ สะดวก แต่ <b>"not your keys, not your coins"</b>: คุณต้องพึ่งมัน</p>
      <h4>DEX — exchange แบบกระจายศูนย์</h4>
      <p>เช่น Uniswap, PancakeSwap คุณแลก <b>จากกระเป๋าตัวเองโดยตรง</b> ไม่มีคนกลาง smart contract จัดการ swap</p>
      <ul><li>CEX = ง่าย เร็ว แต่รวมศูนย์และมี KYC</li><li>DEX = อิสระ เปิด 24/7 แต่คุณรับผิดชอบเอง</li></ul>
      <div class="callout">💡 DeFi (การเงินกระจายศูนย์) คือจักรวาลของบริการการเงินที่รันบน smart contract โดยไม่มีธนาคาร</div>`},
    lp:{title:"Liquidity Pool และ AMM",body:`
      <p>บน DEX ไม่มีสมุดคำสั่งแบบดั้งเดิม แต่ <b>liquidity pool</b> ทำให้แลกได้</p>
      <h4>ทำงานอย่างไร</h4>
      <p>ผู้ใช้ (<b>LP, ผู้ให้สภาพคล่อง</b>) ฝากสินทรัพย์สองอย่างมูลค่าเท่ากัน เช่น ETH + USDC อัลกอริทึมชื่อ <b>AMM</b> กำหนดราคาด้วยสูตร <code>x · y = k</code></p>
      <ul><li>คุณให้สภาพคล่อง → ได้ <b>ค่าธรรมเนียมเทรด</b></li><li>แลกกับการได้ <b>LP token</b> แทนส่วนแบ่งใน pool</li></ul>
      <div class="callout">ยิ่ง pool มีสภาพคล่องมาก ราคายิ่งขยับน้อยต่อการเทรด (slippage ต่ำ)</div>`},
    yield:{title:"Yield Farming",body:`
      <p><b>Yield farming</b> คือการให้คริปโตทำงานเพื่อสร้างผลตอบแทน มักซ้อนหลายโปรโตคอล</p>
      <ul><li>ให้สภาพคล่อง → ได้ LP token</li><li>นำ LP token ไป stake → ได้โทเคนรางวัล</li><li>วัดผลตอบแทนเป็น <b>APR / APY</b> (อัตราต่อปี)</li></ul>
      <div class="callout warn">⚠️ APY 1000% มีจริง… แต่แทบทุกครั้งไม่ยั่งยืน ผลตอบแทนสูง = ความเสี่ยงสูง ถามตัวเองเสมอว่า "ผลตอบแทนนี้มาจากไหน?"</div>`},
    stake:{title:"Staking",body:`
      <p><b>Staking</b> คือการล็อกโทเคนเพื่อช่วยรักษาความปลอดภัยเครือข่ายแบบ <b>Proof of Stake</b> และได้รางวัลตอบแทน</p>
      <ul><li>ล็อกโทเคน (เช่น ETH, SOL) → ได้ผลตอบแทนสม่ำเสมอ</li><li>มั่นคงและง่ายกว่า yield farming</li><li>ระวัง <b>ช่วงปลดล็อก</b>: เงินอาจถูกล็อกหลายวัน</li></ul>
      <div class="callout">Staking ≈ "เงินที่สร้างดอกเบี้ย" ขณะที่ยังคุมกุญแจของคุณเอง</div>`},
    lend:{title:"การกู้และให้ยืม (Lending)",body:`
      <p>โปรโตคอลอย่าง Aave ให้คุณ <b>ปล่อยกู้</b> คริปโต (ได้ดอกเบี้ย) หรือ <b>กู้ยืม</b> (โดยมีหลักประกัน)</p>
      <h4>แนวคิดสำคัญ: หลักประกันเกิน</h4>
      <p>กู้ 100 $ ต้องฝากหลักประกันเกิน 100 $ (เช่น 150 $) ถ้าหลักประกันร่วงมากไปจะถูก <b>ชำระบังคับ (liquidate)</b> อัตโนมัติ</p>
      <ul><li>ผู้ให้กู้ → รายได้พาสซีฟจากคริปโต</li><li>ผู้กู้ → ได้สภาพคล่องโดยไม่ต้องขายสินทรัพย์</li></ul>
      <div class="callout warn">⚠️ การชำระบังคับคืออันตรายอันดับ 1 ของการกู้ เก็บส่วนเผื่อความปลอดภัยไว้เสมอ</div>`},
    derisk:{title:"ความเสี่ยงของ DeFi",body:`
      <p>DeFi ทรงพลังแต่มีความเสี่ยงเฉพาะตัว รู้จักมันคือทำงานไปแล้วครึ่งหนึ่ง</p>
      <ul><li><b>Impermanent loss</b> — เมื่อให้สภาพคล่อง ถ้าราคาต่างกันมาก คุณอาจจบด้วยมูลค่าน้อยกว่าการถือเฉย ๆ</li><li><b>ความเสี่ยง smart contract</b> — บั๊กหรือการแฮกอาจดูดโปรโตคอล</li><li><b>Rug pull / โปรโตคอลปลอม</b> — ดู Academy 2</li><li><b>ความเสี่ยงชำระบังคับ</b> — จากการกู้</li></ul>
      <div class="callout">🧠 กฎของ DeFi Builder: อย่าใส่ในโปรโตคอลมากกว่าที่ยอมเสียได้ และเลือกโปรโตคอลที่มั่นคงและถูก audit</div>`}
  }, quiz:[
    {q:"ความต่างหลักระหว่าง CEX กับ DEX?",a:["DEX แพงกว่า","บน DEX คุณเทรดจากกระเป๋าตัวเองไม่มีคนกลาง","CEX ไม่มีค่าธรรมเนียม","ไม่ต่างกัน"],correct:1},
    {q:"อะไรกำหนดราคาบน DEX อย่าง Uniswap?",a:["เทรดเดอร์ที่เป็นคน","AMM ผ่านสูตรคณิตศาสตร์","ธนาคารกลาง","ความบังเอิญ"],correct:1},
    {q:"ให้สภาพคล่องกับ pool แล้วได้อะไร?",a:["ไม่ได้อะไร","ค่าธรรมเนียมเทรดและ LP token","บัตรเครดิต","NFT การันตี"],correct:1},
    {q:"โปรโตคอลแสดง APY 1500% ปฏิกิริยาที่ดี?",a:["ลงทุนหมด มันฟรี","ระวัง: ผลตอบแทนสูงมาก = เสี่ยงสูงมาก","เป็นสแกมแน่ ไม่สนใจ","เชื่อทันที"],correct:1},
    {q:"การชำระบังคับ (liquidation) ใน lending คือ?",a:["โบนัสความภักดี","การบังคับขายหลักประกันถ้ามันร่วงมากไป","การถอนดอกเบี้ย","การอัปเดตเครือข่าย"],correct:1},
    {q:"Impermanent loss กระทบใครมากที่สุด?",a:["ผู้กู้","ผู้ให้สภาพคล่องเมื่อราคาต่างกัน","ผู้ stake Bitcoin","ไม่มีใคร"],correct:1}
  ]},
  4:{ modules:{
    nftbasic:{title:"NFT: พื้นฐาน",body:`
      <p><b>NFT</b> (Non-Fungible Token) คือโทเคน <b>เฉพาะตัว</b> ปลอมไม่ได้ที่บันทึกบนบล็อกเชน "Non-fungible" = แลกแทนกันไม่ได้ ต่างจาก 1 บาทที่เท่ากับ 1 บาทอื่น ๆ</p>
      <ul><li>พิสูจน์ <b>ความเป็นเจ้าของ</b> และ <b>ความแท้</b> ของสินทรัพย์ดิจิทัล (หรือกายภาพ)</li><li>NFT แต่ละชิ้นมีรหัสเฉพาะและประวัติสาธารณะ</li></ul>
      <div class="callout warn">⚠️ ความเข้าใจผิดที่พบบ่อย: "NFT ก็แค่รูป" ไม่ใช่ — มันคือ <b>ใบรับรองความเป็นเจ้าของ</b> บนบล็อกเชน รูปเป็นเพียงการใช้งานหนึ่ง</div>`},
    collec:{title:"คอลเลกชันและมาตรฐาน",body:`
      <p>NFT ส่วนใหญ่จัดเป็น <b>คอลเลกชัน</b> (เช่น 10,000 ชิ้นที่ใช้ธีมร่วมกัน)</p>
      <h4>มาตรฐานทางเทคนิค</h4>
      <ul><li><b>ERC-721</b> — แต่ละโทเคนไม่ซ้ำ (1 ผลงาน = 1 โทเคน)</li><li><b>ERC-1155</b> — รองรับกึ่งใช้แทนกันได้ (เช่น 100 ชิ้นของไอเทมเกมเดียวกัน)</li></ul>
      <p><b>ความหายาก</b> (คุณสมบัติหายาก) มีผลต่อมูลค่าที่รับรู้ในคอลเลกชันมาก</p>
      <div class="callout">ข้อมูลเมตา (รูป คุณสมบัติ) มักเก็บบน IPFS เพื่อให้กระจายศูนย์และถาวร</div>`},
    utility:{title:"Utility NFT",body:`
      <p><b>Utility NFT</b> ให้สิทธิ์เข้าถึงบางอย่าง นั่นคือมูลค่าจริงเหนือกว่ารูป</p>
      <ul><li><b>การเข้าถึง / สมาชิก</b> — เข้าชุมชน อีเวนต์ เนื้อหาพรีเมียม (เหมือน NFT ของ MOON-RZ Academy 😉)</li><li><b>สิทธิประโยชน์</b> — ส่วนลด, airdrop, สิทธิ์โหวต</li><li><b>การรับรอง</b> — วุฒิบัตรหรือตราที่ตรวจสอบได้</li></ul>
      <div class="callout">💡 คำถามก่อนซื้อ: "NFT นี้ใช้ทำอะไรได้จริง?" ถ้ามีไว้เก็งกำไรอย่างเดียว ความเสี่ยงสูง</div>`},
    gaming:{title:"NFT เกม",body:`
      <p>ในเกม Web3 ไอเทม (ตัวละคร อาวุธ ที่ดิน) อาจเป็น NFT ที่คุณ <b>เป็นเจ้าของจริง</b> และขายต่อได้</p>
      <ul><li><b>Play-to-earn</b> — เล่นแล้วได้โทเคน/NFT</li><li><b>การทำงานข้ามกัน</b> — แนวคิด (ยังใหม่) ที่ใช้ไอเทมเดียวกันได้หลายเกม</li></ul>
      <div class="callout warn">⚠️ เกม P2E หลายเกมล่มเพราะเศรษฐกิจพึ่งผู้เล่นใหม่ที่เข้ามาตลอด ประเมิน <b>ความยั่งยืนทางเศรษฐกิจ</b> ของเกมเสมอ</div>`},
    rwa:{title:"สินทรัพย์โลกจริง (RWA)",body:`
      <p><b>RWA</b> แปลงสินทรัพย์โลกจริงเป็นโทเคน: อสังหาฯ ศิลปะ พันธบัตร ทองคำ… แทนด้วยโทเคนบนบล็อกเชน</p>
      <ul><li>ทำให้ <b>เป็นเจ้าของแบบเศษส่วน</b> ได้ (ถือ 1% ของอพาร์ตเมนต์)</li><li>สภาพคล่องมากขึ้นสำหรับสินทรัพย์ที่ปกติขายยาก</li><li>ภาคที่เติบโตแรง แต่ผูกกับ <b>กฎระเบียบ</b> มาก</li></ul>
      <div class="callout">โปรเจกต์อื่นของคุณ (STAYLO) เกี่ยวกับการแปลงสินทรัพย์จริงเป็นโทเคนพอดี — ตรงกับโมดูลนี้เป๊ะ</div>`},
    mint:{title:"สร้างและลงขาย NFT",body:`
      <p>ขั้นตอนจากไอเดียสู่ NFT ที่ขายได้:</p>
      <ul><li><b>1. สร้าง</b> ภาพ/เนื้อหา และข้อมูลเมตา</li><li><b>2. Mint</b> — บันทึก NFT บนบล็อกเชน (ผ่าน marketplace หรือสัญญา)</li><li><b>3. ลงขาย</b> — ตั้งขาย (ราคาคงที่หรือประมูล) บน marketplace (OpenSea, Magic Eden…)</li><li><b>4. ค่าลิขสิทธิ์</b> — ตั้ง % ที่คุณได้ทุกครั้งที่ขายต่อในอนาคต</li></ul>
      <div class="callout">🎨 เคล็ดลับ NFT Architect: มูลค่าคอลเลกชัน 80% มาจาก <b>ชุมชนและ utility</b>, 20% มาจากศิลปะ สร้างทั้งสองอย่าง</div>`}
  }, quiz:[
    {q:"« Non-fungible » หมายความว่า?",a:["ไร้มูลค่า","เฉพาะตัวและแลกแทนกันไม่ได้","ฟรี","เก็บออฟไลน์"],correct:1},
    {q:"พื้นฐานแล้ว NFT คือ…",a:["แค่ภาพ JPEG","ใบรับรองความเป็นเจ้าของบนบล็อกเชน","เหรียญอย่าง Bitcoin","รหัสผ่าน"],correct:1},
    {q:"มาตรฐานใดใช้กับไอเทมเกมกึ่งใช้แทนกัน?",a:["ERC-20","ERC-721","ERC-1155","BTC-1"],correct:2},
    {q:"« Utility NFT » ให้อะไร?",a:["แค่ภาพ","การเข้าถึงหรือสิทธิประโยชน์ที่จับต้องได้","การันตีกำไร","ลดค่าธรรมเนียม Binance"],correct:1},
    {q:"RWA คืออะไร?",a:["บอทเทรด","การแปลงสินทรัพย์โลกจริงเป็นโทเคน","กระเป๋าชนิดหนึ่ง","ค่า gas"],correct:1},
    {q:"ค่าลิขสิทธิ์ของ NFT มีไว้ทำอะไร?",a:["จ่าย gas","ได้ % ทุกครั้งที่ขายต่อในอนาคต","mint ฟรี","ลบ NFT"],correct:1}
  ]},
  5:{ modules:{
    brand:{title:"Branding Web3",body:`
      <p>ใน Web3 <b>แบรนด์</b> ของคุณคือสิ่งที่ทำให้คนเชื่อใจท่ามกลางโปรเจกต์เป็นทะเล ก่อนเทคนิค มี <b>เรื่องราว</b></p>
      <ul><li><b>พันธกิจชัดเจน</b> — คุณแก้ปัญหาอะไร เพื่อใคร</li><li><b>อัตลักษณ์ภาพ</b> — โลโก้ สี โทน (เหมือนจักรวาลพระจันทร์ของ MOON-RZ)</li><li><b>ความสม่ำเสมอ</b> — สารเดียวกันทุกที่ (เว็บ, X, Discord)</li></ul>
      <div class="callout">💡 คนไม่ได้ซื้อโทเคน แต่เข้าร่วม <b>วิสัยทัศน์</b> เล่าเรื่องที่พวกเขาอยากเป็นส่วนหนึ่ง</div>`},
    community:{title:"สร้างชุมชน",body:`
      <p>ในคริปโต <b>ชุมชนคือผลิตภัณฑ์</b> โปรเจกต์ไร้ชุมชนตายแม้เทคโนโลยีเยี่ยม</p>
      <ul><li><b>Discord / Telegram</b> — ศูนย์บัญชาการประจำวัน</li><li><b>X (Twitter)</b> — หน้าร้านและการหาคน</li><li><b>การมีส่วนร่วมจริง</b> — ตอบ ฟัง ให้รางวัลสมาชิกที่แอคทีฟ</li></ul>
      <div class="callout warn">⚠️ ระวัง vanity metric: ผู้ติดตาม 50,000 ที่ซื้อมา มีค่าน้อยกว่าแฟนจริง 500 คนที่มีส่วนร่วม เน้นคุณภาพ ไม่ใช่เสียง</div>`},
    marketing:{title:"การตลาดคริปโต",body:`
      <p>การตลาด Web3 ผสมของคลาสสิกกับกลไกเฉพาะของระบบนิเวศ</p>
      <ul><li><b>เนื้อหาให้ความรู้</b> — มอบคุณค่าก่อนขาย</li><li><b>พาร์ทเนอร์และ KOL</b> — อินฟลูเอนเซอร์คริปโต (ตรวจสอบ มีปลอมเยอะ)</li><li><b>Airdrop และเควสต์</b> — ให้รางวัลการกระทำเพื่อเริ่มต้นชุมชน (โมเดล Learn→Earn)</li></ul>
      <div class="callout">การตลาดคริปโตที่ดีที่สุดยังคงเป็นผลิตภัณฑ์ที่ใช้งานได้ + ผู้ใช้ที่บอกต่อเอง</div>`},
    dao:{title:"DAO",body:`
      <p><b>DAO</b> (องค์กรปกครองตนเองแบบกระจายศูนย์) คือองค์กรที่ปกครองโดยชุมชนผ่านบล็อกเชน แทนที่จะมีเจ้านาย</p>
      <ul><li><b>โทเคนกำกับดูแล</b> — ถือโทเคน = สิทธิ์โหวต</li><li><b>ข้อเสนอและการโหวต</b> — ชุมชนตัดสินทิศทางและคลัง</li><li><b>ความโปร่งใส</b> — การตัดสินและเงินทุนมองเห็นได้บนเชน</li></ul>
      <div class="callout">⚖️ ความท้าทายสำคัญ: หลีกเลี่ยงไม่ให้ผู้ถือรายใหญ่ ("วาฬ") คุมโหวตทั้งหมด การออกแบบธรรมาภิบาลสำคัญพอ ๆ กับเทคโนโลยี</div>`},
    tokenomics:{title:"Tokenomics",body:`
      <p><b>Tokenomics</b> คือเศรษฐกิจของโทเคน ตัวกำหนดว่ามันจะมีมูลค่าตามเวลาไหม</p>
      <ul><li><b>อุปทาน</b> — ทั้งหมด, หมุนเวียน, เงินเฟ้อ/เงินฝืด</li><li><b>การกระจาย</b> — ทีม ชุมชน นักลงทุน และ <b>vesting</b> (ปลดล็อกทีละน้อย)</li><li><b>Utility</b> — ทำไมต้องถือโทเคน? (gas, ธรรมาภิบาล, การเข้าถึง, รางวัล…)</li><li><b>อุปทานกับอุปสงค์</b> — โทเคนที่มีประโยชน์และหายากจะมีมูลค่า</li></ul>
      <div class="callout">🧮 โทเคน MOON-RZ ทำตามตรรกะนี้: ได้จากการกระทำ (Learn→Earn) และใช้เพื่อปลดล็อกเนื้อหา NFT และการแข่งขัน</div>`},
    launch:{title:"เปิดตัวโปรเจกต์ของคุณ",body:`
      <p>ประกอบชิ้นส่วนเพื่อเปลี่ยนจากไอเดียสู่การเปิดตัว:</p>
      <ul><li><b>1. วิสัยทัศน์และ whitepaper</b> — อะไร ทำไม อย่างไร</li><li><b>2. ชุมชน</b> — สร้างก่อนเปิดตัว</li><li><b>3. Tokenomics</b> — สมเหตุสมผลและโปร่งใส</li><li><b>4. ผลิตภัณฑ์ / MVP</b> — แสดงว่ามันใช้งานได้ (เหมือนแอปนี้!)</li><li><b>5. เปิดตัวและสภาพคล่อง</b> — แล้วพัฒนาต่อกับชุมชน</li></ul>
      <div class="callout">🏗️ คาถาของ Web3 Founder: "ชุมชนก่อน ไฮป์ทีหลัง" การเปิดตัวที่สำเร็จเตรียมล่วงหน้าหลายเดือน</div>`}
  }, quiz:[
    {q:"ในคริปโต คนซื้ออะไรจริง ๆ?",a:["โทเคนโดด ๆ","วิสัยทัศน์และชุมชน","โลโก้","gas"],correct:1},
    {q:"ทำไมต้องระวังผู้ติดตาม 50,000 ที่มาทันที?",a:["เป็นสัญญาณดีเสมอ","อาจเป็น vanity metric (การมีส่วนร่วมปลอม)","ลดราคาโทเคน","เพิ่ม gas"],correct:1},
    {q:"DAO คืออะไร?",a:["กระเป๋าฮาร์ดแวร์","องค์กรที่ปกครองโดยชุมชนบนเชน","NFT ชนิดหนึ่ง","exchange แบบรวมศูนย์"],correct:1},
    {q:"vesting ใน tokenomics มีไว้ทำอะไร?",a:["เผาโทเคน","ปลดล็อกโทเคนทีละน้อย (ทีม นักลงทุน)","จ่าย gas","สร้าง NFT"],correct:0},
    {q:"ความเสี่ยงใดคุกคามธรรมาภิบาลของ DAO?",a:["โปร่งใสเกินไป","การกระจุกของโหวตในวาฬไม่กี่ราย","โหวตฟรี","สมาชิกมากเกินไป"],correct:1},
    {q:"ลำดับความสำคัญที่ถูกก่อนเปิดตัว?",a:["ไฮป์สูงสุดทันที","สร้างชุมชนและผลิตภัณฑ์ที่ใช้งานได้","ซื้อผู้ติดตาม","เปิดตัวโดยไม่มี whitepaper"],correct:1}
  ]},
  6:{ modules:{
    candles:{title:"อ่านกราฟ: แท่งเทียน",body:`
      <p>กราฟ <b>แท่งเทียนญี่ปุ่น</b> คือภาษาสากลของเทรดเดอร์ แต่ละแท่งสรุปการต่อสู้ของผู้ซื้อ/ผู้ขายในช่วงเวลาหนึ่ง</p>
      <h4>หนึ่งแท่ง = 4 ราคา</h4>
      <ul><li><b>เปิด</b> และ <b>ปิด</b> (ตัวแท่ง)</li><li><b>สูงสุด</b> และ <b>ต่ำสุด</b> (ไส้เทียน)</li><li>ตัว <b>เขียว</b> = ปิดเหนือเปิด (ขึ้น) <b>แดง</b> = ลง</li></ul>
      <p><b>กรอบเวลา (timeframe)</b> เปลี่ยนทุกอย่าง: แท่ง 1 นาที ≠ แท่ง 1 วัน</p>
      <div class="callout">💡 เปิด <b>เครื่องจำลอง</b> ควบคู่ไป จะเห็นราคาจริงขยับ การเทรดเรียนรู้ด้วยตาที่จับตลาด ไม่ใช่ในตำรา</div>`},
    sr:{title:"แนวรับและแนวต้าน",body:`
      <p>นี่คือระดับราคาที่สำคัญที่สุดที่ต้องสังเกต</p>
      <h4>แนวรับ</h4>
      <p><b>พื้น</b> ที่ผู้ซื้อกลับมาคุมและดันราคาเด้ง ราคา "ลงต่ำกว่านี้ยาก"</p>
      <h4>แนวต้าน</h4>
      <p><b>เพดาน</b> ที่ผู้ขายกลับมาคุม ราคา "ขึ้นเหนือกว่านี้ยาก"</p>
      <ul><li>ยิ่งระดับถูกทดสอบบ่อย ยิ่งมีนัยสำคัญ</li><li>แนวรับที่ถูกทะลุมักกลายเป็นแนวต้าน (และในทางกลับกัน)</li></ul>
      <div class="callout warn">⚠️ ระดับเหล่านี้คือ <b>โซน</b> ไม่ใช่เส้นเป๊ะระดับพิกเซล อย่าละเอียดเกินไป</div>`},
    trend:{title:"เทรนด์",body:`
      <p>"<b>The trend is your friend</b>": คำถามแรกของเทรดเดอร์คือ "ตลาดไปทางไหน?" เสมอ</p>
      <ul><li><b>เทรนด์ขาขึ้น</b> — ยอดและก้นสูงขึ้นเรื่อย ๆ</li><li><b>เทรนด์ขาลง</b> — ยอดและก้นต่ำลงเรื่อย ๆ</li><li><b>ไซด์เวย์</b> — ราคาแกว่งแนวนอน ไร้ทิศทาง</li></ul>
      <div class="callout">📐 <b>เส้นเทรนด์</b> เชื่อมก้น (ขาขึ้น) หรือยอด (ขาลง) การทะลุของมันอาจส่งสัญญาณเปลี่ยนทิศ</div>`},
    volume:{title:"ปริมาณ (Volume)",body:`
      <p><b>ปริมาณ</b> = จำนวนที่ซื้อขายในช่วงเวลา คือ <b>เชื้อเพลิง</b> เบื้องหลังการเคลื่อนราคา</p>
      <ul><li>ขึ้นด้วย <b>ปริมาณสูง</b> = การเคลื่อนน่าเชื่อ มีแรงหนุน</li><li>ขึ้นด้วย <b>ปริมาณต่ำ</b> = น่าสงสัย อาจหมดแรง</li><li>ปริมาณพุ่งมักมาพร้อมการกลับตัวหรือการทะลุ</li></ul>
      <div class="callout">🔎 กฎง่าย ๆ: ปริมาณ <b>ยืนยัน</b> ราคา การทะลุแนวต้านที่ไม่มีปริมาณน่าสงสัย</div>`},
    liquidity:{title:"สภาพคล่อง",body:`
      <p><b>สภาพคล่อง</b> คือความง่ายในการซื้อหรือขายโดยไม่ขยับราคา มีคำสั่งทั้งสองฝั่งเยอะ = ตลาดสภาพคล่องสูง</p>
      <ul><li>สินทรัพย์ <b>สภาพคล่องสูง</b> (BTC, ETH) → <b>slippage</b> ต่ำ ดำเนินใกล้ราคาที่แสดง</li><li>สินทรัพย์ <b>สภาพคล่องต่ำ</b> (โทเคนเล็ก) → คำสั่งใหญ่เดียวขยับราคา เป็นแดนปั่น</li></ul>
      <div class="callout warn">⚠️ กับดักหลายอย่าง (pump &amp; dump) ทำได้เฉพาะสินทรัพย์สภาพคล่องต่ำ เลือกตลาดลึกเมื่อเริ่มต้น</div>`},
    analyse:{title:"ลงมือปฏิบัติ",body:`
      <p>รวมทุกอย่างเพื่อ <b>วิเคราะห์ตลาด</b> อย่างมีโครงสร้างครั้งแรก:</p>
      <ul><li><b>1. เทรนด์</b> — ขึ้น ลง หรือไซด์เวย์?</li><li><b>2. ระดับ</b> — แนวรับแนวต้านสำคัญอยู่ไหน?</li><li><b>3. ปริมาณ</b> — ยืนยันการเคลื่อนปัจจุบันไหม?</li><li><b>4. สภาพคล่อง</b> — สินทรัพย์ลึกพอไหม?</li><li><b>5. แผน</b> — เข้าตรงไหน ตัดตรงไหนถ้าผิด (นั่นคือ Academy 7)</li></ul>
      <div class="callout">🏋️ แบบฝึกของ Market Analyst: เปิด <b>เครื่องจำลอง</b> เลือก BTC หรือ ETH แล้วทำ 5 ขั้นนี้ออกเสียงก่อนกด "ซื้อ" ทำซ้ำกับ ETH, BNB, SOL, XRP</div>`}
  }, quiz:[
    {q:"ตัวแท่งเทียนแทนอะไร?",a:["สูงสุดและต่ำสุด","ราคาเปิดและปิด","ปริมาณ","ค่าธรรมเนียม"],correct:1},
    {q:"แนวรับคืออะไร?",a:["เพดานราคา","พื้นที่ผู้ซื้อดันราคาเด้ง","โทเคนชนิดหนึ่ง","แท่งแดง"],correct:1},
    {q:"เทรนด์ขาขึ้นคือ…",a:["ยอดและก้นสูงขึ้นเรื่อย ๆ","ราคานิ่ง","ก้นต่ำลงเรื่อย ๆ","ปริมาณต่ำเสมอ"],correct:0},
    {q:"ปริมาณมีไว้ทำอะไร?",a:["คำนวณค่าธรรมเนียม","ยืนยันความน่าเชื่อของการเคลื่อนราคา","สร้าง NFT","รักษาความปลอดภัยกระเป๋า"],correct:1},
    {q:"สินทรัพย์สภาพคล่องต่ำอันตรายเพราะ…",a:["มีปริมาณมากไป","คำสั่งใหญ่ขยับราคาได้ (การปั่น)","แพงเกินไป","ไม่มีกราฟ"],correct:1},
    {q:"คำถามแรกก่อนเทรด?",a:["โลโก้โปรเจกต์คืออะไร?","เทรนด์ไปทางไหน?","ใครเป็น CEO?","ผู้ติดตามกี่คน?"],correct:1}
  ]},
  7:{ modules:{
    mtf:{title:"การวิเคราะห์หลายกรอบเวลา",body:`
      <p>เทรดเดอร์ที่ดีดู <b>หลายกรอบเวลา</b> ก่อนลงมือ ดูแค่กรอบเดียวเหมือนมองผ่านรูกุญแจ</p>
      <h4>วิธี top-down</h4>
      <ul><li><b>TF ใหญ่</b> (วัน/สัปดาห์) → เทรนด์พื้นฐาน ฉากหลัง</li><li><b>TF กลาง</b> (4ชม./1ชม.) → โซนน่าสนใจ</li><li><b>TF เล็ก</b> (15น./5น.) → จุดเข้าที่แม่นยำ</li></ul>
      <p>กฎทอง: <b>เทรดตามเทรนด์ใหญ่</b> และปรับจุดเข้าในกรอบเล็ก</p>
      <div class="callout warn">⚠️ ข้อผิดพลาดมือใหม่คลาสสิก: รับสัญญาณ 5 นาทีที่สวนเทรนด์รายวัน นั่นคือว่ายทวนน้ำ</div>`},
    risk:{title:"การจัดการความเสี่ยง",body:`
      <p>ความจริงที่ไม่มีใครบอกมือใหม่: <b>การเทรดคือจัดการความเสี่ยงก่อน ไม่ใช่ทำนายราคา</b> เอาตัวรอดก่อนชนะ</p>
      <h4>กฎ 1%</h4>
      <p>อย่าเสี่ยง <b>เกิน 1 ถึง 2%</b> ของทุนต่อการเทรดเดียว ที่ความเสี่ยง 1% ต้องเทรดขาดทุนติดกัน 100 ครั้งถึงจะหมดตัว — แทบเป็นไปไม่ได้</p>
      <ul><li>ขาดทุน 50% ต้องการกำไร <b>100%</b> เพื่อกลับมาเท่าทุน การปกป้องทุนคือคณิตศาสตร์</li><li><b>Stop-loss</b> ไม่ใช่ทางเลือก มันคือเข็มขัดนิรภัย</li></ul>
      <div class="callout">🧮 ฝึกในเครื่องจำลอง: ตัดสินใจก่อนซื้อว่ายอมเสียได้เท่าไร แล้วยึดมั่น</div>`},
    sizing:{title:"ขนาดสถานะ (Position Sizing)",body:`
      <p><b>Position sizing</b> ตอบว่า "ซื้อเท่าไร?" มันมาจากความเสี่ยงของคุณ ไม่ใช่ความตื่นเต้น</p>
      <h4>สูตร</h4>
      <p><code>ขนาด = (ทุน × % ความเสี่ยง) ÷ ระยะถึง stop-loss</code></p>
      <p>ตัวอย่าง: ทุน 10,000 $, ความเสี่ยง 1% (100 $), stop ที่ -5% → ลงได้ <b>2,000 $</b> ในเทรดนี้ (เพราะ 5% ของ 2000 = 100)</p>
      <div class="callout warn">⚠️ ไม่ใช่ "ชอบเหรียญนี้เลยใส่หมด" ขนาดสถานะคือ <b>การคำนวณ</b> ที่กำหนดด้วยจุดตัดถ้าผิด</div>`},
    rr:{title:"Stop-loss, Take-profit และ R:R",body:`
      <p>ทุกเทรดต้องมีแผนออก <b>ก่อน</b> เข้า</p>
      <ul><li><b>Stop-loss (SL)</b> — ราคาที่ยอมรับว่าผิดและตัด</li><li><b>Take-profit (TP)</b> — ราคาที่เก็บกำไร</li><li><b>อัตรา Risk/Reward (R:R)</b> — เล็งเท่าไรเทียบกับเสี่ยงเท่าไร</li></ul>
      <p>R:R เท่ากับ <b>1:3</b> หมายถึงเสี่ยง 100 $ เพื่อเล็ง 300 $ ด้วยอัตรานี้คุณผิดบ่อยกว่าถูกได้และยัง <b>กำไร</b></p>
      <div class="callout">📐 เล็งอย่างน้อย 1:2 ต่ำกว่านั้น ขาดทุนติดกันนิดเดียวก็จม</div>`},
    journal:{title:"บันทึกและจิตวิทยา",body:`
      <p>ศัตรูร้ายที่สุดในการเทรดไม่ใช่ตลาด แต่คือ <b>ตัวคุณ</b> (กลัว โลภ แก้แค้น)</p>
      <h4>บันทึกการเทรด</h4>
      <p>จดทุกเทรด: จุดเข้า ออก เหตุผล อารมณ์ที่รู้สึก ผลลัพธ์ นั่นคือวิธีพบข้อผิดพลาดที่ทำซ้ำและพัฒนาจริง</p>
      <ul><li><b>FOMO</b> — ซื้อเพราะกลัวพลาด = เข้าช้าไป</li><li><b>Revenge trading</b> — อยาก "เอาคืน" หลังขาดทุน = หายนะ</li><li><b>วินัย > แรงจูงใจ</b> — แผนที่ทำตามอย่างเย็นชาชนะสัญชาตญาณ</li></ul>
      <div class="callout">🧠 คาถา Professional Trader: "Plan the trade, trade the plan" ตัดสินใจอย่างเย็นชา ลงมือไร้อารมณ์</div>`},
    strategy:{title:"สร้างกลยุทธ์ของคุณ",body:`
      <p>กลยุทธ์คือชุด <b>กฎที่เขียนไว้</b> ที่คุณทำตามโดยไม่ด้นสด มี 3 สไตล์ใหญ่:</p>
      <ul><li><b>Scalping</b> — เทรดสั้นมากจำนวนมาก (นาที) เข้มข้น ต้องการมาก</li><li><b>Swing</b> — ถือสถานะไม่กี่วัน/สัปดาห์ตามเทรนด์</li><li><b>การลงทุน (DCA)</b> — ซื้อสม่ำเสมอระยะยาว ไม่จับจังหวะ</li></ul>
      <h4>กลยุทธ์ต้องระบุ</h4>
      <p>ตลาดไหน · TF ไหน · เงื่อนไขเข้า · stop-loss · take-profit · ขนาดสถานะ · กฎจัดการอารมณ์</p>
      <div class="callout">🏋️ แบบฝึก Professional Trader: เขียนกลยุทธ์ 1 อัน (สไตล์ swing) แล้วทดสอบ 10 เทรดในเครื่องจำลองตามทุกกฎ จดทุกอย่างในบันทึก</div>`}
