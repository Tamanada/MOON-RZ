<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>MOON-RZ Academy — Learn · Practice · Earn</title>
<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="theme-color" content="#0a0a14" />
<link rel="icon" type="image/png" href="./favicon.png" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MOON-RZ" />
<style>
  :root{
    --bg:#0a0a14;
    --bg-2:#11112099;
    --panel:#15152a;
    --panel-2:#1c1c38;
    --line:#2a2a4a;
    --txt:#e8e8f5;
    --muted:#9494b8;
    --moon:#a78bfa;
    --moon-2:#7c5cf0;
    --gold:#ffcc66;
    --green:#34d399;
    --red:#f87171;
    --blue:#60a5fa;
    --radius:16px;
    --shadow:0 10px 40px -10px #000a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow-x:hidden;max-width:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #2a1a5533, transparent),
      radial-gradient(900px 500px at -10% 20%, #15324a33, transparent),
      var(--bg);
    color:var(--txt);min-height:100vh;
  }
  a{color:var(--moon);text-decoration:none}

  .app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
  @media(max-width:880px){.app{grid-template-columns:1fr}.sidebar{display:none}}

  .sidebar{background:linear-gradient(180deg,#12122500,#0d0d1a);border-right:1px solid var(--line);padding:22px 14px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .logo{display:flex;align-items:center;gap:10px;padding:0 8px 18px;font-weight:800;font-size:20px;letter-spacing:.5px}
  .logo .moonball{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #fff, var(--moon) 55%, var(--moon-2));box-shadow:0 0 18px var(--moon-2);flex:none;position:relative}
  .logo .moonball::after{content:"";position:absolute;width:8px;height:8px;border-radius:50%;background:#0006;top:8px;left:18px;box-shadow:6px 9px 0 -2px #0005,-2px 12px 0 -3px #0004}
  .logo b{background:linear-gradient(90deg,var(--moon),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .nav{display:flex;flex-direction:column;gap:4px;margin-top:8px}
  .nav .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:14px 10px 6px}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;color:var(--txt);padding:10px 12px;border-radius:11px;cursor:pointer;font-size:14px;transition:.15s;position:relative}
  .nav button:hover{background:#ffffff0a}
  .nav button.active{background:linear-gradient(90deg,var(--moon-2)40,#ffffff08);box-shadow:inset 0 0 0 1px var(--moon-2)55}
  .nav button .ico{width:22px;text-align:center;font-size:16px}
  .nav button.locked{opacity:.4;cursor:not-allowed}
  .nav button .lk{margin-left:auto;font-size:12px}

  .main{padding:0 0 60px;min-width:0}
  .topbar{display:flex;align-items:center;gap:18px;padding:16px 26px;border-bottom:1px solid var(--line);background:var(--bg-2);backdrop-filter:blur(10px);position:sticky;top:0;z-index:5}
  .topbar .spacer{flex:1}
  .stat{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600}
  .stat .coin{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff6cc,var(--gold) 60%,#cc9933);box-shadow:0 0 10px #ffcc6655;display:inline-block}
  .stat.token b{color:var(--gold)}
  .lvlwrap{display:flex;flex-direction:column;gap:5px;min-width:200px}
  .lvlwrap .top{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
  .lvlwrap .top b{color:var(--txt)}
  .bar{height:8px;background:#ffffff12;border-radius:999px;overflow:hidden}
  .bar>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--moon),var(--gold));transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .rankchip{font-size:12px;padding:4px 11px;border-radius:999px;background:linear-gradient(90deg,var(--moon-2)55,#0000);border:1px solid var(--moon-2)55;font-weight:700}
  .avatarchip{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:21px;cursor:pointer;background:var(--panel-2);border:2px solid var(--accent,var(--moon));box-shadow:0 0 14px -2px var(--accent,var(--moon));transition:.15s;flex:none}
  .langsel{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:999px;padding:7px 11px;font-size:13px;font-weight:600;cursor:pointer;max-width:140px}
  .installbtn{background:linear-gradient(90deg,var(--moon),var(--moon-2));border:0;color:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 6px 16px -6px var(--moon-2)}
  .installbtn:hover{filter:brightness(1.08)}
  .langsel:focus{outline:none;border-color:var(--moon)}
  .langsel option{background:var(--panel)}
  html[dir=rtl] .sidebar{border-right:0;border-left:1px solid var(--line)}
  html[dir=rtl] .callout{border-left:0;border-right:3px solid var(--moon)}
  .avatarchip:hover{transform:scale(1.06)}

  /* profile editor */
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .field input[type=text]{width:100%;background:#0a0a16;border:1px solid var(--line);color:var(--txt);padding:11px 14px;border-radius:11px;font-size:15px;font-weight:600}
  .field input[type=text]:focus{outline:none;border-color:var(--moon)}
  .picker{display:flex;flex-wrap:wrap;gap:9px}
  .picker .av{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;font-size:23px;cursor:pointer;background:var(--panel-2);border:2px solid var(--line);transition:.13s}
  .picker .av:hover{border-color:var(--moon-2)}
  .picker .av.sel{border-color:var(--moon);box-shadow:0 0 12px -2px var(--moon)}
  .picker .col{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.13s}
  .picker .col.sel{border-color:#fff}

  /* referral / partners */
  .reflink{display:flex;gap:8px;align-items:stretch;margin:14px 0}
  .reflink input{flex:1;background:#0a0a16;border:1px solid var(--line);color:var(--moon);padding:12px 14px;border-radius:11px;font-size:13px;font-weight:600;font-family:monospace}
  .stepnum{width:26px;height:26px;border-radius:50%;background:var(--moon-2);color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px;flex:none}
  .step{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
  .step p{margin:0;padding-top:2px}
  .cexcard{display:flex;align-items:center;gap:16px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;transition:.16s}
  .cexcard:hover{border-color:var(--moon-2)80;transform:translateY(-2px)}
  .cexlogo{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:20px;font-weight:800;color:#0a0a14;flex:none}
  .cexcard .info{flex:1;min-width:0}
  .cexcard .info b{font-size:15px}
  .cexcard .info p{font-size:12.5px;color:var(--muted);margin-top:2px}
  .badge-soon{font-size:10px;background:#ffffff10;border:1px solid var(--line);color:var(--muted);padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px}

  .content{padding:30px 26px;max-width:1080px;margin:0 auto}
  .hero{background:linear-gradient(120deg,#1d1542,#161630 60%,#0e1f2e);border:1px solid var(--line);border-radius:var(--radius);padding:30px 32px;margin-bottom:26px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,var(--moon) 55%,var(--moon-2));opacity:.18;filter:blur(4px)}
  .hero h1{font-size:28px;margin-bottom:8px}
  .hero h1 .acc{background:linear-gradient(90deg,var(--moon),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:var(--muted);max-width:560px;line-height:1.55}
  .pill{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--gold);background:#ffcc6618;border:1px solid #ffcc6633;padding:5px 12px;border-radius:999px;margin-bottom:14px}

  .grid{display:grid;gap:18px}
  .grid.cols-2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
  .grid.cols-3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;transition:.18s}
  .card.hover:hover{transform:translateY(-3px);border-color:var(--moon-2)80;box-shadow:0 14px 34px -16px var(--moon-2)}
  .card h3{font-size:16px;margin-bottom:6px;display:flex;align-items:center;gap:9px}
  .card .ico{font-size:20px}
  .card p{color:var(--muted);font-size:13.5px;line-height:1.5}
  .card .meta{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .tag{font-size:11.5px;color:var(--moon);background:#a78bfa14;border:1px solid #a78bfa2e;padding:4px 9px;border-radius:8px;font-weight:600}
  .tag.gold{color:var(--gold);background:#ffcc6614;border-color:#ffcc662e}
  .tag.done{color:var(--green);background:#34d39914;border-color:#34d3992e}

  .section-title{display:flex;align-items:center;gap:10px;font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:30px 0 14px}
  .section-title::after{content:"";flex:1;height:1px;background:var(--line)}

  .btn{display:inline-flex;align-items:center;gap:8px;border:0;cursor:pointer;font-weight:700;font-size:14px;padding:11px 20px;border-radius:11px;color:#0a0a14;background:linear-gradient(90deg,var(--gold),#ffb84d);transition:.15s;box-shadow:0 6px 18px -6px var(--gold)}
  .btn:hover{filter:brightness(1.07);transform:translateY(-1px)}
  .btn.ghost{background:transparent;color:var(--txt);border:1px solid var(--line);box-shadow:none}
  .btn.ghost:hover{border-color:var(--moon-2);background:#ffffff06}
  .btn.moon{background:linear-gradient(90deg,var(--moon),var(--moon-2));color:#fff;box-shadow:0 6px 18px -6px var(--moon-2)}
  .btn.sm{padding:7px 14px;font-size:13px}
  .btn.red{background:linear-gradient(90deg,#f87171,#dc2626);color:#fff;box-shadow:0 6px 18px -6px #dc2626}
  .btn.green{background:linear-gradient(90deg,#34d399,#059669);color:#06281d;box-shadow:0 6px 18px -6px #059669}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;filter:none}

  .lesson{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:0;overflow:hidden}
  .lesson .lhead{padding:22px 26px;border-bottom:1px solid var(--line);background:linear-gradient(120deg,#1a1438,#15152a)}
  .lesson .lbody{padding:26px;line-height:1.7;color:#d6d6ea}
  .lesson .lbody h4{color:var(--moon);margin:20px 0 8px;font-size:16px}
  .lesson .lbody p{margin-bottom:12px}
  .lesson .lbody ul{margin:6px 0 14px 20px}
  .lesson .lbody li{margin-bottom:6px}
  .lesson .lbody code{background:#0008;border:1px solid var(--line);padding:2px 7px;border-radius:6px;color:var(--gold);font-size:13px}
  .callout{background:#a78bfa12;border:1px solid #a78bfa33;border-left:3px solid var(--moon);padding:14px 16px;border-radius:10px;margin:16px 0;color:#e3def8}
  .callout.warn{background:#f8717112;border-color:#f8717133;border-left-color:var(--red)}
  .lfoot{padding:18px 26px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}

  .quiz .q{margin-bottom:22px}
  .quiz .q h4{font-size:16px;margin-bottom:12px}
  .opt{display:block;width:100%;text-align:left;background:var(--panel-2);border:1px solid var(--line);color:var(--txt);padding:13px 16px;border-radius:11px;margin-bottom:9px;cursor:pointer;transition:.13s;font-size:14px}
  .opt:hover{border-color:var(--moon-2)}
  .opt.sel{border-color:var(--moon);background:#a78bfa1a}
  .opt.correct{border-color:var(--green);background:#34d39918}
  .opt.wrong{border-color:var(--red);background:#f8717118}
  .opt .mk{float:right;font-weight:700}

  /* simulator */
  .ticktable{width:100%;border-collapse:collapse;font-size:14px}
  .ticktable th{text-align:left;color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1px solid var(--line)}
  .ticktable td{padding:12px;border-bottom:1px solid #ffffff08}
  .ticktable tr:hover td{background:#ffffff05}
  .coinname{display:flex;align-items:center;gap:10px;font-weight:700}
  .coindot{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:800;color:#0a0a14}
  .up{color:var(--green)}.down{color:var(--red)}
  .num{font-variant-numeric:tabular-nums}
  .simstat{background:linear-gradient(160deg,#161630,#11112a);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .simstat .k{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .simstat .v{font-size:24px;font-weight:800;margin-top:4px}
  .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#000a;backdrop-filter:blur(4px);z-index:55;padding:20px}
  .modal .box{background:linear-gradient(160deg,#1a1438,#13132a);border:1px solid var(--moon-2);border-radius:20px;padding:26px;width:380px;max-width:100%;box-shadow:var(--shadow)}
  .modal h3{font-size:18px;margin-bottom:4px}
  .modal input{width:100%;background:#0a0a16;border:1px solid var(--line);color:var(--txt);padding:12px 14px;border-radius:11px;font-size:18px;font-weight:700;margin:12px 0;text-align:right}
  .modal input:focus{outline:none;border-color:var(--moon)}
  .quickrow{display:flex;gap:8px;margin-bottom:14px}
  .quickrow button{flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);padding:7px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:700}
  .quickrow button:hover{border-color:var(--moon);color:var(--txt)}

  .toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:50}
  .toast{background:var(--panel-2);border:1px solid var(--moon-2)66;border-radius:12px;padding:13px 18px;min-width:240px;box-shadow:var(--shadow);animation:slideIn .35s cubic-bezier(.2,.9,.3,1);font-size:14px}
  .toast b{color:var(--gold)}
  @keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes pop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  .levelup{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#0008;backdrop-filter:blur(4px);z-index:60}
  .levelup .box{background:linear-gradient(160deg,#1d1542,#101024);border:1px solid var(--moon-2);border-radius:24px;padding:40px 50px;text-align:center;animation:pop .5s;box-shadow:0 0 60px -10px var(--moon-2)}
  .levelup .ring{width:90px;height:90px;border-radius:50%;margin:0 auto 18px;background:radial-gradient(circle at 35% 30%,#fff,var(--moon) 55%,var(--moon-2));box-shadow:0 0 40px var(--moon-2);animation:float 2s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .levelup h2{font-size:26px;margin-bottom:6px}
  .levelup .rank{color:var(--gold);font-weight:700;font-size:18px;margin-bottom:18px}

  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty .big{font-size:46px;margin-bottom:14px;opacity:.6}
  .progress-ring{display:flex;align-items:center;gap:14px}
  .mobtab{display:none}
  @media(max-width:880px){
    .mobtab{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--bg);-webkit-overflow-scrolling:touch}
    .mobtab button{white-space:nowrap;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:8px 14px;border-radius:999px;font-size:13px;cursor:pointer;flex:none}
    .mobtab button.active{border-color:var(--moon-2);color:var(--moon)}
    .topbar{padding:9px 14px;gap:8px;flex-wrap:wrap}
    .topbar .rankchip{display:none}
    .topbar .spacer{display:none}
    .avatarchip{width:36px;height:36px;font-size:19px}
    .lvlwrap{flex:1 1 110px;min-width:100px;order:0;gap:4px}
    .lvlwrap .top{font-size:11px}
    .stat{padding:6px 10px;font-size:12px}
    .langsel{max-width:76px;padding:6px 8px;font-size:12px}
    .installbtn{padding:7px 10px}
    .installbtn span{display:none}
    .content{padding:18px 14px}
    .hero{padding:22px 18px}
    .hero h1{font-size:22px}
    .hero p{font-size:13.5px}
    .grid.cols-2,.grid.cols-3{grid-template-columns:1fr}
    .ticktable{font-size:12.5px}
    .ticktable th,.ticktable td{padding:9px 7px}
    .btn.sm{padding:6px 10px;font-size:12px}
  }
  @media(max-width:380px){
    .topbar .stat.token .coin{display:none}
    .hero h1{font-size:20px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><span class="moonball"></span> <span>MOON-RZ <b>Academy</b></span></div>
    <nav class="nav" id="nav">
      <span class="label" data-t="parcours">Parcours</span>
      <span class="label" data-t="monespace">Mon espace</span>
      <button data-view="simulator"><span class="ico">📈</span> <span data-t="sim">Simulateur Trading</span></button>
      <button data-view="missions"><span class="ico">🎯</span> <span data-t="missions">Missions du jour</span></button>
      <button data-view="referral"><span class="ico">🤝</span> <span data-t="referral">Parrainage</span></button>
      <button data-view="partners"><span class="ico">🏦</span> <span data-t="partners">Exchanges (CEX)</span></button>
      <button data-view="profile"><span class="ico">🧑‍🚀</span> <span data-t="profile">Profil & Rang</span></button>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="avatarchip" id="avatarChip" title="Mon profil">🧑‍🚀</div>
      <div class="rankchip" id="rankChip">Crypto Explorer</div>
      <div class="lvlwrap">
        <div class="top"><span>Niveau <b id="lvlNum">1</b></span><span><b id="xpNow">0</b> / <span id="xpNext">100</span> XP</span></div>
        <div class="bar"><span id="xpBar"></span></div>
      </div>
      <div class="spacer"></div>
      <div class="stat token"><span class="coin"></span> <b id="tokenBal">0</b> MOON-RZ</div>
      <div class="stat">🔥 <b id="streak">0</b>j</div>
      <select id="langSel" class="langsel" title="Langue / Language"></select>
      <button id="installBtn" class="installbtn" style="display:none">📲 <span data-t="install">Installer</span></button>
    </header>

    <div class="mobtab" id="mobtab"></div>
    <main class="content" id="content"></main>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>
<div class="levelup" id="levelup">
  <div class="box">
    <div class="ring"></div>
    <h2>LEVEL UP !</h2>
    <div class="rank" id="luRank"></div>
    <div style="color:var(--muted);margin-bottom:18px">Tu passes niveau <b id="luLvl" style="color:#fff"></b></div>
    <button class="btn" onclick="document.getElementById('levelup').style.display='none'">Continuer 🚀</button>
  </div>
</div>

<!-- Trade modal -->
<div class="modal" id="tradeModal">
  <div class="box">
    <h3 id="tmTitle">Acheter</h3>
    <p style="color:var(--muted);font-size:13px" id="tmSub"></p>
    <input id="tmInput" type="number" min="0" step="any" placeholder="0.00" />
    <div class="quickrow" id="tmQuick"></div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px" id="tmInfo"></p>
    <div style="display:flex;gap:10px">
      <button class="btn ghost sm" style="flex:1" onclick="closeTrade()">Annuler</button>
      <button class="btn sm" style="flex:1" id="tmConfirm">Confirmer</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   MOON-RZ ACADEMY — v0.2
   Learn · Practice · Earn  +  Trading Simulator (prix live)

      <p><b>Ethereum (ETH)</b> ne sert pas qu'à envoyer de l'argent : c'est une plateforme qui exécute des <b>smart contracts</b>.</p>
      <p>On y bâtit des applications décentralisées (<code>dApps</code>) : DeFi, NFT, DAO, jeux Web3.</p>
      <ul><li>Monnaie native : l'<b>Ether (ETH)</b>.</li><li>Les frais s'appellent le <b>gas</b>.</li><li>Depuis 2022 : <b>preuve d'enjeu</b> (Proof of Stake), plus écolo.</li></ul>`},
    {id:"bnb",icon:"🟡",title:"BNB Chain — rapide et pas chère",xp:25,coins:12,body:`
      <p><b>BNB Chain</b> est compatible Ethereum, avec des <b>frais très bas</b> et des transactions rapides.</p>
      <ul><li>Monnaie native : <b>BNB</b>.</li><li>Compatible <b>EVM</b> : mêmes wallets et outils qu'Ethereum.</li><li>Très utilisée par les débutants.</li></ul>
      <div class="callout warn">⚠️ Frais bas = aussi beaucoup d'arnaques et de faux tokens. (Academy 2)</div>`},
    {id:"sc",icon:"📜",title:"Smart Contracts",xp:35,coins:18,body:`
      <p>Un <b>smart contract</b> est un programme sur la blockchain qui s'exécute seul quand ses conditions sont remplies. Pas d'intermédiaire.</p>
      <h4>Exemple</h4><p>« <i>Si je reçois 1 ETH, j'envoie ce NFT à l'acheteur.</i> » Le code fait la loi : <code>code is law</code>.</p>
      <div class="callout">Automatique et infalsifiable, mais si le code a un bug il n'y a pas de SAV. D'où les <b>audits</b>.</div>`},
    {id:"wallet",icon:"👛",title:"Les Wallets (portefeuilles)",xp:35,coins:20,body:`
      <p>Un <b>wallet</b> ne "contient" pas tes cryptos (elles sont sur la blockchain). Il contient tes <b>clés</b>.</p>
      <ul><li><b>Adresse publique</b> — comme un IBAN, pour recevoir.</li><li><b>Clé privée</b> — le mot de passe ultime, jamais partagé.</li><li><b>Seed phrase</b> (12/24 mots) — la sauvegarde du wallet.</li></ul>
      <div class="callout warn">🔒 « Not your keys, not your coins. » Note ta seed phrase sur papier, jamais en photo ni dans le cloud.</div>`}

  2:{ modules:[
    {id:"scam",icon:"🎭",title:"Les arnaques crypto : panorama",xp:30,coins:15,body:`
      <p>La crypto est sans intermédiaire : <b>aucune banque ne peut annuler</b> une transaction. C'est la liberté… mais aussi le terrain de jeu des arnaqueurs. Ta meilleure protection, c'est <b>toi</b>.</p>
      <h4>Les grandes familles</h4>
      <ul><li><b>Phishing</b> — faux sites/messages qui volent tes accès.</li><li><b>Rug pull</b> — l'équipe d'un projet disparaît avec les fonds.</li><li><b>Wallet drainer</b> — une signature piégée qui vide ton wallet.</li><li><b>Faux airdrops / faux tokens</b> — appâts pour te faire signer.</li></ul>
      <div class="callout warn">🚩 Règle n°1 : si c'est trop beau pour être vrai (×10 garantis, "double ton ETH"), c'est une arnaque. Toujours.</div>`},
    {id:"phish",icon:"🎣",title:"Le Phishing",xp:30,coins:15,body:`
      <p>Le <b>phishing</b> imite un site/service que tu connais pour voler ta seed phrase ou te faire signer une transaction.</p>
      <h4>Comment le repérer</h4>
      <ul><li>Vérifie <b>l'URL caractère par caractère</b> : <code>binance.com</code> ≠ <code>binqnce.com</code>.</li><li>Méfie-toi des <b>pubs Google</b> en haut des résultats — souvent fausses.</li><li><b>Aucun</b> support légitime ne demande ta seed phrase.</li><li>Mets les vrais sites en <b>favoris</b> et passe toujours par là.</li></ul>
      <div class="callout warn">⚠️ Un site qui te demande tes 12/24 mots = arnaque à 100%. Aucune exception.</div>`},
    {id:"rug",icon:"🫥",title:"Les Rug Pulls",xp:30,coins:16,body:`
      <p>Un <b>rug pull</b> ("tirer le tapis") : une équipe crée un token, attire des acheteurs, puis <b>retire toute la liquidité</b> et disparaît. Le prix s'effondre à zéro.</p>
      <h4>Signaux d'alerte</h4>
      <ul><li>Équipe <b>anonyme</b> sans historique.</li><li><b>Liquidité non verrouillée</b> (pas de lock).</li><li>Quelques wallets détiennent <b>la majorité</b> des tokens.</li><li>Hype énorme, promesses de gains, zéro produit réel.</li></ul>
      <div class="callout">🔎 Outils : un block explorer (Etherscan/BscScan) + des scanners de contrat pour voir la répartition des holders.</div>`},
    {id:"drain",icon:"🩸",title:"Wallet Drainers & approvals",xp:35,coins:18,body:`
      <p>Tu n'as pas besoin de donner ta clé privée pour te faire vider : il suffit que tu <b>signes une autorisation (approval)</b> piégée.</p>
      <h4>Le piège classique</h4>
      <p>Un faux "mint" ou "claim" te fait signer un <code>approve</code> qui donne au pirate le droit de dépenser tes tokens. Plus tard, il vide tout.</p>
      <ul><li>Lis <b>ce que tu signes</b> : un message "set approval for all" est dangereux.</li><li>Révoque les autorisations inutiles (ex. <code>revoke.cash</code>).</li><li>Utilise un <b>wallet "burner"</b> pour les mints risqués.</li></ul>
      <div class="callout warn">🖊️ Une signature peut coûter aussi cher qu'une seed phrase divulguée. Ralentis avant de cliquer "Confirm".</div>`},
    {id:"fake",icon:"🪤",title:"Faux airdrops & faux tokens",xp:30,coins:16,body:`
      <p>Tu reçois "gratuitement" un token bizarre dans ton wallet. C'est un <b>appât</b>.</p>
      <ul><li>Ne <b>jamais</b> interagir avec un token inconnu reçu sans raison.</li><li>Les "airdrops" qui demandent de <b>connecter le wallet et signer</b> sur un site louche = drainer.</li><li>Vérifie l'adresse officielle du token sur le site/Twitter <b>réels</b> du projet.</li></ul>
      <div class="callout">🎁 Un vrai airdrop ne te demande jamais d'envoyer des fonds "pour débloquer" ta récompense.</div>`},
    {id:"audit",icon:"✅",title:"Ta checklist de sécurité",xp:40,coins:25,body:`
      <p>Avant de toucher à un projet, fais passer cette <b>checklist d'audit rapide</b> :</p>
      <ul><li>✅ URL vérifiée + en favori</li><li>✅ Équipe identifiable / réputation</li><li>✅ Contrat audité, liquidité verrouillée</li><li>✅ Répartition des holders saine</li><li>✅ Je comprends ce que je signe</li><li>✅ Wallet burner pour les actions risquées</li><li>✅ Seed phrase hors-ligne, jamais saisie en ligne</li></ul>
      <div class="callout">🛡️ Mantra du Crypto Guardian : <b>« Ralentis, vérifie, puis signe. »</b> La précipitation est l'amie des voleurs.</div>`}

  3:{ modules:[
    {id:"dex",icon:"🔁",title:"DEX vs CEX",xp:30,coins:15,body:`
      <p>Il existe deux façons d'échanger des cryptos :</p>
      <h4>CEX — exchange centralisé</h4>
      <p>Type Binance, Coinbase. Une société garde tes fonds pour toi. Pratique, mais <b>« not your keys, not your coins »</b> : tu dépends d'elle.</p>
      <h4>DEX — exchange décentralisé</h4>
      <p>Type Uniswap, PancakeSwap. Tu échanges <b>directement depuis ton wallet</b>, sans intermédiaire. C'est un smart contract qui gère le swap.</p>
      <ul><li>CEX = simple, rapide, mais centralisé et KYC.</li><li>DEX = autonome, ouvert 24/7, mais tu es seul responsable.</li></ul>
      <div class="callout">💡 La DeFi (finance décentralisée), c'est tout l'univers des services financiers qui tournent sur des smart contracts, sans banque.</div>`},
    {id:"lp",icon:"💧",title:"Liquidity Pools & AMM",xp:35,coins:18,body:`
      <p>Sur un DEX, il n'y a pas de carnet d'ordres classique : ce sont des <b>pools de liquidité</b> qui rendent les échanges possibles.</p>
      <h4>Comment ça marche</h4>
      <p>Des utilisateurs (les <b>LP, liquidity providers</b>) déposent deux actifs à parts égales, par ex. ETH + USDC. Un algorithme appelé <b>AMM</b> (Automated Market Maker) fixe le prix selon la formule <code>x · y = k</code>.</p>
      <ul><li>Tu fournis de la liquidité → tu reçois des <b>frais de trading</b> en récompense.</li><li>En échange, tu reçois un <b>LP token</b> qui représente ta part du pool.</li></ul>
      <div class="callout">Plus il y a de liquidité dans un pool, moins le prix bouge à chaque trade (faible <i>slippage</i>).</div>`},
    {id:"yield",icon:"🌾",title:"Yield Farming",xp:30,coins:16,body:`
      <p>Le <b>yield farming</b> consiste à faire travailler ses cryptos pour générer du rendement, souvent en empilant plusieurs protocoles.</p>
      <ul><li>Tu fournis de la liquidité → tu reçois des LP tokens.</li><li>Tu mets ces LP tokens en jeu (<i>stake</i>) → tu reçois des tokens de récompense.</li><li>On mesure le rendement en <b>APR / APY</b> (taux annuel).</li></ul>
      <div class="callout warn">⚠️ Des APY de 1000% existent… mais sont presque toujours insoutenables. Rendement élevé = risque élevé. Demande-toi toujours « d'où vient ce rendement ? ».</div>`},
    {id:"stake",icon:"🔒",title:"Staking",xp:30,coins:15,body:`
      <p>Le <b>staking</b>, c'est immobiliser ses tokens pour aider à sécuriser un réseau en <b>Proof of Stake</b>, et recevoir des récompenses en échange.</p>
      <ul><li>Tu bloques tes tokens (ex. ETH, SOL) → tu gagnes un rendement régulier.</li><li>Plus stable et plus simple que le yield farming.</li><li>Attention aux <b>périodes de déblocage</b> (unbonding) : tes fonds peuvent être bloqués quelques jours.</li></ul>
      <div class="callout">Staking ≈ « placer son argent qui rapporte des intérêts », mais en gardant le contrôle de ses clés.</div>`},
    {id:"lend",icon:"🏦",title:"Lending & Borrowing",xp:35,coins:18,body:`
      <p>Des protocoles comme Aave permettent de <b>prêter</b> ses cryptos (et toucher des intérêts) ou d'en <b>emprunter</b> (contre une garantie).</p>
      <h4>Le concept clé : la sur-collatéralisation</h4>
      <p>Pour emprunter 100 $, tu dois déposer plus de 100 $ en garantie (ex. 150 $). Si la valeur de ta garantie chute trop, tu te fais <b>liquider</b> automatiquement.</p>
      <ul><li>Prêteur → revenu passif sur tes cryptos.</li><li>Emprunteur → liquidité sans vendre tes actifs.</li></ul>
      <div class="callout warn">⚠️ La liquidation est le danger n°1 de l'emprunt. Garde toujours une marge de sécurité confortable.</div>`},
    {id:"derisk",icon:"⚖️",title:"Les risques de la DeFi",xp:40,coins:25,body:`
      <p>La DeFi est puissante mais comporte des risques propres. Les connaître = la moitié du travail.</p>
      <ul><li><b>Impermanent loss</b> — en fournissant de la liquidité, si les prix divergent, tu peux finir avec moins de valeur qu'en gardant simplement tes coins.</li><li><b>Risque de smart contract</b> — un bug ou un hack peut vider un protocole.</li><li><b>Rug pull / faux protocoles</b> — cf. Academy 2.</li><li><b>Risque de liquidation</b> — sur l'emprunt.</li></ul>
      <div class="callout">🧠 Règle du DeFi Builder : ne mets jamais dans un protocole plus que ce que tu es prêt à perdre, et privilégie les protocoles établis et audités.</div>`}

  4:{ modules:[
    {id:"nftbasic",icon:"🖼️",title:"NFT : les bases",xp:30,coins:15,body:`
      <p>Un <b>NFT</b> (Non-Fungible Token) est un jeton <b>unique</b> et infalsifiable enregistré sur une blockchain. « Non fongible » = pas interchangeable, contrairement à 1 € qui vaut n'importe quel autre 1 €.</p>
      <ul><li>Prouve la <b>propriété</b> et l'<b>authenticité</b> d'un actif numérique (ou physique).</li><li>Chaque NFT a un identifiant unique et un historique public.</li></ul>
      <div class="callout warn">⚠️ Idée fausse fréquente : « le NFT, c'est juste une image ». Non — c'est un <b>certificat de propriété</b> sur la blockchain. L'image n'est qu'une des utilisations possibles.</div>`},
    {id:"collec",icon:"📦",title:"Collections & standards",xp:30,coins:15,body:`
      <p>La plupart des NFT sont regroupés en <b>collections</b> (ex. 10 000 pièces partageant un thème).</p>
      <h4>Les standards techniques</h4>
      <ul><li><b>ERC-721</b> — chaque token est unique (1 œuvre = 1 token).</li><li><b>ERC-1155</b> — permet du semi-fongible (ex. 100 exemplaires d'un même item de jeu).</li></ul>
      <p>La <b>rareté</b> (traits rares) influence fortement la valeur perçue au sein d'une collection.</p>
      <div class="callout">Les <b>métadonnées</b> (image, attributs) sont souvent stockées sur IPFS pour rester décentralisées et permanentes.</div>`},
    {id:"utility",icon:"🗝️",title:"Utility NFTs",xp:35,coins:18,body:`
      <p>Un <b>utility NFT</b> donne accès à quelque chose : c'est sa valeur réelle, au-delà de l'image.</p>
      <ul><li><b>Accès / membership</b> — entrée à une communauté, un événement, du contenu premium (comme les NFT de MOON-RZ Academy 😉).</li><li><b>Avantages</b> — réductions, airdrops, droits de vote.</li><li><b>Certifications</b> — un diplôme ou un badge vérifiable.</li></ul>
      <div class="callout">💡 La question à se poser avant d'acheter : « à quoi sert concrètement ce NFT ? ». S'il ne sert à rien d'autre qu'à la spéculation, le risque est élevé.</div>`},
    {id:"gaming",icon:"🎮",title:"Gaming NFTs",xp:30,coins:16,body:`
      <p>Dans les jeux Web3, les objets (personnages, armes, terrains) peuvent être des NFT que tu <b>possèdes réellement</b> et peux revendre.</p>
      <ul><li><b>Play-to-earn</b> — gagner des tokens/NFT en jouant.</li><li><b>Interopérabilité</b> — l'idée (encore jeune) d'utiliser un même item dans plusieurs jeux.</li></ul>
      <div class="callout warn">⚠️ Beaucoup de jeux P2E se sont effondrés car leur économie reposait sur l'arrivée constante de nouveaux joueurs. Évalue toujours la <b>soutenabilité économique</b> du jeu.</div>`},
    {id:"rwa",icon:"🏠",title:"Real World Assets (RWA)",xp:35,coins:18,body:`
      <p>Les <b>RWA</b> tokenisent des actifs du monde réel : immobilier, art, obligations, or… représentés par un token sur la blockchain.</p>
      <ul><li>Permet la <b>propriété fractionnée</b> (posséder 1% d'un appartement).</li><li>Plus de liquidité pour des actifs habituellement difficiles à vendre.</li><li>Secteur en forte croissance, mais très lié à la <b>régulation</b>.</li></ul>
      <div class="callout">Un de tes autres projets (STAYLO) touche justement à la tokenisation d'actifs réels — c'est exactement ce dont parle ce module.</div>`},
    {id:"mint",icon:"🛠️",title:"Créer & lister un NFT",xp:40,coins:25,body:`
      <p>Étapes pour passer de l'idée au NFT en vente :</p>
      <ul><li><b>1. Créer le visuel / contenu</b> et ses métadonnées.</li><li><b>2. Mint</b> — enregistrer le NFT sur la blockchain (via une marketplace ou un contrat).</li><li><b>3. Lister</b> — le mettre en vente (prix fixe ou enchère) sur une marketplace (OpenSea, Magic Eden…).</li><li><b>4. Royalties</b> — configurer un % que tu touches à chaque revente future.</li></ul>
      <div class="callout">🎨 Conseil de NFT Architect : la valeur d'une collection vient à 80% de la <b>communauté et de l'utility</b>, à 20% de l'art. Construis les deux.</div>`}

  5:{ modules:[
    {id:"brand",icon:"✨",title:"Branding Web3",xp:30,coins:15,body:`
      <p>Dans le Web3, ton <b>image de marque</b> est ce qui fait qu'on te fait confiance dans un océan de projets. Avant la technique, il y a l'<b>histoire</b>.</p>
      <ul><li><b>Mission claire</b> — quel problème tu résous, pour qui.</li><li><b>Identité visuelle</b> — logo, couleurs, ton (comme l'univers lunaire de MOON-RZ).</li><li><b>Cohérence</b> — même message partout (site, X, Discord).</li></ul>
      <div class="callout">💡 Les gens n'achètent pas un token, ils rejoignent une <b>vision</b>. Raconte une histoire à laquelle ils veulent appartenir.</div>`},
    {id:"community",icon:"👥",title:"Community Building",xp:35,coins:18,body:`
      <p>En crypto, <b>la communauté est le produit</b>. Un projet sans communauté est mort, même avec une super tech.</p>
      <ul><li><b>Discord / Telegram</b> — le QG quotidien.</li><li><b>X (Twitter)</b> — la vitrine et l'acquisition.</li><li><b>Engagement réel</b> — réponds, écoute, récompense les membres actifs.</li></ul>
      <div class="callout warn">⚠️ Méfie-toi de la « vanity metrics » : 50 000 followers achetés valent moins que 500 vrais fans engagés. Vise la qualité, pas le bruit.</div>`},
    {id:"marketing",icon:"📣",title:"Marketing crypto",xp:30,coins:16,body:`
      <p>Le marketing Web3 mélange les classiques et des leviers propres à l'écosystème.</p>
      <ul><li><b>Contenu éducatif</b> — apporter de la valeur avant de vendre.</li><li><b>Partenariats & KOL</b> — influenceurs crypto (à vérifier, beaucoup de faux).</li><li><b>Airdrops & quêtes</b> — récompenser l'action pour amorcer la communauté (le modèle Learn→Earn).</li></ul>
      <div class="callout">Le meilleur marketing crypto reste un produit qui marche + des utilisateurs qui en parlent d'eux-mêmes.</div>`},
    {id:"dao",icon:"🏛️",title:"Les DAO",xp:35,coins:18,body:`
      <p>Une <b>DAO</b> (Decentralized Autonomous Organization) est une organisation gouvernée par sa communauté via la blockchain, plutôt que par un patron.</p>
      <ul><li><b>Tokens de gouvernance</b> — détenir le token = droit de vote.</li><li><b>Propositions & votes</b> — la communauté décide des évolutions et du trésor.</li><li><b>Transparence</b> — décisions et fonds visibles on-chain.</li></ul>
      <div class="callout">⚖️ Enjeu clé : éviter que quelques gros détenteurs (« whales ») contrôlent tous les votes. Le design de gouvernance compte autant que la tech.</div>`},
    {id:"tokenomics",icon:"🪙",title:"Tokenomics",xp:35,coins:20,body:`

  6:{ modules:[
    {id:"candles",icon:"🕯️",title:"Lire un graphique : les bougies",xp:30,coins:15,body:`
      <p>Le graphique en <b>chandeliers japonais</b> (candlesticks) est le langage universel du trader. Chaque bougie résume le combat acheteurs/vendeurs sur une période.</p>
      <h4>Une bougie = 4 prix</h4>
      <ul><li><b>Ouverture</b> et <b>clôture</b> (le corps de la bougie).</li><li><b>Plus haut</b> et <b>plus bas</b> (les mèches).</li><li>Corps <b>vert</b> = clôture au-dessus de l'ouverture (hausse). <b>Rouge</b> = baisse.</li></ul>
      <p>La <b>période (timeframe)</b> change tout : une bougie de 1 minute ≠ une bougie de 1 jour.</p>
      <div class="callout">💡 Ouvre ton <b>Simulateur</b> en parallèle : tu y vois les vrais prix bouger. Le trading s'apprend l'œil sur le marché, pas dans les livres.</div>`},
    {id:"sr",icon:"📏",title:"Supports & Résistances",xp:35,coins:18,body:`
      <p>Ce sont les niveaux de prix les plus importants à repérer.</p>
      <h4>Support</h4>
      <p>Un <b>plancher</b> où les acheteurs reprennent la main et font rebondir le prix. Le prix « a du mal à descendre » sous ce niveau.</p>
      <h4>Résistance</h4>
      <p>Un <b>plafond</b> où les vendeurs reprennent le dessus. Le prix « a du mal à monter » au-dessus.</p>
      <ul><li>Plus un niveau est testé, plus il est significatif.</li><li>Un support cassé devient souvent une résistance (et inversement).</li></ul>
      <div class="callout warn">⚠️ Ces niveaux sont des <b>zones</b>, pas des lignes parfaites au pixel près. Ne sur-précise pas.</div>`},
    {id:"trend",icon:"📈",title:"Les Tendances",xp:30,coins:16,body:`
      <p>« <b>The trend is your friend</b> » : la première question d'un trader est toujours « dans quel sens va le marché ? ».</p>
      <ul><li><b>Tendance haussière</b> — sommets et creux <b>de plus en plus hauts</b> (higher highs / higher lows).</li><li><b>Tendance baissière</b> — sommets et creux <b>de plus en plus bas</b>.</li><li><b>Range</b> — le prix oscille à l'horizontale, sans direction.</li></ul>
      <div class="callout">📐 Une <b>ligne de tendance</b> relie les creux (en hausse) ou les sommets (en baisse). Sa cassure peut signaler un changement de direction.</div>`},
    {id:"volume",icon:"📊",title:"Le Volume",xp:30,coins:16,body:`
      <p>Le <b>volume</b> = la quantité échangée sur une période. C'est le <b>carburant</b> derrière un mouvement de prix.</p>
      <ul><li>Une hausse avec <b>fort volume</b> = mouvement crédible, soutenu.</li><li>Une hausse avec <b>faible volume</b> = méfiance, le mouvement peut s'essouffler.</li><li>Un pic de volume accompagne souvent les retournements ou les cassures.</li></ul>
      <div class="callout">🔎 Règle simple : le volume <b>confirme</b> le prix. Une cassure de résistance sans volume est suspecte.</div>`},
    {id:"liquidity",icon:"🌊",title:"La Liquidité",xp:35,coins:18,body:`
      <p>La <b>liquidité</b>, c'est la facilité d'acheter ou vendre sans faire bouger le prix. Beaucoup d'ordres des deux côtés = marché liquide.</p>
      <ul><li>Actif <b>liquide</b> (BTC, ETH) → faible <b>slippage</b>, exécution proche du prix affiché.</li><li>Actif <b>illiquide</b> (petit token) → un seul gros ordre fait déraper le prix, terrain des manipulations.</li></ul>
      <div class="callout warn">⚠️ Beaucoup de pièges (pump &amp; dump) ne sont possibles que sur des actifs peu liquides. Privilégie les marchés profonds quand tu débutes.</div>`},
    {id:"analyse",icon:"🎯",title:"Mettre en pratique",xp:45,coins:30,body:`
      <p>Assemble tout pour faire ta première <b>analyse de marché</b> structurée :</p>
      <ul><li><b>1. Tendance</b> — haussière, baissière ou range ?</li><li><b>2. Niveaux</b> — où sont les supports et résistances clés ?</li><li><b>3. Volume</b> — confirme-t-il le mouvement actuel ?</li><li><b>4. Liquidité</b> — l'actif est-il assez profond ?</li><li><b>5. Plan</b> — où j'entre, où je coupe si j'ai tort (ça, c'est l'Academy 7).</li></ul>
      <div class="callout">🏋️ Exercice du Market Analyst : ouvre le <b>Simulateur</b>, choisis BTC ou ETH, et fais ces 5 étapes à voix haute avant de cliquer « Acheter ». Répète sur ETH, BNB, SOL, XRP.</div>`}

  7:{ modules:[
    {id:"mtf",icon:"🔭",title:"Multi Time Frame Analysis",xp:35,coins:18,body:`
      <p>Un bon trader regarde <b>plusieurs unités de temps</b> avant d'agir. Une seule, c'est regarder par le trou d'une serrure.</p>
      <h4>La méthode top-down</h4>
      <ul><li><b>Grande UT</b> (jour/semaine) → la tendance de fond, le décor.</li><li><b>UT moyenne</b> (4h/1h) → les zones d'intérêt.</li><li><b>Petite UT</b> (15m/5m) → le point d'entrée précis.</li></ul>
      <p>Règle d'or : on <b>trade dans le sens de la grande tendance</b>, et on affine l'entrée sur la petite.</p>
      <div class="callout warn">⚠️ Erreur classique du débutant : prendre un signal en 5 minutes qui va à l'inverse de la tendance journalière. C'est nager à contre-courant.</div>`},
    {id:"risk",icon:"🛡️",title:"Risk Management",xp:40,coins:22,body:`
      <p>La vérité que personne ne dit aux débutants : <b>le trading, c'est d'abord gérer le risque, pas prédire le prix.</b> On survit avant de gagner.</p>
      <h4>La règle des 1%</h4>
      <p>Ne risque <b>jamais plus de 1 à 2%</b> de ton capital sur un seul trade. Avec 1% de risque, il te faut 100 trades perdants d'affilée pour être ruiné — quasi impossible.</p>
      <ul><li>Une perte de 50% exige ensuite un gain de <b>100%</b> pour revenir à zéro. Protéger le capital est mathématique.</li><li>Le <b>stop-loss</b> n'est pas optionnel : c'est ta ceinture de sécurité.</li></ul>
      <div class="callout">🧮 Pratique-le dans le Simulateur : décide AVANT d'acheter combien tu acceptes de perdre, et tiens-toi-y.</div>`},
    {id:"sizing",icon:"⚖️",title:"Position Sizing",xp:40,coins:22,body:`
      <p>Le <b>position sizing</b> répond à « combien j'achète ? ». Ça découle de ton risque, pas de ton enthousiasme.</p>
      <h4>La formule</h4>
      <p><code>Taille = (Capital × % risque) ÷ distance au stop-loss</code></p>
      <p>Exemple : capital 10 000 $, risque 1% (100 $), stop à -5% → tu peux engager <b>2 000 $</b> sur ce trade (car 5% de 2000 = 100).</p>
      <div class="callout warn">⚠️ Ce n'est pas « j'aime ce coin donc je mets tout ». La taille de position est un <b>calcul</b>, défini par où tu coupes si tu as tort.</div>`},
    {id:"rr",icon:"🎯",title:"Stop-loss, Take-profit & R:R",xp:35,coins:20,body:`
      <p>Chaque trade doit avoir un plan de sortie <b>avant</b> d'entrer.</p>
      <ul><li><b>Stop-loss (SL)</b> — le prix où tu admets t'être trompé et tu coupes.</li><li><b>Take-profit (TP)</b> — le prix où tu prends tes gains.</li><li><b>Ratio Risk/Reward (R:R)</b> — combien tu vises pour combien tu risques.</li></ul>
      <p>Un R:R de <b>1:3</b> signifie : risquer 100 $ pour viser 300 $. Avec un tel ratio, tu peux te tromper plus souvent que tu n'as raison et rester <b>gagnant</b>.</p>
      <div class="callout">📐 Vise au minimum 1:2. En dessous, la moindre série de pertes te coule.</div>`},
    {id:"journal",icon:"📓",title:"Journal & Psychologie",xp:35,coins:20,body:`
      <p>Ton pire ennemi en trading, ce n'est pas le marché : c'est <b>toi</b> (peur, avidité, revanche).</p>
      <h4>Le journal de trading</h4>
      <p>Note chaque trade : entrée, sortie, raison, émotion ressentie, résultat. C'est ainsi qu'on repère ses erreurs récurrentes et qu'on progresse vraiment.</p>
      <ul><li><b>FOMO</b> — acheter par peur de rater = entrer trop tard.</li><li><b>Revenge trading</b> — vouloir « se refaire » après une perte = catastrophe.</li><li><b>Discipline > motivation</b> — un plan suivi froidement bat l'instinct.</li></ul>
      <div class="callout">🧠 Mantra du Professional Trader : « Plan the trade, trade the plan. » Décide à froid, exécute sans émotion.</div>`},
    {id:"strategy",icon:"🗺️",title:"Construire ta stratégie",xp:50,coins:35,body:`
      <p>Une stratégie, c'est un ensemble de <b>règles écrites</b> que tu suis sans improviser. Trois grands styles :</p>
      <ul><li><b>Scalping</b> — beaucoup de petits trades très courts (minutes). Intense, exigeant.</li><li><b>Swing</b> — garder une position quelques jours/semaines sur une tendance.</li><li><b>Investissement (DCA)</b> — acheter régulièrement sur le long terme, sans timing.</li></ul>
      <h4>Ta stratégie doit définir</h4>
      <p>Quel marché · quelle UT · condition d'entrée · stop-loss · take-profit · taille de position · règle de gestion des émotions.</p>
      <div class="callout">🏋️ Exercice du Professional Trader : rédige UNE stratégie (style swing), puis teste-la sur 10 trades dans le Simulateur en respectant chaque règle. Note tout dans ton journal.</div>`}

  9:{ modules:[
    {id:"standards",icon:"🧬",title:"Les standards de token",xp:30,coins:15,body:`
      <p>Créer un token, c'est suivre un <b>standard</b> reconnu pour qu'il soit compatible avec les wallets et les exchanges.</p>

      <p>Un token est défini par : un <b>nom</b>, un <b>symbole</b> (ex. MOON), une <b>offre totale</b> et un nombre de <b>décimales</b>.</p>
      <div class="callout">💡 Techniquement, créer un token de base est simple. Ce qui est dur — et qui compte — c'est tout ce qu'il y a autour (utility, liquidité, confiance).</div>`},

      <ul><li><b>Mint</b> — créer de nouveaux tokens.</li><li><b>Burn</b> — en détruire (réduit l'offre, effet déflationniste).</li><li><b>Owner / permissions</b> — qui contrôle quoi.</li></ul>
      <div class="callout warn">⚠️ Un contrat mal écrit = porte ouverte aux hacks et aux rug pulls. Pour un vrai lancement, un <b>audit</b> par des pros est indispensable.</div>`},
    {id:"liquidity9",icon:"💧",title:"Liquidité & lancement",xp:35,coins:20,body:`
      <p>Un token sans <b>liquidité</b> ne vaut rien : personne ne peut l'acheter ni le vendre.</p>
      <h4>Créer un marché</h4>
      <p>On crée un <b>pool de liquidité</b> sur un DEX (ex. ton token + USDC). Le ratio déposé fixe le prix de départ.</p>
      <ul><li><b>Verrouiller la liquidité</b> (lock) rassure : l'équipe ne peut pas tout retirer.</li><li>Communiquer le contrat officiel pour éviter les faux tokens (cf. Academy 2).</li></ul>
      <div class="callout">🔒 Liquidité verrouillée + contrat audité = deux signaux de sérieux qu'un investisseur averti recherche.</div>`},
    {id:"vesting",icon:"⏳",title:"Le Vesting",xp:35,coins:20,body:`

      <div class="callout warn">⚠️ Avant d'investir dans un projet, regarde le vesting : si d'énormes quantités se débloquent bientôt, le prix peut chuter.</div>`},
    {id:"governance",icon:"🏛️",title:"La Gouvernance",xp:35,coins:20,body:`

    brand:{title:"Web3 branding",body:`
      <p>In Web3, your <b>brand</b> is what makes people trust you in an ocean of projects. Before the tech, there's the <b>story</b>.</p>
      <ul><li><b>Clear mission</b> — what problem you solve, for whom.</li><li><b>Visual identity</b> — logo, colors, tone (like MOON-RZ's lunar universe).</li><li><b>Consistency</b> — the same message everywhere (site, X, Discord).</li></ul>
      <div class="callout">💡 People don't buy a token, they join a <b>vision</b>. Tell a story they want to belong to.</div>`},
    community:{title:"Community building",body:`
      <p>In crypto, <b>the community is the product</b>. A project with no community is dead, even with great tech.</p>
      <ul><li><b>Discord / Telegram</b> — the daily HQ.</li><li><b>X (Twitter)</b> — the storefront and acquisition.</li><li><b>Real engagement</b> — reply, listen, reward active members.</li></ul>
      <div class="callout warn">⚠️ Beware vanity metrics: 50,000 bought followers are worth less than 500 real engaged fans. Aim for quality, not noise.</div>`},
    marketing:{title:"Crypto marketing",body:`
      <p>Web3 marketing blends the classics with levers unique to the ecosystem.</p>
      <ul><li><b>Educational content</b> — deliver value before selling.</li><li><b>Partnerships & KOLs</b> — crypto influencers (vet them, lots of fakes).</li><li><b>Airdrops & quests</b> — reward action to bootstrap the community (the Learn→Earn model).</li></ul>
      <div class="callout">The best crypto marketing is still a product that works + users who talk about it themselves.</div>`},
    dao:{title:"DAOs",body:`
      <p>A <b>DAO</b> (Decentralized Autonomous Organization) is an organization governed by its community via the blockchain, instead of a boss.</p>
      <ul><li><b>Governance tokens</b> — holding the token = voting rights.</li><li><b>Proposals & votes</b> — the community decides on changes and the treasury.</li><li><b>Transparency</b> — decisions and funds visible on-chain.</li></ul>
      <div class="callout">⚖️ Key challenge: preventing a few large holders ("whales") from controlling all votes. Governance design matters as much as the tech.</div>`},
    tokenomics:{title:"Tokenomics",body:`
      <p><b>Tokenomics</b> is your token's economy: what determines whether it holds value over time.</p>
      <ul><li><b>Supply</b> — total, circulating, inflation/deflation.</li><li><b>Distribution</b> — team, community, investors, and <b>vesting</b> (gradual unlocks).</li><li><b>Utility</b> — why hold the token? (gas, governance, access, rewards…).</li><li><b>Supply vs demand</b> — a useful, scarce token gains value.</li></ul>
      <div class="callout">🧮 The MOON-RZ token follows this logic: earned through action (Learn→Earn) and spent to unlock content, NFTs and competitions.</div>`},
    launch:{title:"Launch your project",body:`
      <p>Putting the pieces together to go from idea to launch:</p>
      <ul><li><b>1. Vision & whitepaper</b> — what, why, how.</li><li><b>2. Community</b> — build it BEFORE launch.</li><li><b>3. Tokenomics</b> — healthy and transparent.</li><li><b>4. Product / MVP</b> — show it works (like this app!).</li><li><b>5. Launch & liquidity</b> — then iterate with the community.</li></ul>
      <div class="callout">🏗️ Web3 Founder mantra: "Community first, hype second." A successful launch is prepared months ahead.</div>`}

  6:{ modules:{
    candles:{title:"Reading a chart: candles",body:`
      <p>The <b>Japanese candlestick</b> chart is the trader's universal language. Each candle sums up the buyer/seller battle over a period.</p>
      <h4>One candle = 4 prices</h4>
      <ul><li><b>Open</b> and <b>close</b> (the candle body).</li><li><b>High</b> and <b>low</b> (the wicks).</li><li><b>Green</b> body = close above open (up). <b>Red</b> = down.</li></ul>
      <p>The <b>timeframe</b> changes everything: a 1-minute candle ≠ a 1-day candle.</p>
      <div class="callout">💡 Open your <b>Simulator</b> alongside: you'll watch real prices move. Trading is learned with your eye on the market, not in books.</div>`},
    sr:{title:"Support & Resistance",body:`
      <p>These are the most important price levels to spot.</p>
      <h4>Support</h4>
      <p>A <b>floor</b> where buyers take over and bounce the price. The price "struggles to fall" below this level.</p>
      <h4>Resistance</h4>
      <p>A <b>ceiling</b> where sellers take over. The price "struggles to rise" above it.</p>
      <ul><li>The more a level is tested, the more significant it is.</li><li>A broken support often becomes a resistance (and vice versa).</li></ul>
      <div class="callout warn">⚠️ These levels are <b>zones</b>, not pixel-perfect lines. Don't over-precise.</div>`},
    trend:{title:"Trends",body:`
      <p>"<b>The trend is your friend</b>": a trader's first question is always "which way is the market going?".</p>
      <ul><li><b>Uptrend</b> — higher highs and higher lows.</li><li><b>Downtrend</b> — lower highs and lower lows.</li><li><b>Range</b> — the price oscillates sideways, no direction.</li></ul>
      <div class="callout">📐 A <b>trendline</b> connects the lows (in an uptrend) or the highs (in a downtrend). Its break can signal a change of direction.</div>`},
    volume:{title:"Volume",body:`
      <p><b>Volume</b> = the amount traded over a period. It's the <b>fuel</b> behind a price move.</p>
      <ul><li>A rise on <b>high volume</b> = credible, supported move.</li><li>A rise on <b>low volume</b> = suspicious, the move may fizzle.</li><li>A volume spike often accompanies reversals or breakouts.</li></ul>
      <div class="callout">🔎 Simple rule: volume <b>confirms</b> price. A resistance break with no volume is suspect.</div>`},
    liquidity:{title:"Liquidity",body:`
      <p><b>Liquidity</b> is the ease of buying or selling without moving the price. Lots of orders on both sides = a liquid market.</p>
      <ul><li><b>Liquid</b> asset (BTC, ETH) → low <b>slippage</b>, execution near the shown price.</li><li><b>Illiquid</b> asset (small token) → one big order moves the price, ground for manipulation.</li></ul>
      <div class="callout warn">⚠️ Many traps (pump &amp; dump) are only possible on illiquid assets. Favor deep markets when starting out.</div>`},
    analyse:{title:"Putting it into practice",body:`
      <p>Bring it all together for your first structured <b>market analysis</b>:</p>
      <ul><li><b>1. Trend</b> — up, down or range?</li><li><b>2. Levels</b> — where are the key supports and resistances?</li><li><b>3. Volume</b> — does it confirm the current move?</li><li><b>4. Liquidity</b> — is the asset deep enough?</li><li><b>5. Plan</b> — where I enter, where I cut if I'm wrong (that's Academy 7).</li></ul>
      <div class="callout">🏋️ Market Analyst exercise: open the <b>Simulator</b>, pick BTC or ETH, and run these 5 steps out loud before clicking "Buy". Repeat on ETH, BNB, SOL, XRP.</div>`}

  7:{ modules:{
    mtf:{title:"Multi Time Frame Analysis",body:`
      <p>A good trader looks at <b>several timeframes</b> before acting. Just one is looking through a keyhole.</p>
      <h4>The top-down method</h4>
      <ul><li><b>Higher TF</b> (day/week) → the underlying trend, the backdrop.</li><li><b>Medium TF</b> (4h/1h) → the zones of interest.</li><li><b>Lower TF</b> (15m/5m) → the precise entry point.</li></ul>
      <p>Golden rule: <b>trade in the direction of the higher trend</b>, and refine the entry on the lower one.</p>
      <div class="callout warn">⚠️ Classic beginner mistake: taking a 5-minute signal that goes against the daily trend. That's swimming against the current.</div>`},
    risk:{title:"Risk Management",body:`
      <p>The truth no one tells beginners: <b>trading is first about managing risk, not predicting price.</b> You survive before you win.</p>
      <h4>The 1% rule</h4>
      <p>Never risk <b>more than 1 to 2%</b> of your capital on a single trade. At 1% risk, it would take 100 losing trades in a row to wipe you out — nearly impossible.</p>
      <ul><li>A 50% loss then requires a <b>100%</b> gain just to break even. Protecting capital is math.</li><li>The <b>stop-loss</b> is not optional: it's your seatbelt.</li></ul>
      <div class="callout">🧮 Practice it in the Simulator: decide BEFORE buying how much you accept to lose, and stick to it.</div>`},
    sizing:{title:"Position Sizing",body:`
      <p><b>Position sizing</b> answers "how much do I buy?". It follows from your risk, not your enthusiasm.</p>
      <h4>The formula</h4>
      <p><code>Size = (Capital × % risk) ÷ distance to stop-loss</code></p>
      <p>Example: $10,000 capital, 1% risk ($100), stop at -5% → you can deploy <b>$2,000</b> on this trade (since 5% of 2000 = 100).</p>
      <div class="callout warn">⚠️ It's not "I like this coin so I put it all in". Position size is a <b>calculation</b>, defined by where you cut if you're wrong.</div>`},
    rr:{title:"Stop-loss, Take-profit & R:R",body:`
      <p>Every trade must have an exit plan <b>before</b> you enter.</p>
      <ul><li><b>Stop-loss (SL)</b> — the price where you admit you're wrong and cut.</li><li><b>Take-profit (TP)</b> — the price where you take gains.</li><li><b>Risk/Reward ratio (R:R)</b> — how much you aim for vs how much you risk.</li></ul>
      <p>A R:R of <b>1:3</b> means risking $100 to aim for $300. With such a ratio you can be wrong more often than right and still be <b>profitable</b>.</p>
      <div class="callout">📐 Aim for at least 1:2. Below that, the smallest losing streak sinks you.</div>`},
    journal:{title:"Journal & Psychology",body:`
      <p>Your worst enemy in trading isn't the market: it's <b>you</b> (fear, greed, revenge).</p>
      <h4>The trading journal</h4>
      <p>Log every trade: entry, exit, reason, emotion felt, result. That's how you spot recurring mistakes and truly improve.</p>
      <ul><li><b>FOMO</b> — buying out of fear of missing out = entering too late.</li><li><b>Revenge trading</b> — trying to "win it back" after a loss = disaster.</li><li><b>Discipline > motivation</b> — a coldly followed plan beats instinct.</li></ul>
      <div class="callout">🧠 Professional Trader mantra: "Plan the trade, trade the plan." Decide calmly, execute without emotion.</div>`},
    strategy:{title:"Build your strategy",body:`
      <p>A strategy is a set of <b>written rules</b> you follow without improvising. Three main styles:</p>
      <ul><li><b>Scalping</b> — many very short trades (minutes). Intense, demanding.</li><li><b>Swing</b> — holding a position for a few days/weeks on a trend.</li><li><b>Investing (DCA)</b> — buying regularly for the long term, no timing.</li></ul>
      <h4>Your strategy must define</h4>
      <p>Which market · which TF · entry condition · stop-loss · take-profit · position size · emotion-management rule.</p>
      <div class="callout">🏋️ Professional Trader exercise: write ONE strategy (swing style), then test it over 10 trades in the Simulator, respecting every rule. Log everything in your journal.</div>`}

  8:{ modules:{
    copilot:{title:"AI, your crypto copilot",body:`
      <p>AI (Claude, ChatGPT…) doesn't replace your brain: it's a <b>copilot</b> that saves huge time on research, analysis and learning.</p>
      <ul><li><b>Explain</b> a complex concept at your level.</li><li><b>Summarize</b> a 40-page whitepaper in 10 lines.</li><li><b>Brainstorm</b> a strategy or a project.</li><li><b>Code</b> a script, a bot, a simple smart contract.</li></ul>
      <div class="callout">💡 This MOON-RZ Academy app was itself built with AI. AI is a force multiplier for a solo creator.</div>`},
    prompt:{title:"Prompt well",body:`
      <p>The quality of the answer depends on the quality of your question. A good <b>prompt</b> gives context and a clear goal.</p>
      <h4>The R-C-T recipe</h4>
      <ul><li><b>Role</b> — "Act as an expert crypto analyst."</li><li><b>Context</b> — the data, your level, the constraint.</li><li><b>Task</b> — exactly what you want, and the output format.</li></ul>
      <div class="callout warn">⚠️ Be specific: "analyze BTC" is vague. "Give me BTC's support, resistance and trend on H4, in 5 bullets" is actionable.</div>`},
    analyst:{title:"Build an AI crypto analyst",body:`
      <p>You can turn an AI into a reusable <b>analysis assistant</b> with fixed instructions.</p>
      <h4>Example instruction</h4>
      <p>"You are my analyst. For each asset I give you, always reply with: trend, key levels, volume, risk level /10, and a one-sentence plan. Never financial advice, only analysis."</p>
      <div class="callout">🎯 The AI structures your thinking and forces you to follow the Academy 6 method. The final decision is still YOU.</div>`},
    scanner:{title:"AI market scanner",body:`
      <p>A <b>scanner</b> filters information down to what matters, and AI speeds up that filtering.</p>
      <ul><li>Summarize the day's news and market sentiment.</li><li>Compare several projects on fixed criteria (team, tokenomics, liquidity…).</li><li>Spot signals to dig into — <b>never</b> to execute blindly.</li></ul>
      <div class="callout warn">⚠️ An AI signal is a <b>lead</b>, not an order. Always verify the data yourself before acting.</div>`},
    agents:{title:"AI agents & automation",body:`
      <p>An <b>AI agent</b> is an AI that can chain actions toward a goal (search, analyze, write, sometimes execute via tools).</p>
      <ul><li>Automate a daily watch.</li><li>Generate regular reports.</li><li>Assist creation (content, code, design).</li></ul>
      <div class="callout warn">⚠️ Real danger: an agent connected to a wallet or exchange can cause damage if poorly scoped. Start read-only / in the simulator.</div>`},
    ailimits:{title:"AI limits & safety",body:`
      <p>AI is powerful but fallible. Knowing the limits = using it wisely.</p>
      <ul><li><b>Hallucinations</b> — AI can invent facts confidently. Verify numbers and contracts.</li><li><b>Stale data</b> — it may not know current prices.</li><li><b>Security</b> — NEVER give your seed phrase or private keys to an AI or any site.</li></ul>
      <div class="callout">🧠 AI Trader rule: AI <b>assists</b> your decision, it doesn't <b>replace</b> it. Always keep control and critical thinking.</div>`}

  9:{ modules:{
    standards:{title:"Token standards",body:`
      <p>Creating a token means following a recognized <b>standard</b> so it's compatible with wallets and exchanges.</p>
      <ul><li><b>ERC-20</b> (Ethereum) — the standard for fungible tokens.</li><li><b>BEP-20</b> (BNB Chain) — the equivalent, lower fees.</li><li>On Solana it's the <b>SPL Token</b> program.</li></ul>
      <p>A token is defined by: a <b>name</b>, a <b>symbol</b> (e.g. MOON), a <b>total supply</b> and a number of <b>decimals</b>.</p>
      <div class="callout">💡 Technically, creating a basic token is simple. What's hard — and what matters — is everything around it (utility, liquidity, trust).</div>`},
    contract:{title:"The token smart contract",body:`
      <p>The token lives in a <b>smart contract</b> that defines its rules: who can mint, burn, and with what limits.</p>
      <ul><li><b>Mint</b> — create new tokens.</li><li><b>Burn</b> — destroy some (reduces supply, deflationary).</li><li><b>Owner / permissions</b> — who controls what.</li></ul>
      <div class="callout warn">⚠️ A badly written contract = an open door to hacks and rug pulls. For a real launch, a professional <b>audit</b> is essential.</div>`},
    liquidity9:{title:"Liquidity & launch",body:`
      <p>A token with no <b>liquidity</b> is worthless: no one can buy or sell it.</p>
      <h4>Creating a market</h4>
      <p>You create a <b>liquidity pool</b> on a DEX (e.g. your token + USDC). The deposited ratio sets the starting price.</p>
      <ul><li><b>Locking the liquidity</b> reassures people: the team can't pull it all.</li><li>Communicate the official contract to avoid fake tokens (see Academy 2).</li></ul>
      <div class="callout">🔒 Locked liquidity + audited contract = two seriousness signals a savvy investor looks for.</div>`},
    vesting:{title:"Vesting",body:`
      <p><b>Vesting</b> unlocks tokens <b>gradually</b> over time, instead of releasing everything at once.</p>
      <ul><li>Stops the team and early investors from selling everything at launch (a "dump").</li><li>Aligns incentives for the <b>long term</b>.</li><li>Often shown in a token release schedule.</li></ul>
      <div class="callout warn">⚠️ Before investing in a project, check the vesting: if huge amounts unlock soon, the price can drop.</div>`},
    governance:{title:"Governance",body:`
      <p>A token can grant <b>decision power</b>: that's governance (linked to DAOs, Academy 5).</p>
      <ul><li>Holding the token = voting on the project's evolution.</li><li>Decisions and treasury managed transparently, on-chain.</li><li>The challenge: avoiding <b>whale</b> dominance over all votes.</li></ul>
      <div class="callout">⚖️ Good governance design distributes power and encourages community participation.</div>`},
    launch9:{title:"Launch a token responsibly",body:`
      <p>Recap of a <b>serious</b> launch, the opposite of a scam:</p>
      <ul><li><b>1.</b> Clear utility — what the token is really for.</li><li><b>2.</b> Audited contract, healthy permissions.</li><li><b>3.</b> Transparent tokenomics (supply, distribution, vesting).</li><li><b>4.</b> Liquidity provided and locked.</li><li><b>5.</b> Informed community, official contract published.</li></ul>
      <div class="callout">🪙 Token Engineer mantra: "A token only has value through what you can do with it." Build the use before the price. That's exactly the MOON-RZ token logic.</div>`}
  }, quiz:[

    {q:"What gives a token lasting value?",a:["Its logo","Its real utility","The number of decimals","Its color"],correct:1}

  10:{ modules:{
    m_wallet:{title:"Checkpoint 1 — Wallet & security",body:`
      <p>Welcome to the final academy. Here you no longer discover: you <b>connect everything</b> and prove your mastery.</p>
      <h4>What you now master</h4>
      <ul><li>Create and secure a wallet, protect your seed phrase.</li><li>Recognize phishing, rug pulls, drainers (Academy 2).</li><li>The reflex: "Slow down, verify, then sign."</li></ul>
      <div class="callout">🌙 A true Web3 master protects their funds <b>by habit</b>, without even thinking. Security is your foundation.</div>`},
    m_defi:{title:"Checkpoint 2 — DeFi & yield",body:`
      <p>You now know how to put your assets to work <b>while understanding the risks</b>.</p>
      <ul><li>Swap on a DEX, provide liquidity, read an APY.</li><li>Staking, lending, and the danger of liquidation.</li><li>Impermanent loss and smart contract risk.</li></ul>
      <div class="callout">🧠 Mastery = never chasing a yield you can't explain the source of.</div>`},
    m_nft:{title:"Checkpoint 3 — NFT & creation",body:`
      <p>You see the NFT for what it is: an <b>ownership certificate</b> and a carrier of utility.</p>
      <ul><li>Understand collections, standards, rarity.</li><li>Assess the real utility before buying.</li><li>Know how to create, list, and set royalties.</li></ul>
      <div class="callout">🎯 Your MOON-RZ badges are themselves utility NFTs: they prove what you've learned.</div>`},
    m_trade:{title:"Checkpoint 4 — Trading & risk",body:`
      <p>You read a market and act with a <b>plan</b>, not your emotions.</p>
      <ul><li>Trend, supports/resistances, volume, liquidity.</li><li>The 1% rule, position sizing, R:R ≥ 1:2.</li><li>Trading journal and discipline against FOMO.</li></ul>
      <div class="callout">🏋️ Proof by action: apply a full strategy in the <b>Simulator</b>, from entry plan to stop-loss.</div>`},
    m_build:{title:"Checkpoint 5 — Build & tokenize",body:`
      <p>You can go from mere user to ecosystem <b>builder</b>.</p>
      <ul><li>Vision, branding, community first.</li><li>Healthy tokenomics: supply, distribution, vesting, utility.</li><li>Launch a responsible token, with governance and locked liquidity.</li></ul>
      <div class="callout">🏗️ "Community first, hype second." You can now recognize — and build — a serious project.</div>`},
    m_master:{title:"Final checkpoint — MOON-RZ Master",body:`
      <p>Final stretch. You've gone through all 10 academies: blockchain, security, DeFi, NFT, entrepreneurship, trading, AI, tokenization.</p>
      <h4>The MOON-RZ Master profile</h4>
      <ul><li>🛡️ Autonomous and safe in Web3.</li><li>💹 Able to analyze a market and manage risk.</li><li>🏗️ Able to understand, assess and build a project.</li><li>🧠 Critical thinking: no easy-money promise traps you.</li></ul>
      <div class="callout">🏆 Pass the final exam to earn the <b>MOON-RZ MASTER NFT</b> and reach the ultimate rank: <b>MOON-RZ Legend</b>. True mastery is to keep learning. 🚀</div>`}

    {q:"Before chasing a high DeFi yield, you must…",a:["Invest everything fast","Be able to explain where the yield comes from and its risk","Ignore fees","Trust the shown APY"],correct:1},
